<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTYVACIJOS</title>

<style>
body {margin:0;background: linear-gradient(180deg,#0f172a,#111827,#020617);color:#e5e7eb;font-family: system-ui;transition:0.3s;}
.light {background: linear-gradient(180deg,#e5e7eb,#cbd5f5,#94a3b8);color:#020617;}

.container {max-width:500px;margin:auto;padding:20px;}
h1 {text-align:center;color:#4ade80;}

.card {background:rgba(17,24,39,0.8);padding:18px;border-radius:20px;margin-top:15px;}
.light .card {background:white;color:#020617;}

.progress {height:12px;background:#1f2937;border-radius:20px;overflow:hidden;margin-top:8px;}
.fill {height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);}

button {width:100%;padding:14px;margin-top:10px;border-radius:14px;border:none;font-size:15px;cursor:pointer;}
.toggle {background:#1f2937;color:#4ade80;}
.light .toggle {background:#e2e8f0;color:#020617;}

.task {background:#020617;}
.task.done {background:#052e1b;color:#4ade80;}

.shop {border:1px solid #facc15;color:#facc15;}
.hidden {display:none;}
</style>
</head>

<body>

<div class="container">

<h1>MOTYVACIJOS</h1>

<div class="card">
<h2 id="level"></h2>
<p id="xp"></p>
<div class="progress"><div id="bar" class="fill"></div></div>
<p>💰 Monetos: <span id="coins"></span></p>
</div>

<div class="card">
<button class="toggle" onclick="toggle('sveik')">💪 Sveikata</button>
<div id="sveik" class="hidden"></div>

<button class="toggle" onclick="toggle('prod')">📋 Produktyvumas</button>
<div id="prod" class="hidden"></div>

<button class="toggle" onclick="toggle('tobul')">🧠 Tobulėjimas</button>
<div id="tobul" class="hidden"></div>
</div>

<div class="card">
<button class="toggle" onclick="toggle('shopWrap')">🎁 Apdovanojimai</button>
<div id="shopWrap" class="hidden">

<button class="shop" onclick="buy(0)">🛍️ Premium pirkinys (50)</button>
<button class="shop" onclick="buy(1)">🍕 Picos vakaras (70)</button>
<button class="shop" onclick="buy(2)">👕 Vinted drabužis (80)</button>
<button class="shop" onclick="buy(3)">💸 25€ (100)</button>
<button class="shop" onclick="buy(4)">🎬 Kino vakaras (200)</button>
<button class="shop" onclick="buy(5)">💆 Masažas (300)</button>
<button class="shop" onclick="buy(6)">🛒 80€ pirkinys (500)</button>
<button class="shop" onclick="buy(7)">✈️ Kelionė (1000)</button>

</div>
</div>

<div class="card">
<button class="toggle" onclick="toggle('menuWrap')">☰ MENIU</button>
<div id="menuWrap" class="hidden">

<button onclick="showStats()">📊 Statistika</button>
<button onclick="showHistory()">📜 Istorija</button>

<button onclick="toggle('achWrap')">🏆 Pasiekimai</button>
<div id="achWrap" class="hidden"></div>

<button onclick="toggleTheme()">🌗 Keisti dizainą</button>

<button onclick="resetGame()">❌ Reset</button>

</div>
</div>

</div>

<script>

let xp=0, level=1, coins=0;
let historyLog=[];
let achDone={};
let dark=true;

let stats = {
pushups:0,pullups:0,contracts:0,sold:0,delayed:0,
books:0,ce:0,notv:0
};

const rewards = [
{price:50,text:"premium pirkinį"},
{price:70,text:"picos vakarą"},
{price:80,text:"Vinted drabužį"},
{price:100,text:"25€ išlaidas"},
{price:200,text:"kino vakarą"},
{price:300,text:"masažą"},
{price:500,text:"80€ pirkinį"},
{price:1000,text:"kelionę"}
];

function toggle(id){document.getElementById(id).classList.toggle("hidden");}

function toggleTheme(){
dark=!dark;
document.body.classList.toggle("light");
}

function buy(i){
let r=rewards[i];
if(coins<r.price)return alert("❌ Neužtenka");
coins-=r.price;
alert("🎁 "+r.text);
render();
}

function addXP(val){
xp+=val;
coins+=Math.floor(val/2);

let up=false;
while(xp>=100){xp-=100;level++;up=true;}

if(up) alert("🔥 LEVEL UP!");

checkAchievements();
}

function completeTask(id){
let t=tasks.find(x=>x.id===id);
if(!t||t.done)return;

t.done=true;
addXP(t.xp);
track(t);

historyLog.push("✔ "+t.text);

render();
}

function track(t){
if(t.text.includes("atsispaud")) stats.pushups+=50;
if(t.text.includes("prisitrauk")) stats.pullups+=20;
if(t.text.includes("sutartys")) stats.contracts+=5;
if(t.text.includes("parduotas")) stats.sold+=1;
if(t.text.includes("Atidėliotas")) stats.delayed+=1;
if(t.text.includes("skaitymas")) stats.books+=1;
if(t.text.includes("CE")) stats.ce+=60;
if(t.text.includes("TV")) stats.notv+=1;
}

function checkAchievements(){

let ach = [

["p1",stats.pushups>=100,25,"100 atsispaudimų"],
["p2",stats.pushups>=300,60,"300 atsispaudimų"],
["p3",stats.pushups>=500,100,"500 atsispaudimų"],

["pl1",stats.pullups>=50,35,"50 prisitraukimų"],
["pl2",stats.pullups>=100,60,"100 prisitraukimų"],

["c1",stats.contracts>=10,20,"10 sutarčių"],
["c2",stats.contracts>=20,30,"20 sutarčių"],

["s1",stats.sold>=3,100,"3 parduoti"],
["s2",stats.sold>=5,200,"5 parduoti"],

["d1",stats.delayed>=3,30,"3 atidėlioti"],

["b1",stats.books>=2,20,"40 puslapių"],
["b2",stats.books>=5,50,"100 puslapių"],

["ce1",stats.ce>=180,60,"180min CE"],

["tv1",stats.notv>=1,20,"1 diena be TV"]

];

ach.forEach(a=>{
if(a[1] && !achDone[a[0]]){
coins+=a[2];
achDone[a[0]]=true;
alert("🏆 "+a[3]+" +"+a[2]+" monetų");
}
});
}

function showStats(){
alert("Atsispaudimai: "+stats.pushups);
}

function showHistory(){
alert(historyLog.join("\n")||"Tuščia");
}

function resetGame(){
localStorage.clear();
location.reload();
}

/* 🔥 VISOS TAVO ORIGINALIOS UŽDUOTYS */
let tasks=[

{id:1,cat:"sveik",text:"2L vandens",xp:10,done:false},
{id:2,cat:"sveik",text:"60min be soc tinklų ir darbo",xp:10,done:false},
{id:3,cat:"sveik",text:"30min pasivaikščiojimas",xp:12,done:false},
{id:4,cat:"sveik",text:"50 atsispaudimų",xp:15,done:false},
{id:5,cat:"sveik",text:"20 prisitraukimų",xp:15,done:false},
{id:6,cat:"sveik",text:"3 kartai valgymas",xp:10,done:false},
{id:7,cat:"sveik",text:"24h be priklausomybių",xp:25,done:false},

{id:8,cat:"prod",text:"30min pas mamą",xp:20,done:false},
{id:9,cat:"prod",text:"Sutvarkyti namus",xp:25,done:false},
{id:10,cat:"prod",text:"5 pardavimo sutartys",xp:20,done:false},
{id:11,cat:"prod",text:"2h darbas garaže",xp:25,done:false},
{id:12,cat:"prod",text:"1 į skelbimus automobilis",xp:35,done:false},
{id:13,cat:"prod",text:"1 nupirktas automobilis",xp:35,done:false},
{id:14,cat:"prod",text:"1 parduotas automobilis",xp:35,done:false},
{id:15,cat:"prod",text:"Atidėliotas dalykas (1)",xp:20,done:false},
{id:16,cat:"prod",text:"Atidėliotas dalykas (2)",xp:30,done:false},

{id:17,cat:"tobul",text:"60min mokymasis",xp:15,done:false},
{id:18,cat:"tobul",text:"20 puslapių skaitymas",xp:15,done:false},
{id:19,cat:"tobul",text:"60min CE teorija",xp:20,done:false},
{id:20,cat:"tobul",text:"Dantys ryte",xp:10,done:false},
{id:21,cat:"tobul",text:"Dantys vakare",xp:15,done:false},
{id:22,cat:"tobul",text:"Prausimasis ryte",xp:15,done:false},
{id:23,cat:"tobul",text:"Prausimasis vakare",xp:15,done:false},
{id:24,cat:"tobul",text:"Diena be TV",xp:20,done:false}

];

function render(){
document.getElementById("level").innerText="Lygis: "+level;
document.getElementById("xp").innerText="XP: "+xp+"/100";
document.getElementById("coins").innerText=coins;
document.getElementById("bar").style.width=xp+"%";

["sveik","prod","tobul"].forEach(cat=>{
let div=document.getElementById(cat);
div.innerHTML="";
tasks.filter(t=>t.cat===cat).forEach(t=>{
let b=document.createElement("button");
b.className="task"+(t.done?" done":"");
b.innerText=(t.done?"✅ ":"⬜ ")+t.text;
if(!t.done)b.onclick=()=>completeTask(t.id);
div.appendChild(b);
});
});
}

render();

</script>

</body>
</html>
