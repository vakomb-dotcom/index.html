<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>automobilius.lt</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#f3f4f6;
}

/* HEADER */
header {
  background:#0f0f10;
  color:#fff;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { font-weight:600; font-size:18px; }

button {
  background:#111;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* LAYOUT */
.container {
  max-width:600px;
  margin:auto;
  padding:10px;
}

/* CARD */
.post {
  background:#fff;
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
}

/* TEXT */
.title { font-weight:600; font-size:18px; }
.sub { color:#666; margin-bottom:8px; }

/* VIBER */
.viber {
  background:#7c1dc9;
  color:#fff;
  padding:8px 12px;
  border-radius:6px;
  display:inline-block;
  margin-top:10px;
  text-decoration:none;
}

/* IMG */
.main-img {
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

.thumb-container {
  display:flex;
  gap:6px;
  margin-top:6px;
  flex-wrap:wrap;
}

.thumb {
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
}

/* FORM */
.card {
  background:#fff;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

/* AUTH */
.auth {
  position:absolute;
  right:10px;
  top:60px;
  background:#fff;
  padding:12px;
  border-radius:10px;
  width:220px;
  display:none;
}

.hidden { display:none; }

</style>
</head>
<body>

<header>
<div class="logo">automobilius.lt</div>
<div>
<button onclick="toggleForm()">+ Talpinti</button>
<button onclick="toggleAuth()">Prisijungti</button>
</div>
</header>

<!-- LOGIN -->
<div id="authBox" class="auth">

<div id="loginBox">
<input id="loginNick" placeholder="Slapyvardis">
<input id="loginPass" type="password" placeholder="Slaptažodis">
<button onclick="login()">Prisijungti</button>
<button onclick="showReg()">Registruotis</button>
</div>

<div id="regBox" class="hidden">
<input id="regNick" placeholder="Slapyvardis">
<input id="regPass" type="password" placeholder="Slaptažodis">
<input id="regPass2" type="password" placeholder="Pakartoti">
<button onclick="register()">Registruotis</button>
<button onclick="showLogin()">Grįžti</button>
</div>

</div>

<div class="container">

<div id="formBox" class="card hidden">

<input id="brand" placeholder="Markė">
<input id="model" placeholder="Modelis">
<input id="year" placeholder="Metai">
<input id="engine" placeholder="Variklis">
<input id="defects" placeholder="Defektai">
<input id="price" placeholder="Kaina €">

<select id="negotiated">
<option>Nederinta</option>
<option>Derinta</option>
</select>

<input id="city" placeholder="Miestas">
<input id="interest" placeholder="Interest €">
<input id="phone" placeholder="Viber nr">

<input type="file" id="photos" multiple>

<button onclick="addPost()">Įkelti</button>

</div>

<div id="posts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCYc3MMhNlr2nGGH-PdhrFYkhk3_Zn_2XU",
  authDomain: "automobilius-e2770.firebaseapp.com",
  projectId: "automobilius-e2770"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* USERS LOCAL */
function getUsers(){
 return JSON.parse(localStorage.getItem('users')||'{}');
}
function saveUsers(u){
 localStorage.setItem('users',JSON.stringify(u));
}

/* ADMIN */
let users = getUsers();
if(!users['admin']){
 users['admin'] = {pass:'admin123'};
 saveUsers(users);
}

let currentUser = null;

/* AUTH UI */
window.toggleAuth = ()=> authBox.style.display = authBox.style.display==="block"?"none":"block";

window.showReg = ()=>{
 loginBox.classList.add("hidden");
 regBox.classList.remove("hidden");
}

window.showLogin = ()=>{
 regBox.classList.add("hidden");
 loginBox.classList.remove("hidden");
}

/* LOGIN */
window.login = ()=>{
 let u = getUsers();
 if(u[loginNick.value] && u[loginNick.value].pass === loginPass.value){
   currentUser = loginNick.value;
   alert("Prisijungta kaip "+currentUser);
   authBox.style.display="none";
 } else alert("Blogi duomenys");
}

/* REGISTER */
window.register = ()=>{
 if(regPass.value !== regPass2.value){
  alert("Nesutampa");
  return;
 }
 let u = getUsers();
 if(u[regNick.value]) return alert("Yra toks");

 u[regNick.value] = {pass:regPass.value};
 saveUsers(u);

 alert("OK, gali prisijungti");
 showLogin();
}

/* FORM */
window.toggleForm = ()=>{
 formBox.classList.toggle("hidden");
}

/* ADD POST (FIXED!!!!) */
window.addPost = async ()=>{

 let files = photos.files;

 if(files.length > 10){
  alert("Max 10 foto");
  return;
 }

 let imgs=[];

 if(files.length){
  for(let f of files){
   let base64 = await new Promise(res=>{
    let r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.readAsDataURL(f);
   });
   imgs.push(base64);
  }
 }

 await addDoc(collection(db,"posts"),{
  brand:brand.value,
  model:model.value,
  year:year.value,
  engine:engine.value,
  defects:defects.value,
  price:price.value,
  negotiated:negotiated.value,
  city:city.value,
  interest:interest.value,
  phone:phone.value,
  images:imgs,
  user: currentUser || "guest",
  date:Date.now()
 });

 alert("Įkelta!");

 document.getElementById("formBox").classList.add("hidden");
}

/* RENDER */
const q = query(collection(db,"posts"), orderBy("date","desc"));

onSnapshot(q,(snap)=>{
 let html="";

 snap.forEach(d=>{
  let p = d.data();

  let main = p.images?.length
   ? `<img src="${p.images[0]}" class="main-img" id="img-${d.id}">`
   : "";

  let thumbs="";
  if(p.images?.length > 1){
   thumbs = `<div class="thumb-container">`;
   p.images.forEach(img=>{
    thumbs += `<img src="${img}" class="thumb" onclick="changeImg('${d.id}','${img}')">`;
   });
   thumbs += `</div>`;
  }

  html += `
  <div class="post">

  <div class="title">${p.brand} ${p.model}</div>
  <div class="sub">${p.year} | ${p.engine} | ${p.city}</div>

  <div>Defektai: ${p.defects}</div><br>

  <div><b>Kaina: ${p.price}€ (${p.negotiated})</b></div>
  <div>Interest: ${p.interest}€</div>

  <a class="viber" href="viber://chat?number=${p.phone}">
  Rašyti per Viber
  </a>

  ${main}
  ${thumbs}

  ${currentUser==="admin" ? `
   <br><br>
   <button onclick="del('${d.id}')">Delete</button>
   <button onclick="edit('${d.id}','${p.price}')">Edit</button>
  ` : ""}

  </div>`;
 });

 posts.innerHTML = html;
});

/* IMG SWITCH */
window.changeImg = (id,src)=>{
 document.getElementById("img-"+id).src = src;
}

/* DELETE */
window.del = async id => await deleteDoc(doc(db,"posts",id));

/* EDIT */
window.edit = async (id,old)=>{
 let p = prompt("Nauja kaina:",old);
 if(p) await updateDoc(doc(db,"posts",id),{price:p});
}

</script>

</body>
</html>
