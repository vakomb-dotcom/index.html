<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTYVACIJOS</title>

<style>
body {margin:0;background: linear-gradient(180deg,#0f172a,#111827,#020617);color:#e5e7eb;font-family: system-ui;}
.container {max-width:500px;margin:auto;padding:20px;}
h1 {text-align:center;color:#4ade80;}

.card {
background:rgba(17,24,39,0.8);
padding:18px;
border-radius:20px;
margin-top:15px;
}

.progress {height:12px;background:#1f2937;border-radius:20px;overflow:hidden;}
.fill {height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);}

button {
width:100%;
padding:14px;
margin-top:10px;
border-radius:14px;
border:none;
cursor:pointer;
}

.toggle {background:#1f2937;color:#4ade80;}
.task {background:#020617;border:1px solid #1f2937;}
.task.done {background:#052e1b;color:#4ade80;}

.hidden {display:none;}
</style>
</head>

<body>

<div class="container">

<h1>MOTYVACIJOS</h1>

<div class="card">
<h2 id="level"></h2>
<p id="xp"></p>
<div class="progress"><div id="bar" class="fill"></div></div>
<p>💰 Monetos: <span id="coins"></span></p>
</div>

<div class="card">
<button class="toggle" onclick="toggle('sveik')">💪 Sveikata</button>
<div id="sveik" class="hidden"></div>

<button class="toggle" onclick="toggle('prod')">📋 Produktyvumas</button>
<div id="prod" class="hidden"></div>

<button class="toggle" onclick="toggle('tobul')">🧠 Tobulėjimas</button>
<div id="tobul" class="hidden"></div>
</div>

<div class="card">
<button class="toggle" onclick="toggle('menuWrap')">☰ MENIU</button>

<div id="menuWrap" class="hidden">

<button onclick="showStats()">📊 Statistika</button>
<button onclick="showHistory()">📜 Istorija</button>

<button onclick="toggle('achWrap')">🏆 Pasiekimai</button>

<div id="achWrap" class="hidden">
<button onclick="toggle('achSveik')">💪 Sveikata</button>
<div id="achSveik"></div>

<button onclick="toggle('achProd')">📋 Produktyvumas</button>
<div id="achProd"></div>

<button onclick="toggle('achTobul')">🧠 Tobulėjimas</button>
<div id="achTobul"></div>
</div>

<button onclick="resetGame()">❌ Reset</button>

</div>
</div>

</div>

<script>

/* STATE */
let xp=0, level=1, coins=0;
let stats={pushups:0,pullups:0,nosocial:0,contracts:0,sold:0,delayed:0,books:0,ce:0,notv:0};
let historyLog=[];

/* TASKS (VISOS GRĄŽINTOS) */
let tasks=[
{id:1,cat:"sveik",text:"2L vandens",xp:10,done:false},
{id:2,cat:"sveik",text:"60min be soc tinklų ir darbo",xp:10,done:false},
{id:3,cat:"sveik",text:"30min pasivaikščiojimas",xp:12,done:false},
{id:4,cat:"sveik",text:"50 atsispaudimų",xp:15,done:false},
{id:5,cat:"sveik",text:"20 prisitraukimų",xp:15,done:false},
{id:6,cat:"sveik",text:"3 kartai valgymas",xp:10,done:false},
{id:7,cat:"sveik",text:"24h be priklausomybių",xp:25,done:false},

{id:8,cat:"prod",text:"30min pas mamą",xp:20,done:false},
{id:9,cat:"prod",text:"Sutvarkyti namus",xp:25,done:false},
{id:10,cat:"prod",text:"5 pardavimo sutartys",xp:20,done:false},
{id:11,cat:"prod",text:"2h darbas garaže",xp:25,done:false},
{id:12,cat:"prod",text:"1 į skelbimus automobilis",xp:35,done:false},
{id:13,cat:"prod",text:"1 nupirktas automobilis",xp:35,done:false},
{id:14,cat:"prod",text:"1 parduotas automobilis",xp:35,done:false},
{id:15,cat:"prod",text:"Atidėliotas dalykas (1)",xp:20,done:false},
{id:16,cat:"prod",text:"Atidėliotas dalykas (2)",xp:30,done:false},

{id:17,cat:"tobul",text:"60min mokymasis",xp:15,done:false},
{id:18,cat:"tobul",text:"20 puslapių skaitymas",xp:15,done:false},
{id:19,cat:"tobul",text:"60min CE teorija",xp:20,done:false},
{id:20,cat:"tobul",text:"Dantys ryte",xp:10,done:false},
{id:21,cat:"tobul",text:"Dantys vakare",xp:15,done:false},
{id:22,cat:"tobul",text:"Prausimasis ryte",xp:15,done:false},
{id:23,cat:"tobul",text:"Prausimasis vakare",xp:15,done:false},
{id:24,cat:"tobul",text:"Diena be TV",xp:20,done:false}
];

/* LEVEL */
function addXP(v){
xp+=v;
coins+=Math.floor(v/2);
let old=level;

while(xp>=100){xp-=100;level++;}

if(level>old) alert("🔥 LEVEL UP!");
}

/* TRACK */
function track(t){
if(t.text==="50 atsispaudimų") stats.pushups+=50;
if(t.text==="20 prisitraukimų") stats.pullups+=20;
if(t.text==="60min be soc tinklų ir darbo") stats.nosocial+=60;

if(t.text==="5 pardavimo sutartys") stats.contracts+=5;
if(t.text==="1 parduotas automobilis") stats.sold++;

if(t.text.includes("Atidėliotas")) stats.delayed++;

if(t.text==="20 puslapių skaitymas") stats.books++;
if(t.text==="60min CE teorija") stats.ce+=60;
if(t.text==="Diena be TV") stats.notv++;
}

/* COMPLETE */
function completeTask(id){
let t=tasks.find(x=>x.id===id);
if(!t||t.done)return;

t.done=true;

addXP(t.xp);
track(t);

historyLog.push(t.text);

checkAchievements();
render();
}

/* RENDER */
function render(){
document.getElementById("level").innerText="Lygis "+level;
document.getElementById("xp").innerText=xp+"/100";
document.getElementById("coins").innerText=coins;
document.getElementById("bar").style.width=xp+"%";

renderCat("sveik");
renderCat("prod");
renderCat("tobul");

renderAch("achSveik");
renderAch("achProd");
renderAch("achTobul");
}

function renderCat(cat){
let div=document.getElementById(cat);
div.innerHTML="";
tasks.filter(t=>t.cat===cat).forEach(t=>{
let b=document.createElement("button");
b.className="task"+(t.done?" done":"");
b.innerText=(t.done?"✅ ":"⬜ ")+t.text;
if(!t.done) b.onclick=()=>completeTask(t.id);
div.appendChild(b);
});
}

/* ACH */
let achievements=[
{cat:"achSveik",stat:"pushups",req:100,reward:25,text:"100 atsispaudimų"},
{cat:"achProd",stat:"sold",req:3,reward:100,text:"3 parduoti"},
{cat:"achTobul",stat:"books",req:5,reward:50,text:"100 puslapių"}
];

function checkAchievements(){
achievements.forEach(a=>{
if(!a.done && stats[a.stat]>=a.req){
a.done=true;
coins+=a.reward;
alert("🏆 "+a.text);
}
});
}

function renderAch(cat){
let div=document.getElementById(cat);
div.innerHTML="";
achievements.filter(a=>a.cat===cat).forEach(a=>{
let b=document.createElement("button");
b.innerText=(a.done?"🏆 ":"🔒 ")+a.text;
div.appendChild(b);
});
}

/* MENU */
function toggle(id){
document.getElementById(id).classList.toggle("hidden");
}

/* INFO */
function showStats(){alert(JSON.stringify(stats,null,2));}
function showHistory(){alert(historyLog.join("\n"));}

/* RESET */
function resetGame(){
localStorage.clear();
location.reload();
}

/* INIT */
render();

</script>

</body>
</html>
