<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10K MISIJA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* === TAVO CSS PALIKTAS + PAPILDYTA === */

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#dbeafe,#f8fafc);
color:#0f172a;
}

.container{
max-width:500px;
margin:auto;
padding:16px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

h1{
font-size:26px;
font-weight:800;
color:#22c55e;
}

.menuBtn{
width:44px;
height:44px;
border-radius:12px;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.menu{
display:none;
margin-top:10px;
padding:16px;
border-radius:18px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.sectionBtn{
width:100%;
text-align:left;
padding:12px;
border-radius:12px;
background:#0f172a;
color:white;
margin-top:8px;
}

.section{
display:none;
margin-top:10px;
}

.task span{
flex:1;
word-break:break-word;
}

.xpBox{
display:flex;
justify-content:space-between;
margin-top:10px;
font-weight:700;
background:#ecfeff;
padding:10px;
border-radius:12px;
}

/* likęs tavo CSS */
.stat{display:flex;justify-content:space-between;margin-bottom:12px;}
.card{background:white;padding:16px;border-radius:20px;margin-top:16px;box-shadow:0 8px 25px rgba(0,0,0,0.06);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.toggleBtn{background:#0f172a;color:white;padding:6px 12px;border-radius:999px;font-size:12px;}
input, textarea{width:100%;padding:14px;border-radius:14px;border:1px solid #e5e7eb;background:#f9fafb;margin-top:10px;font-size:14px;}
.mainBtn{margin-top:12px;padding:14px;border:none;border-radius:14px;background:linear-gradient(90deg,#22c55e,#16a34a);color:white;font-weight:600;}
.progress{height:10px;background:#e5e7eb;border-radius:20px;margin-top:12px;overflow:hidden;}
.fill{height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);}
.big{font-size:26px;font-weight:800;margin-top:10px;}
.task{display:flex;justify-content:space-between;align-items:center;padding:12px;border-radius:12px;background:#f1f5f9;margin-top:8px;}
.log{display:none;margin-top:12px;}
.log-item{background:#0f172a;color:white;padding:10px;border-radius:10px;margin-bottom:8px;font-size:13px;}
.reset{margin-top:20px;padding:14px;width:100%;border:none;border-radius:14px;background:#ef4444;color:white;font-weight:600;}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h1>🎯 10K MISIJA</h1>
<div class="menuBtn" onclick="toggle('menu')">≡</div>
</div>

<!-- XP -->
<div class="xpBox">
<div>⭐ XP: <span id="xpText">0</span></div>
<div>🪙 Monetos: <span id="coinText">0</span></div>
</div>

<!-- MENU -->
<div id="menu" class="menu">

<div class="stat">
<span>Nupirkta: <b id="boughtText">0</b></span>
<button onclick="bought++;save();render()">+</button>
</div>

<div class="stat">
<span>Parduota: <b id="soldText">0</b></span>
<button onclick="sold++;save();render()">+</button>
</div>

<canvas id="chart"></canvas>

<!-- DAILY -->
<button class="sectionBtn" onclick="toggle('dailySection')">🔥 Kasdienės XP užduotys</button>
<div id="dailySection" class="section">

<div class="task"><span>Ikelti skelbimą (+50xp)</span><button onclick="addXP(50,'Skelbimas')">✔</button></div>
<div class="task"><span>Nupirkti auto (+100xp)</span><button onclick="addXP(100,'Pirkimas')">✔</button></div>
<div class="task"><span>Parduoti auto (+120xp)</span><button onclick="addXP(120,'Pardavimas')">✔</button></div>
<div class="task"><span>5 sutartys (+30xp)</span><button onclick="addXP(30,'Sutartys')">✔</button></div>
<div class="task"><span>5 skambučiai (+50xp)</span><button onclick="addXP(50,'Skambučiai')">✔</button></div>
<div class="task"><span>20min mokymosi (+50xp)</span><button onclick="addXP(50,'Mokymasis')">✔</button></div>

</div>

<!-- SHOP -->
<button class="sectionBtn" onclick="toggle('shopSection')">🛒 Apdovanojimai</button>
<div id="shopSection" class="section">

<div class="task"><span>Pica - 70</span><button onclick="buy(70,'Pica')">Pirkti</button></div>
<div class="task"><span>20€ sau - 100</span><button onclick="buy(100,'Pirkinys')">Pirkti</button></div>
<div class="task"><span>Kinas - 130</span><button onclick="buy(130,'Kinas')">Pirkti</button></div>
<div class="task"><span>Kartingai - 150</span><button onclick="buy(150,'Kartingai')">Pirkti</button></div>
<div class="task"><span>Masažas - 200</span><button onclick="buy(200,'Masazas')">Pirkti</button></div>
<div class="task"><span>Kelionė - 2000</span><button onclick="buy(2000,'Kelione')">Pirkti</button></div>

</div>

<!-- STATS -->
<button class="sectionBtn" onclick="toggle('statsSection')">📊 Statistika</button>
<div id="statsSection" class="section">
<div id="statsContent"></div>
</div>

<!-- GLOBAL LOG -->
<button class="sectionBtn" onclick="toggle('globalLogSection')">📜 Visas log</button>
<div id="globalLogSection" class="section">
<div id="globalLog"></div>
</div>

</div>

<!-- PROFIT -->
<div class="card">
<div class="card-header">
<h3>💰 PELNAS</h3>
<button class="toggleBtn" onclick="toggle('profitLog')">Log</button>
</div>

<input id="profitAmount" placeholder="Suma" type="number">
<textarea id="profitDesc" placeholder="Pvz: Xtrail pardavimas"></textarea>

<button class="mainBtn" onclick="addProfit()">Pridėti pelną</button>

<div class="progress"><div id="profitBar" class="fill"></div></div>
<p class="big" id="profitText"></p>

<div id="profitLog" class="log"></div>
</div>

<!-- TASKS -->
<div class="card">
<div class="card-header">
<h3>📌 UŽDUOTYS</h3>
<button class="toggleBtn" onclick="toggle('taskLog')">Log</button>
</div>

<input id="taskInput" placeholder="Įrašyk užduotį...">
<button class="mainBtn" onclick="addTask()">Pridėti</button>

<div id="taskList"></div>
<div id="taskLog" class="log"></div>
</div>

<button class="reset" onclick="resetAll()">RESET</button>

</div>

<script>

/* === TAVO KODAS + PAPILDYTA === */

let xp=0, coins=0, stats={};

function addXP(val,name){
xp+=val;
coins+=Math.floor(val/2);

stats[name]=(stats[name]||0)+1;

profitLogs.unshift({
time:now(),
text:`⭐ +${val}xp`,
desc:name
});

save();
render();
}

function buy(price,name){
if(coins<price){alert("Nepakanka monetų");return;}
coins-=price;

profitLogs.unshift({
time:now(),
text:`🛒`,
desc:`${name} nupirkta`
});

save();
render();
}

/* PATCH render */
const oldRender=render;
render=function(){
oldRender();

xpText.innerText=xp;
coinText.innerText=coins;

globalLog.innerHTML=profitLogs.map(l=>`
<div class="log-item">${l.time}<br>${l.text} (${l.desc})</div>
`).join("");

statsContent.innerHTML=Object.keys(stats).map(k=>`
<div class="task"><span>${k}</span><b>${stats[k]}</b></div>
`).join("");
}

/* STORAGE PATCH */
const oldSave=save;
save=function(){
oldSave();
localStorage.setItem("xp",xp);
localStorage.setItem("coins",coins);
localStorage.setItem("stats",JSON.stringify(stats));
}

const oldLoad=load;
load=function(){
oldLoad();
xp=parseInt(localStorage.getItem("xp"))||0;
coins=parseInt(localStorage.getItem("coins"))||0;
stats=JSON.parse(localStorage.getItem("stats"))||{};
}

</script>

</body>
</html>
