<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLIK</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#0a0f1f,#05070f);
  color: white;
  font-family: sans-serif;
  padding: 20px;
}
.card {
  background: #111827;
  padding: 16px;
  border-radius: 16px;
  margin-top: 15px;
}
button {
  width: 100%;
  padding: 16px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #00ff88;
  background: #111827;
  color: white;
  font-size: 16px;
}
.green {
  background: #00ff88;
  color: black;
  font-weight: bold;
  border: none;
}
.red {
  background: #ff4444;
  color: white;
  font-weight: bold;
  border: none;
}
</style>
</head>

<body>

<h1 style="color:#00ff88">KLIK</h1>

<div class="card">
  <h2 id="level"></h2>
  <p id="xp"></p>
  <div style="background:#333;height:10px;border-radius:10px;">
    <div id="bar" style="height:100%;background:#00ff88;width:0%"></div>
  </div>
</div>

<div class="card">
🔥 Serija: <span id="streak"></span> dienos
</div>

<div class="card">
<h2>Šiandienos užduotys</h2>
<div id="tasks"></div>
</div>

<button class="green" onclick="addXP(5)">+5 XP</button>
<button class="red" onclick="newDay()">Nauja diena</button>

<script>
let xp = 0;
let level = 1;
let streak = 0;

let tasks = [
  { id:1, text:"Perskaityti 20 puslapių", xp:10, done:false },
  { id:2, text:"100 atsispaudimų", xp:15, done:false },
  { id:3, text:"Susitvarkyti kambarį", xp:20, done:false },
  { id:4, text:"Pasivaikščioti 30 min", xp:10, done:false },
  { id:5, text:"Išmokti kažką naujo", xp:15, done:false }
];

// LOAD
const saved = localStorage.getItem("klik_game");
if(saved){
  const data = JSON.parse(saved);
  xp = data.xp || 0;
  level = data.level || 1;
  streak = data.streak || 0;
  tasks = data.tasks || tasks;
}

// SAVE
function save(){
  localStorage.setItem("klik_game", JSON.stringify({xp,level,streak,tasks}));
}

function addXP(amount){
  xp += amount;
  while(xp >= 100){
    xp -= 100;
    level++;
  }
  save();
  render();
}

function completeTask(id){
  tasks = tasks.map(t=>{
    if(t.id===id && !t.done){
      addXP(t.xp);
      return {...t, done:true};
    }
    return t;
  });
  save();
  render();
}

function newDay(){
  const allDone = tasks.every(t=>t.done);
  if(allDone){
    streak++;
    addXP(20);
  }
  tasks = tasks.map(t=>({...t, done:false}));
  save();
  render();
}

function render(){
  document.getElementById("level").innerText = "Lygis: " + level;
  document.getElementById("xp").innerText = "XP: " + xp + " / 100";
  document.getElementById("streak").innerText = streak;
  document.getElementById("bar").style.width = xp + "%";

  const div = document.getElementById("tasks");
  div.innerHTML = "";

  tasks.forEach(t=>{
    const btn = document.createElement("button");
    btn.innerText = (t.done?"✅ ":"⬜ ") + t.text + " (+"+t.xp+" XP)";
    btn.style.opacity = t.done ? 0.5 : 1;
    btn.onclick = ()=>completeTask(t.id);
    div.appendChild(btn);
  });
}

render();
</script>

</body>
</html>
