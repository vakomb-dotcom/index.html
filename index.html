<script>

// ===== STATE =====
let state = {
xp:0,
level:1,
coins:0,
totalTasks:0,
totalXP:0,
weeklyTasks:0,
historyLog:[],
lastDay:"",
tasks:[]
};

// ===== DEFAULT TASKS =====
const defaultTasks = [
{id:1,cat:"sveik",text:"50 atsispaudimų",xp:12},
{id:2,cat:"sveik",text:"20 prisitraukimų",xp:18},
{id:3,cat:"sveik",text:"2L vandens",xp:10},
{id:4,cat:"sveik",text:"30 min vaikščiojimas",xp:14},
{id:5,cat:"sveik",text:"20 min sportas",xp:16},
{id:6,cat:"sveik",text:"tempimai",xp:8},
{id:7,cat:"sveik",text:"8h miego",xp:12},
{id:8,cat:"sveik",text:"sveikas maistas",xp:15},

{id:9,cat:"prod",text:"planas",xp:10},
{id:10,cat:"prod",text:"laiškai",xp:10},
{id:11,cat:"prod",text:"tvarka",xp:8},
{id:12,cat:"prod",text:"gilus darbas",xp:18},
{id:13,cat:"prod",text:"be soc tinklų",xp:14},
{id:14,cat:"prod",text:"užduotis",xp:16},
{id:15,cat:"prod",text:"fokusas",xp:12},
{id:16,cat:"prod",text:"tikslai",xp:10},

{id:17,cat:"tobul",text:"skaityti",xp:12},
{id:18,cat:"tobul",text:"podcast",xp:10},
{id:19,cat:"tobul",text:"mokytis",xp:15},
{id:20,cat:"tobul",text:"refleksija",xp:10},
{id:21,cat:"tobul",text:"progresas",xp:12},
{id:22,cat:"tobul",text:"tikslai",xp:10},
{id:23,cat:"tobul",text:"idėjos",xp:14},
{id:24,cat:"tobul",text:"mokymasis",xp:16}
];

// ===== REWARDS =====
const rewards = [
{price:60,text:"picos vakarą"},
{price:100,text:"drabužį"},
{price:30,text:"scrollinimą"},
{price:50,text:"žaidimus"},
{price:80,text:"cheat maistą"},
{price:40,text:"filmą"},
{price:35,text:"kavą"}
];

// ===== INIT =====
function init(){
load();

if(!state.tasks.length){
state.tasks = defaultTasks.map(t=>({...t,done:false}));
}

render();
}

// ===== SAVE / LOAD =====
function save(){
localStorage.setItem("klik_ultra", JSON.stringify(state));
}

function load(){
let data = JSON.parse(localStorage.getItem("klik_ultra"));
if(data) state = data;
}

// ===== CORE =====
function addXP(val){
state.xp += val;
state.totalXP += val;
state.coins += Math.floor(val/2);

// level up loop (fix bug kai daug xp)
while(state.xp >= 100){
state.xp -= 100;
state.level++;
}

save();
}

function completeTask(id){

let t = state.tasks.find(x=>x.id===id);

// 🔒 jei jau atlikta → STOP
if(!t || t.done) return;

// 🔒 mark DONE iš karto (anti spam fix)
t.done = true;

state.totalTasks++;
state.weeklyTasks++;

addXP(t.xp);

log("atlikai "+t.text);

save();
render();
}

// ===== SHOP =====
function buy(i){
let r = rewards[i];
if(!r) return;

if(state.coins < r.price){
alert("❌ Neužtenka monetų");
return;
}

state.coins -= r.price;

log("atsiėmei "+r.text);

alert("🎁 Gavai: "+r.text);

save();
render();
}

// ===== WEEK =====
function weekReward(x,c,need){
if(state.weeklyTasks < need){
alert("Nepasiektas: "+state.weeklyTasks+"/"+need);
return;
}

state.xp += x;
state.coins += c;
state.weeklyTasks = 0;

log("week reward "+need);

save();
render();
}

// ===== UI =====
function render(){
document.getElementById("level").innerText="Lygis: "+state.level;
document.getElementById("xp").innerText="XP: "+state.xp+"/100";
document.getElementById("coins").innerText=state.coins;
document.getElementById("bar").style.width=state.xp+"%";

renderCategory("sveik");
renderCategory("prod");
renderCategory("tobul");
}

function renderCategory(cat){
let div = document.getElementById(cat);
div.innerHTML="";

state.tasks
.filter(t=>t.cat===cat)
.forEach(t=>{

let b=document.createElement("button");

b.className="task"+(t.done?" done":"");
b.innerText=(t.done?"✅ ":"⬜ ")+t.text+" (+"+t.xp+")";

// 🔒 disable jei done
if(t.done){
b.disabled = true;
}else{
b.onclick = ()=>completeTask(t.id);
}

div.appendChild(b);
});
}

// ===== HELPERS =====
function toggle(id){
document.getElementById(id).classList.toggle("hidden");
}

function log(txt){
state.historyLog.push(new Date().toLocaleTimeString()+" - "+txt);
}

function showHistory(){
if(!state.historyLog.length) return alert("Tuščia");
alert(state.historyLog.slice(-20).join("\n"));
}

function showStats(){
alert(`📊 Statistika
Užduotys: ${state.totalTasks}
XP: ${state.totalXP}`);
}

function showLevels(){
alert(`🏆 Lygiai
5 → unlock
10 → special
20 → PRO`);
}

function resetGame(){
if(confirm("Ištrinti viską?")){
localStorage.removeItem("klik_ultra");
location.reload();
}
}

// ===== START =====
init();

</script>
