<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10K MISIJA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
color:#111;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

.menuBtn{
background:#111;
color:white;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
}

.menu{
display:none;
background:white;
padding:15px;
border-radius:16px;
margin-top:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#16a34a;
font-size:34px;
font-weight:800;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.progress{
height:14px;
background:#e5e7eb;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.fill{
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
}

.big{
font-size:26px;
font-weight:800;
}

.week{
color:#2563eb;
}

input, textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #e5e7eb;
background:#f9fafb;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#16a34a;
color:white;
font-weight:600;
cursor:pointer;
}

.toggleBtn{
background:#111;
font-size:12px;
padding:6px 10px;
border-radius:10px;
width:auto;
}

.log{
display:none;
margin-top:10px;
background:#f1f5f9;
padding:10px;
border-radius:10px;
max-height:200px;
overflow:auto;
font-size:13px;
}

.reset{
background:#ef4444;
}

/* TASKS */
.task{
display:flex;
justify-content:space-between;
align-items:center;
background:#f8fafc;
padding:10px;
border-radius:10px;
margin-top:8px;
}

.task.done{
opacity:0.5;
text-decoration:line-through;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h1>🎯 10K MISIJA</h1>
<div class="menuBtn" onclick="toggle('menu')">☰</div>
</div>

<div id="menu" class="menu">

<div>Nupirkta: <b id="boughtText">0</b> <button onclick="bought++; save(); render()">+</button></div>
<div>Parduota: <b id="soldText">0</b> <button onclick="sold++; save(); render()">+</button></div>

<canvas id="chart"></canvas>

</div>

<!-- PROFIT -->
<div class="card">
<div class="card-header">
<h3>💰 PELNAS</h3>
<button class="toggleBtn" onclick="toggle('profitLog')">Log</button>
</div>

<input id="profitAmount" type="number">
<textarea id="profitDesc"></textarea>

<button onclick="addProfit()">Pridėti</button>

<div class="progress"><div id="profitBar" class="fill"></div></div>

<p class="big" id="profitText"></p>
<p class="week" id="weekProfit"></p>

<div id="profitLog" class="log"></div>
</div>

<!-- TASKS -->
<div class="card">
<div class="card-header">
<h3>📌 UŽDUOTYS</h3>
<button class="toggleBtn" onclick="toggle('taskLog')">Log</button>
</div>

<input id="taskInput" placeholder="Įrašyk užduotį...">
<button onclick="addTask()">Pridėti</button>

<div id="taskList"></div>
<div id="taskLog" class="log"></div>
</div>

<button class="reset" onclick="resetAll()">RESET</button>

</div>

<script>

let profit=0, profitLogs=[];
let bought=0, sold=0;
let tasks=[], taskLog=[], lastReset=null;
let chart;

function now(){return new Date().toLocaleString();}

// PROFIT
function addProfit(){
let val=parseInt(profitAmount.value);
if(!val) return;

profit+=val;
profitLogs.unshift(`${now()} — ${profitDesc.value} +${val}`);

profitAmount.value="";
profitDesc.value="";

save(); render(); updateChart();
}

// TASKS
function addTask(){
let t=taskInput.value.trim();
if(!t) return;

tasks.push({text:t,done:false});
taskInput.value="";
save(); renderTasks();
}

function toggleTask(i){
tasks[i].done=!tasks[i].done;

if(tasks[i].done){
taskLog.unshift(`${now()} — ${tasks[i].text}`);
}

save(); renderTasks();
}

function renderTasks(){
taskList.innerHTML=tasks.map((t,i)=>`
<div class="task ${t.done?'done':''}">
<span>${t.text}</span>
<input type="checkbox" ${t.done?'checked':''} onclick="toggleTask(${i})">
</div>
`).join("");

taskLog.innerHTML=taskLog.join("<br>");
}

// MIDNIGHT RESET
function checkReset(){
let today=new Date().toDateString();
if(lastReset!==today){
tasks=tasks.filter(t=>!t.done);
lastReset=today;
save();
}
}

// CHART
function updateChart(){
let map={};
profitLogs.forEach(l=>{
let d=l.split(",")[0];
let v=parseInt(l.split("+")[1]);
map[d]=(map[d]||0)+v;
});

if(chart) chart.destroy();

chart=new Chart(chart=document.getElementById("chart"),{
type:'line',
data:{labels:Object.keys(map),datasets:[{data:Object.values(map)}]}
});
}

// UI
function toggle(id){
let el=document.getElementById(id);
el.style.display=el.style.display==="block"?"none":"block";
}

function render(){
profitBar.style.width=Math.min(profit/10000*100,100)+"%";
profitText.innerText=`${profit}€ / 10 000€`;

profitLog.innerHTML=profitLogs.join("<br>");

boughtText.innerText=bought;
soldText.innerText=sold;

renderTasks();
}

// STORAGE
function save(){
localStorage.setItem("profit",profit);
localStorage.setItem("profitLogs",JSON.stringify(profitLogs));
localStorage.setItem("bought",bought);
localStorage.setItem("sold",sold);
localStorage.setItem("tasks",JSON.stringify(tasks));
localStorage.setItem("taskLog",JSON.stringify(taskLog));
localStorage.setItem("lastReset",lastReset);
}

function load(){
profit=parseInt(localStorage.getItem("profit"))||0;
profitLogs=JSON.parse(localStorage.getItem("profitLogs"))||[];
bought=parseInt(localStorage.getItem("bought"))||0;
sold=parseInt(localStorage.getItem("sold"))||0;
tasks=JSON.parse(localStorage.getItem("tasks"))||[];
taskLog=JSON.parse(localStorage.getItem("taskLog"))||[];
lastReset=localStorage.getItem("lastReset");
}

// RESET
function resetAll(){
if(!confirm("Reset?")) return;
localStorage.clear();
location.reload();
}

// INIT
load();
checkReset();
render();
updateChart();

</script>

</body>
</html>
