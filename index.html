<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTYVACIJOS</title>

<style>

body {
margin:0;
background:#f5f7fb;
font-family: system-ui;
color:#111;
}

.container {
max-width:520px;
margin:auto;
padding:20px;
}

h1 {
text-align:center;
color:#22c55e;
margin-bottom:20px;
}

/* CARD */
.card {
background:white;
padding:18px;
border-radius:20px;
margin-top:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

/* PROGRESS */
.progress {
height:10px;
background:#e5e7eb;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}
.fill {
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:0.4s;
}

/* BUTTONS */
button {
width:100%;
padding:14px;
margin-top:8px;
border-radius:14px;
border:none;
font-size:15px;
cursor:pointer;
font-weight:500;
}

button:hover {transform:scale(1.02);}
button:active {transform:scale(0.97);}
button:disabled {opacity:0.5;cursor:not-allowed;}

/* TOGGLES */
.toggle {
background:#f1f5f9;
color:#22c55e;
font-weight:600;
}

/* TASKS */
.task {
background:#f9fafb;
border:1px solid #e5e7eb;
display:flex;
justify-content:space-between;
align-items:center;
}

.task.done {
background:#dcfce7;
color:#166534;
}

/* SHOP */
.shop {
background:#fff7ed;
border:1px solid #fed7aa;
}

/* HIDDEN */
.hidden {display:none;}

</style>
</head>

<body>

<div class="container">

<h1>MOTYVACIJOS</h1>

<div class="card">
<h3 id="level"></h3>
<p id="xp"></p>

<div class="progress">
<div id="bar" class="fill"></div>
</div>

<p style="margin-top:10px;">💰 Monetos: <b id="coins"></b></p>
</div>

<div class="card">
<button class="toggle" onclick="toggle('sveik')">💪 Sveikata</button>
<div id="sveik" class="hidden"></div>

<button class="toggle" onclick="toggle('prod')">📋 Produktyvumas</button>
<div id="prod" class="hidden"></div>

<button class="toggle" onclick="toggle('tobul')">🧠 Tobulėjimas</button>
<div id="tobul" class="hidden"></div>
</div>

<div class="card">
<button class="toggle" onclick="toggle('shopWrap')">🎁 Apdovanojimai</button>
<div id="shopWrap" class="hidden">
<button class="shop" onclick="buy(2)">📱 Scrollinimas (30)</button>
<button class="shop" onclick="buy(6)">☕ Kava (35)</button>
<button class="shop" onclick="buy(5)">🎬 Filmas (40)</button>
<button class="shop" onclick="buy(3)">🎮 Žaidimai (50)</button>
<button class="shop" onclick="buy(0)">🍕 Picos vakaras (60)</button>
<button class="shop" onclick="buy(4)">🍔 Cheat maistas (80)</button>
<button class="shop" onclick="buy(1)">🛍️ Naujas drabužis (100)</button>
</div>
</div>

<div class="card">
<button class="toggle" onclick="toggle('menuWrap')">☰ MENIU</button>

<div id="menuWrap" class="hidden">
<button onclick="showStats()">📊 Statistika</button>
<button onclick="showLevels()">🏆 Lygiai</button>
<button onclick="showHistory()">📜 Istorija</button>

<button onclick="toggle('weekWrap')">📅 Savaitės tikslai</button>
<div id="weekWrap" class="hidden">
<button onclick="weekReward(50,20,10)">✔️ 10 → reward</button>
<button onclick="weekReward(120,50,25)">✔️ 25 → reward</button>
<button onclick="weekReward(250,120,50)">✔️ 50 → reward</button>
</div>

<button onclick="resetGame()">❌ Reset</button>
</div>
</div>

</div>

<script>

// === VISA TAVO LOGIKA PALIKTA ===

let xp=0, level=1, coins=0;
let totalTasks=0, totalXP=0;
let weeklyTasks=0;
let historyLog=[];

const rewards = [
{price:60,text:"picos vakarą"},
{price:100,text:"drabužį"},
{price:30,text:"scrollinimą"},
{price:50,text:"žaidimus"},
{price:80,text:"cheat maistą"},
{price:40,text:"filmą"},
{price:35,text:"kavą"}
];

function buy(i){
let r = rewards[i];
if(coins < r.price) return alert("❌ Neužtenka monetų");

coins -= r.price;
alert("🎁 Gavai: "+r.text);

save(); render();
}

function toggle(id){
document.getElementById(id).classList.toggle("hidden");
}

function addXP(val){
xp+=val;
totalXP+=val;
coins+=Math.floor(val/2);

while(xp>=100){
xp-=100;
level++;
}

save();
}

function completeTask(id){
let t = tasks.find(x=>x.id===id);
if(!t || t.done) return;

t.done=true;

addXP(t.xp);
totalTasks++;
weeklyTasks++;

save();
render();
}

// === TASKS (tavo paliktos) ===
let tasks = [...(JSON.parse(localStorage.getItem("klik_ultra_tasks"))||[])];

if(!tasks.length){
tasks = [
{id:1,cat:"sveik",text:"2L vandens",xp:10,done:false},
{id:2,cat:"sveik",text:"60min be soc tinklų",xp:10,done:false},
{id:3,cat:"sveik",text:"30min pasivaikščiojimas",xp:12,done:false},
{id:4,cat:"sveik",text:"50 atsispaudimų",xp:15,done:false},
{id:5,cat:"sveik",text:"20 prisitraukimų",xp:15,done:false},
{id:6,cat:"sveik",text:"3 valgiai",xp:10,done:false},
{id:7,cat:"sveik",text:"24h be priklausomybių",xp:25,done:false},

{id:8,cat:"prod",text:"30min pas mamą",xp:20,done:false},
{id:9,cat:"prod",text:"Sutvarkyti namus",xp:25,done:false},
{id:10,cat:"prod",text:"5 sutartys",xp:20,done:false},
{id:11,cat:"prod",text:"2h garažas",xp:25,done:false},
{id:12,cat:"prod",text:"1 skelbimas",xp:35,done:false},
{id:13,cat:"prod",text:"1 nupirktas auto",xp:35,done:false},
{id:14,cat:"prod",text:"1 parduotas auto",xp:35,done:false},
{id:15,cat:"prod",text:"Atidėliotas 1",xp:20,done:false},
{id:16,cat:"prod",text:"Atidėliotas 2",xp:30,done:false},

{id:17,cat:"tobul",text:"60min mokymasis",xp:15,done:false},
{id:18,cat:"tobul",text:"20 psl knyga",xp:15,done:false},
{id:19,cat:"tobul",text:"CE teorija",xp:20,done:false},
{id:20,cat:"tobul",text:"Dantys ryte",xp:10,done:false},
{id:21,cat:"tobul",text:"Dantys vakare",xp:15,done:false},
{id:22,cat:"tobul",text:"Prausimasis ryte",xp:15,done:false},
{id:23,cat:"tobul",text:"Prausimasis vakare",xp:15,done:false},
{id:24,cat:"tobul",text:"Be TV",xp:20,done:false}
];
}

function render(){
document.getElementById("level").innerText="Lygis: "+level;
document.getElementById("xp").innerText="XP: "+xp+"/100";
document.getElementById("coins").innerText=coins;
document.getElementById("bar").style.width=xp+"%";

renderCategory("sveik");
renderCategory("prod");
renderCategory("tobul");
}

function renderCategory(cat){
let div=document.getElementById(cat);
div.innerHTML="";

tasks.filter(t=>t.cat===cat).forEach(t=>{
let b=document.createElement("button");

b.className="task"+(t.done?" done":"");
b.textContent=(t.done?"✅ ":"⬜ ")+t.text+" (+"+t.xp+")";

if(!t.done) b.onclick=()=>completeTask(t.id);
else b.disabled=true;

div.appendChild(b);
});
}

function save(){
localStorage.setItem("klik_ultra_tasks", JSON.stringify(tasks));
localStorage.setItem("klik_ultra", JSON.stringify({xp,level,coins}));
}

function load(){
let d = JSON.parse(localStorage.getItem("klik_ultra"));
if(d){
xp=d.xp||0;
level=d.level||1;
coins=d.coins||0;
}
}

load();
render();

</script>

</body>
</html>
