<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10K MISIJA</title>

<style>
body{
margin:0;
font-family:Inter, Arial;
background:#f3f6fb;
color:#111;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#16a34a;
}

.card{
background:white;
padding:20px;
border-radius:16px;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.progress{
height:16px;
background:#e5e7eb;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.fill{
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:0.4s;
}

input, textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.log{
margin-top:15px;
max-height:200px;
overflow:auto;
font-size:14px;
background:#f9fafb;
padding:10px;
border-radius:10px;
}

.task{
display:flex;
align-items:center;
gap:10px;
background:#f9fafb;
padding:10px;
border-radius:10px;
margin-top:8px;
}

.task.done{
background:#dcfce7;
text-decoration:line-through;
}
.reset{
background:#ef4444;
}
.streak{
text-align:center;
font-weight:bold;
color:#16a34a;
}
</style>
</head>

<body>

<div class="container">

<h1>🎯 10K MISIJA</h1>

<div class="streak" id="streak">🔥 Streak: 0 dienų</div>

<!-- PROFIT -->
<div class="card">
<h3>💰 PELNAS (10 000€)</h3>

<input id="profitAmount" type="number" placeholder="Pvz 800">
<textarea id="profitDesc" placeholder="Pvz Xtrail pelnas"></textarea>

<button onclick="addProfit()">➕ Pridėti</button>

<div class="progress"><div id="profitBar" class="fill"></div></div>
<p id="profitText"></p>

<div id="profitLog" class="log"></div>
</div>

<!-- TURNOVER -->
<div class="card">
<h3>💸 APYVARTA (20 000€)</h3>

<input id="turnoverAmount" type="number">
<textarea id="turnoverDesc"></textarea>

<button onclick="addTurnover()">➕ Pridėti</button>

<div class="progress"><div id="turnoverBar" class="fill"></div></div>
<p id="turnoverText"></p>

<div id="turnoverLog" class="log"></div>
</div>

<!-- TASKS -->
<div class="card">
<h3>📋 VEIKSMAI</h3>

<input id="taskInput" placeholder="Pvz: išplauti mašiną">
<button onclick="addTask()">➕ Pridėti veiksmą</button>

<div id="taskList"></div>
</div>

<button class="reset" onclick="resetAll()">❌ RESET VISKĄ</button>

</div>

<script>

// STATE
let profit=0, turnover=0;
let profitLogs=[], turnoverLogs=[];
let tasks=[];
let streak=0;

// TIME
function now(){
return new Date().toLocaleString();
}

// ADD PROFIT
function addProfit(){
let val=parseInt(profitAmount.value);
if(!val) return;

profit+=val;
profitLogs.unshift(`${now()} — ${profitDesc.value} +${val}€`);

profitAmount.value="";
profitDesc.value="";

save(); render();
}

// ADD TURNOVER
function addTurnover(){
let val=parseInt(turnoverAmount.value);
if(!val) return;

turnover+=val;
turnoverLogs.unshift(`${now()} — ${turnoverDesc.value} +${val}€`);

turnoverAmount.value="";
turnoverDesc.value="";

save(); render();
}

// TASKS
function addTask(){
let text=taskInput.value;
if(!text) return;

tasks.push({text,done:false});
taskInput.value="";

save(); render();
}

function toggleTask(i){
tasks[i].done=!tasks[i].done;
save(); render();
}

// RENDER
function render(){

// bars
profitBar.style.width=Math.min(profit/10000*100,100)+"%";
turnoverBar.style.width=Math.min(turnover/20000*100,100)+"%";

// text
profitText.innerText=`${profit}€ / 10000€`;
turnoverText.innerText=`${turnover}€ / 20000€`;

// logs
profitLog.innerHTML=profitLogs.join("<br>");
turnoverLog.innerHTML=turnoverLogs.join("<br>");

// tasks
taskList.innerHTML="";
tasks.forEach((t,i)=>{
let div=document.createElement("div");
div.className="task"+(t.done?" done":"");
div.innerHTML=`<input type="checkbox" ${t.done?"checked":""} onclick="toggleTask(${i})"> ${t.text}`;
taskList.appendChild(div);
});

// streak
streakEl=document.getElementById("streak");
streakEl.innerText=`🔥 Streak: ${streak} dienų`;
}

// SAVE
function save(){
localStorage.setItem("p",profit);
localStorage.setItem("t",turnover);
localStorage.setItem("pl",JSON.stringify(profitLogs));
localStorage.setItem("tl",JSON.stringify(turnoverLogs));
localStorage.setItem("tasks",JSON.stringify(tasks));
localStorage.setItem("streak",streak);
}

// LOAD
function load(){
profit=parseInt(localStorage.getItem("p"))||0;
turnover=parseInt(localStorage.getItem("t"))||0;
profitLogs=JSON.parse(localStorage.getItem("pl"))||[];
turnoverLogs=JSON.parse(localStorage.getItem("tl"))||[];
tasks=JSON.parse(localStorage.getItem("tasks"))||[];
streak=parseInt(localStorage.getItem("streak"))||0;
}

// RESET
function resetAll(){
if(!confirm("Tikrai ištrinti viską?")) return;

localStorage.clear();

profit=0;
turnover=0;
profitLogs=[];
turnoverLogs=[];
tasks=[];
streak=0;

render();
}

// INIT
load();
render();

</script>

</body>
</html>
