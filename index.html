<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10K MISIJA</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#020617,#0f172a);
color:#e5e7eb;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#4ade80;
}

.card{
background:#111827;
padding:20px;
border-radius:16px;
margin-top:20px;
}

.progress{
height:14px;
background:#1f2937;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:0.4s;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
}

.log{
margin-top:15px;
max-height:200px;
overflow:auto;
font-size:14px;
background:#020617;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎯 10K PER 4 SAVAITES</h1>

<!-- PROFIT -->
<div class="card">
<h3>💰 PELNAS (tikslas 10 000€)</h3>

<input id="profitAmount" type="number" placeholder="Įrašyk pelną (pvz 800)">
<textarea id="profitDesc" placeholder="Pvz: Xtrail 2005 pelnas"></textarea>

<button onclick="addProfit()">➕ Pridėti pelną</button>

<div class="progress">
<div id="profitBar" class="fill"></div>
</div>

<p id="profitText">0€ / 10000€</p>

<div id="profitLog" class="log"></div>
</div>

<!-- TURNOVER -->
<div class="card">
<h3>💸 APYVARTA (tikslas 20 000€)</h3>

<input id="turnoverAmount" type="number" placeholder="Įrašyk sumą (pvz 1900)">
<textarea id="turnoverDesc" placeholder="Pvz: pardavimas"></textarea>

<button onclick="addTurnover()">➕ Pridėti apyvartą</button>

<div class="progress">
<div id="turnoverBar" class="fill"></div>
</div>

<p id="turnoverText">0€ / 20000€</p>

<div id="turnoverLog" class="log"></div>
</div>

</div>

<script>

// STATE
let profit = 0;
let turnover = 0;
let profitLogs = [];
let turnoverLogs = [];

// TIME
function now(){
return new Date().toLocaleString();
}

// ADD PROFIT
function addProfit(){
let amount = parseInt(document.getElementById("profitAmount").value);
let desc = document.getElementById("profitDesc").value;

if(!amount) return;

profit += amount;

let entry = `${now()} — ${desc} +${amount}€`;
profitLogs.unshift(entry);

save();
render();
}

// ADD TURNOVER
function addTurnover(){
let amount = parseInt(document.getElementById("turnoverAmount").value);
let desc = document.getElementById("turnoverDesc").value;

if(!amount) return;

turnover += amount;

let entry = `${now()} — ${desc} +${amount}€`;
turnoverLogs.unshift(entry);

save();
render();
}

// RENDER
function render(){

// bars
let pPercent = Math.min((profit/10000)*100,100);
let tPercent = Math.min((turnover/20000)*100,100);

document.getElementById("profitBar").style.width = pPercent+"%";
document.getElementById("turnoverBar").style.width = tPercent+"%";

// text
document.getElementById("profitText").innerText = `${profit}€ / 10000€`;
document.getElementById("turnoverText").innerText = `${turnover}€ / 20000€`;

// logs
document.getElementById("profitLog").innerHTML = profitLogs.join("<br>");
document.getElementById("turnoverLog").innerHTML = turnoverLogs.join("<br>");
}

// SAVE
function save(){
localStorage.setItem("tracker_profit", profit);
localStorage.setItem("tracker_turnover", turnover);
localStorage.setItem("tracker_profit_logs", JSON.stringify(profitLogs));
localStorage.setItem("tracker_turnover_logs", JSON.stringify(turnoverLogs));
}

// LOAD
function load(){
profit = parseInt(localStorage.getItem("tracker_profit")) || 0;
turnover = parseInt(localStorage.getItem("tracker_turnover")) || 0;
profitLogs = JSON.parse(localStorage.getItem("tracker_profit_logs")) || [];
turnoverLogs = JSON.parse(localStorage.getItem("tracker_turnover_logs")) || [];
}

// INIT
load();
render();

</script>

</body>
</html>
