<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLIK MAX</title>

<style>
body{
  margin:0;
  background:#05070f;
  color:white;
  font-family:system-ui;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111827;
  padding:16px;
  border-radius:18px;
  margin-top:15px;
  box-shadow:0 0 15px rgba(0,255,136,0.15);
}

button{
  width:100%;
  padding:16px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  font-size:16px;
}

.task{
  background:#0f172a;
  border:1px solid #00ff88;
}

.task.done{
  background:#14532d;
  opacity:0.6;
}

.progress{
  height:12px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:#00ff88;
  transition:0.3s;
}
</style>
</head>

<body>

<div class="container">

<h1 style="color:#00ff88;text-align:center;">KLIK MAX</h1>

<div class="card">
<h2 id="level"></h2>
<p id="xp"></p>
<div class="progress"><div id="bar" class="fill"></div></div>
<p>💰 <span id="coins"></span> | 🔥 <span id="streak"></span></p>
</div>

<div class="card">
<h3>🎯 Misijos</h3>
<div id="tasks"></div>
</div>

<div class="card">
<h3>🏆 Achievements</h3>
<div id="achievements"></div>
</div>

<button onclick="addXP(5)">⚡ Quick XP</button>
<button onclick="newDay()">🔄 Nauja diena</button>

</div>

<script>
let xp=0,level=1,coins=0,streak=0,combo=1;

let tasks=[
 {id:1,text:"📖 Skaityti",xp:8,done:false},
 {id:2,text:"💪 Sportas",xp:8,done:false},
 {id:3,text:"🏠 Tvarka",xp:30,done:false},
 {id:4,text:"🚶‍♂️ Pasivaikščiojimas",xp:20,done:false},
 {id:5,text:"🧠 Mokymasis",xp:15,done:false}
];

let achievements=[
 {id:1,text:"Pirma užduotis",done:false},
 {id:2,text:"5 užduotys iš eilės",done:false},
 {id:3,text:"100 XP per dieną",done:false}
];

// DAILY RESET
let today=new Date().toDateString();
let saved=JSON.parse(localStorage.getItem("klik_max")||"{}");

if(saved.date!==today){
 tasks.forEach(t=>t.done=false);
}else{
 Object.assign(window,saved);
}

function save(){
 localStorage.setItem("klik_max",JSON.stringify({
  xp,level,coins,streak,combo,tasks,achievements,date:today
 }));
}

// XP SYSTEM
function addXP(val){
 let gain=val*combo;

 xp+=gain;
 coins+=Math.floor(gain/2);

 if(combo<3) combo+=0.2;

 while(xp>=100){
  xp-=100;
  level++;
 }

 randomReward();
 checkAchievements();

 animate("+"+gain+" XP");
 save();
 render();
}

// RANDOM REWARD
function randomReward(){
 if(Math.random()<0.2){
  coins+=10;
  animate("🎁 +10 coins");
 }
}

// TASK CLICK
function completeTask(id){
 tasks=tasks.map(t=>{
  if(t.id===id && !t.done){
   addXP(t.xp);
   return {...t,done:true};
  }
  return t;
 });
 render();
}

// NEW DAY
function newDay(){
 if(tasks.every(t=>t.done)){
  streak++;
  combo=1;
 }
 tasks.forEach(t=>t.done=false);
 save();
 render();
}

// ACHIEVEMENTS
function checkAchievements(){
 if(tasks.some(t=>t.done)){
  achievements[0].done=true;
 }
 if(tasks.filter(t=>t.done).length>=5){
  achievements[1].done=true;
 }
 if(xp>=100){
  achievements[2].done=true;
 }
}

// UI
function render(){
 levelEl.innerText="Lygis "+level;
 xpEl.innerText="XP: "+xp;
 coinsEl.innerText=coins+" coins";
 streakEl.innerText=streak+" streak";
 bar.style.width=xp+"%";

 tasksDiv.innerHTML="";
 tasks.forEach(t=>{
  let b=document.createElement("button");
  b.className="task"+(t.done?" done":"");
  b.innerText=(t.done?"✅ ":"⬜ ")+t.text;
  b.onclick=()=>completeTask(t.id);
  tasksDiv.appendChild(b);
 });

 achDiv.innerHTML="";
 achievements.forEach(a=>{
  let el=document.createElement("div");
  el.innerText=(a.done?"🏆 ":"🔒 ")+a.text;
  achDiv.appendChild(el);
 });
}

// ANIMATION
function animate(text){
 let el=document.createElement("div");
 el.innerText=text;
 el.style.position="fixed";
 el.style.top="50%";
 el.style.left="50%";
 el.style.transform="translate(-50%,-50%)";
 el.style.color="#00ff88";
 el.style.fontSize="24px";
 document.body.appendChild(el);
 setTimeout(()=>el.remove(),800);
}

// refs
const levelEl=document.getElementById("level");
const xpEl=document.getElementById("xp");
const coinsEl=document.getElementById("coins");
const streakEl=document.getElementById("streak");
const bar=document.getElementById("bar");
const tasksDiv=document.getElementById("tasks");
const achDiv=document.getElementById("achievements");

render();
</script>

</body>
</html>
