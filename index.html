<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Švara</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f7fb;
    color: #111;
}
.header {
    height: 180px;
    background: url('https://images.unsplash.com/photo-1581578731548-c64695cc6952') center/cover;
}
.container {
    max-width: 520px;
    margin: -60px auto 20px;
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
h1 {
    text-align: center;
    margin-bottom: 20px;
}
.card {
    background: #f1f5f9;
    padding: 16px;
    border-radius: 14px;
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.card span {
    font-size: 16px;
}
input[type="checkbox"] {
    width: 22px;
    height: 22px;
}
.total {
    text-align: center;
    font-size: 22px;
    margin-top: 15px;
}
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
.hidden { display:none; }
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}
</style>
</head>
<body>

<div class="header"></div>

<div class="container" id="servicesPage">
<h1>Pasirink paslaugas</h1>

<div class="card"><span>Siurbimas + plastikai + stiklai (50€)</span><input type="checkbox" value="50"></div>
<div class="card"><span>Cheminis valymas (90€)</span><input type="checkbox" value="90"></div>
<div class="card"><span>Poliravimas 1 step (150€)</span><input type="checkbox" value="150"></div>
<div class="card"><span>Žibintų poliravimas (35€)</span><input type="checkbox" value="35"></div>
<div class="card"><span>Smulkių defektų maskavimas (30€)</span><input type="checkbox" value="30"></div>

<div class="total">Bendra: <span id="total">0</span> €</div>

<button onclick="goToForm()">Registruotis</button>
</div>

<div class="container hidden" id="formPage">
<h1>Registracija</h1>

<input placeholder="Markė">
<input placeholder="Modelis">
<input placeholder="Miestas">
<input placeholder="Telefono numeris">

<label>Data</label>
<input type="date">

<label>Laikas</label>
<select>
<option>09:00</option>
<option>12:00</option>
<option>15:00</option>
<option>18:00</option>
</select>

<div class="total">Suma: <span id="finalTotal">0</span> €</div>

<button onclick="submitForm()">Registruotis</button>
</div>

<script>
// FIX: saugiai skaičiuoja kainą ir netikrina neegzistuojančio elemento
const checkboxes = document.querySelectorAll('#servicesPage input[type="checkbox"]');

function calculateTotal() {
    let total = 0;
    checkboxes.forEach(c => {
        if (c.checked) total += parseInt(c.value);
    });

    document.getElementById('total').innerText = total;

    const finalEl = document.getElementById('finalTotal');
    if (finalEl) {
        finalEl.innerText = total;
    }
}

checkboxes.forEach(cb => {
    cb.addEventListener('change', calculateTotal);
});

function goToForm() {
    calculateTotal(); // kad persiduotų suma
    document.getElementById('servicesPage').classList.add('hidden');
    document.getElementById('formPage').classList.remove('hidden');
}

function submitForm() {
    alert("Užklausa gauta!");
}
</script>

</body>
</html>
