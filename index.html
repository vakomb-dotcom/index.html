<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Švara</title>

<style>
body {
    font-family: -apple-system, Arial;
    margin: 0;
    background: #f5f7fb;
    color: #111;
}
.header {
    height: 200px;
    background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url('https://dealerinspire-image-library-prod.s3.us-east-1.amazonaws.com/images/HuEh1RqD45cPDAWUGk5UdAY2tDpQal8Zdy7zYm1A.jpg') center/cover;
}
.container {
    max-width: 480px;
    margin: -70px auto 20px;
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
h1 { text-align:center; }

.card {
    background: #f1f5f9;
    padding: 14px;
    border-radius: 12px;
    margin: 8px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
}

input[type="checkbox"] {
    width:20px;
    height:20px;
}

.total {
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-top:15px;
}

button {
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:16px;
}

.hidden { display:none; }

.form {
    display:flex;
    flex-direction:column;
    align-items:center;
}

.form input, .form select {
    width:100%;
    max-width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
    box-sizing:border-box;
}

h3 {
    margin-top: 20px;
    margin-bottom: 5px;
    color: #555;
}
</style>
</head>
<body>

<div class="header"></div>

<div class="container" id="servicesPage">
<h1>Pasirink paslaugas</h1>

<h3>Vidus</h3>
<div class="card"><span>Siurbimas (15€)</span><input type="checkbox" value="15"></div>
<div class="card"><span>Panelės ir plastmasių valymas (10€)</span><input type="checkbox" value="10"></div>
<div class="card"><span>Stiklų valymas (10€)</span><input type="checkbox" value="10"></div>
<div class="card"><span>Cheminis valymas (120€)</span><input type="checkbox" value="120"></div>

<h3>Išorė</h3>
<div class="card"><span>Padangų juodinimas (5€)</span><input type="checkbox" value="5"></div>
<div class="card"><span>Ratlankių cheminis valymas (20€)</span><input type="checkbox" value="20"></div>
<div class="card"><span>Smulkių defektų maskavimas (30€)</span><input type="checkbox" value="30"></div>
<div class="card"><span>1 žingsnio poliravimas (150€)</span><input type="checkbox" value="150"></div>

<div class="total">Bendra: <span id="total">0</span> €</div>

<button onclick="goToForm()">Užsakyti paslaugas</button>
</div>

<div class="container hidden" id="formPage">
<h1>Registracija</h1>

<form action="https://formspree.io/f/xpqkqbbw" method="POST">

<div class="form">
<input name="Marke" id="marke" placeholder="Markė">
<input name="Modelis" id="modelis" placeholder="Modelis">
<input name="Miestas" id="miestas" placeholder="Miestas">
<input name="Telefonas" id="tel" placeholder="Telefonas">

<label>Data</label>
<input name="Data" id="data" type="date">

<label>Laikas</label>
<select name="Laikas" id="laikas">
<option>09:00</option>
<option>12:00</option>
<option>15:00</option>
<option>18:00</option>
</select>
</div>

<input type="hidden" name="Suma" id="hiddenTotal">

<div class="total">Suma: <span id="finalTotal">0</span> €</div>

<button type="submit">Registruotis</button>

</form>
</div>

<script>
const checkboxes = document.querySelectorAll('#servicesPage input[type="checkbox"]');
const cards = document.querySelectorAll('.card');

function calculateTotal(){
    let total = 0;
    checkboxes.forEach(c=>{
        if(c.checked) total += Number(c.value);
    });
    document.getElementById('total').innerText = total;
    const f = document.getElementById('finalTotal');
    if(f) f.innerText = total;

    document.getElementById('hiddenTotal').value = total + "€";
}

// CLICK ant visos kortelės
cards.forEach((card, index)=>{
    card.addEventListener('click', (e)=>{
        if(e.target.tagName !== 'INPUT'){
            const checkbox = checkboxes[index];
            checkbox.checked = !checkbox.checked;
        }
        calculateTotal();
    });
});

// checkbox fallback
checkboxes.forEach(cb=>{
    cb.addEventListener('change', calculateTotal);
});

function goToForm(){
    calculateTotal();
    document.getElementById('servicesPage').classList.add('hidden');
    document.getElementById('formPage').classList.remove('hidden');
}
</script>

</body>
</html>
