<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10K MISIJA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e0f2fe,#f8fafc);
color:#0f172a;
}

.container{
max-width:720px;
margin:auto;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
font-size:30px;
font-weight:800;
background:linear-gradient(90deg,#16a34a,#22c55e);
-webkit-background-clip:text;
color:transparent;
}

.menuBtn{
background:linear-gradient(90deg,#111,#333);
color:white;
padding:8px 14px;
border-radius:12px;
cursor:pointer;
}

.menu{
display:none;
margin-top:12px;
padding:20px;
border-radius:18px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.stat{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.8);
backdrop-filter:blur(12px);
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card-header{
display:flex;
justify-content:space-between;
align-items:center;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#16a34a);
color:white;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.02);
}

.toggleBtn{
background:#0f172a;
padding:6px 10px;
font-size:12px;
width:auto;
}

input, textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #e5e7eb;
background:#f8fafc;
}

.progress{
height:14px;
background:#e5e7eb;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.fill{
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
}

.big{font-size:24px;font-weight:800;}
.week{color:#2563eb;}

.log{
display:none;
margin-top:10px;
background:#0f172a;
color:#e2e8f0;
padding:12px;
border-radius:12px;
max-height:200px;
overflow:auto;
font-size:13px;
}

.task{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#f1f5f9;
border-radius:10px;
margin-top:8px;
transition:0.2s;
}

.task:hover{
background:#e2e8f0;
}

.task.done{
opacity:0.5;
text-decoration:line-through;
}

.reset{
background:#ef4444;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h1>🎯 10K MISIJA</h1>
<div class="menuBtn" onclick="toggle('menu')">☰</div>
</div>

<div id="menu" class="menu">
<div class="stat">Nupirkta: <b id="boughtText">0</b> <button onclick="bought++;save();render()">+</button></div>
<div class="stat">Parduota: <b id="soldText">0</b> <button onclick="sold++;save();render()">+</button></div>
<canvas id="chart"></canvas>
</div>

<!-- PROFIT -->
<div class="card">
<div class="card-header">
<h3>💰 PELNAS</h3>
<button class="toggleBtn" onclick="toggle('profitLog')">Log</button>
</div>

<input id="profitAmount" type="number" placeholder="Suma">
<textarea id="profitDesc" placeholder="Aprašymas"></textarea>

<button onclick="addProfit()">Pridėti pelną</button>

<div class="progress"><div id="profitBar" class="fill"></div></div>

<p class="big" id="profitText"></p>
<p class="week" id="weekProfit"></p>

<div id="profitLog" class="log"></div>
</div>

<!-- TASKS -->
<div class="card">
<div class="card-header">
<h3>📌 UŽDUOTYS</h3>
<button class="toggleBtn" onclick="toggle('taskLog')">Log</button>
</div>

<input id="taskInput" placeholder="Įrašyk užduotį...">
<button onclick="addTask()">Pridėti</button>

<div id="taskList"></div>
<div id="taskLog" class="log"></div>
</div>

<button class="reset" onclick="resetAll()">RESET</button>

</div>

<script>

let profit=0, profitLogs=[];
let bought=0, sold=0;
let tasks=[], taskLogs=[];
let lastReset=null;
let chart;

function now(){
let d=new Date();
return d.toLocaleString('lt-LT');
}

// PROFIT
function addProfit(){
let val=parseInt(profitAmount.value);
if(!val) return;

let desc=profitDesc.value || "—";

profit+=val;

profitLogs.unshift(`${now()} — 💰 +${val}€ (${desc})`);

profitAmount.value="";
profitDesc.value="";

save(); render(); updateChart();
}

// TASKS
function addTask(){
let t=taskInput.value.trim();
if(!t) return;

tasks.push({text:t,done:false});
taskInput.value="";
save(); renderTasks();
}

function toggleTask(i){
tasks[i].done=!tasks[i].done;

if(tasks[i].done){
taskLogs.unshift(`${now()} — ✅ ${tasks[i].text}`);
}

save(); renderTasks();
}

function renderTasks(){
taskList.innerHTML=tasks.map((t,i)=>`
<div class="task ${t.done?'done':''}">
<span>${t.text}</span>
<input type="checkbox" ${t.done?'checked':''} onclick="toggleTask(${i})">
</div>
`).join("");

taskLog.innerHTML=taskLogs.join("<br>");
}

// MIDNIGHT
function checkReset(){
let today=new Date().toDateString();
if(lastReset!==today){
tasks=tasks.filter(t=>!t.done);
lastReset=today;
save();
}
}

// CHART
function updateChart(){
let map={};
profitLogs.forEach(l=>{
let d=l.split(",")[0];
let v=parseInt(l.match(/\+(\d+)/)?.[1]||0);
map[d]=(map[d]||0)+v;
});

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:'line',
data:{
labels:Object.keys(map),
datasets:[{data:Object.values(map),borderColor:'#22c55e'}]
}
});
}

// UI
function toggle(id){
let el=document.getElementById(id);
el.style.display=el.style.display==="block"?"none":"block";
}

function render(){
profitBar.style.width=Math.min(profit/10000*100,100)+"%";
profitText.innerText=`${profit}€ / 10 000€`;

profitLog.innerHTML=profitLogs.join("<br>");

boughtText.innerText=bought;
soldText.innerText=sold;

renderTasks();
}

// STORAGE
function save(){
localStorage.setItem("profit",profit);
localStorage.setItem("profitLogs",JSON.stringify(profitLogs));
localStorage.setItem("bought",bought);
localStorage.setItem("sold",sold);
localStorage.setItem("tasks",JSON.stringify(tasks));
localStorage.setItem("taskLogs",JSON.stringify(taskLogs));
localStorage.setItem("lastReset",lastReset);
}

function load(){
profit=parseInt(localStorage.getItem("profit"))||0;
profitLogs=JSON.parse(localStorage.getItem("profitLogs"))||[];
bought=parseInt(localStorage.getItem("bought"))||0;
sold=parseInt(localStorage.getItem("sold"))||0;
tasks=JSON.parse(localStorage.getItem("tasks"))||[];
taskLogs=JSON.parse(localStorage.getItem("taskLogs"))||[];
lastReset=localStorage.getItem("lastReset");
}

// RESET
function resetAll(){
if(!confirm("Tikrai reset?")) return;
localStorage.clear();
location.reload();
}

// INIT
load();
checkReset();
render();
updateChart();

</script>

</body>
</html>
