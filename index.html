<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLIK APP</title>

<style>
body{
  margin:0;
  background:#f5f7fb;
  color:#111;
  font-family:system-ui;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:16px;
  border-radius:16px;
  margin-top:15px;
  box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

h1{
  text-align:center;
  color:#16a34a;
}

.progress{
  height:10px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:#22c55e;
  transition:0.3s;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  font-size:15px;
}

button:active{
  transform:scale(0.97);
}

.task{
  background:#f1f5f9;
  border:1px solid #22c55e;
}

.task.done{
  background:#dcfce7;
  opacity:0.7;
}

.shop{
  background:#fff7ed;
  border:1px solid #f59e0b;
}

.dropdown{
  font-weight:bold;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.hidden{
  display:none;
}

.section-title{
  margin-top:10px;
  font-weight:bold;
  color:#374151;
}
</style>
</head>

<body>

<div class="container">

<h1>KLIK</h1>

<div class="card">
<h2 id="level"></h2>
<p id="xp"></p>

<div class="progress">
<div id="bar" class="fill"></div>
</div>

<p>💰 Coins: <span id="coins"></span></p>
<p>🔥 Streak: <span id="streak"></span></p>
</div>

<!-- TASKS -->
<div class="card">
<div class="dropdown" onclick="toggle('tasksBox')">
<span>🎯 Užduotys</span>
<span>▼</span>
</div>

<div id="tasksBox">

<div class="section-title">📚 Produktyvumas</div>
<div id="prod"></div>

<div class="section-title">💪 Sveikata</div>
<div id="health"></div>

<div class="section-title">🧠 Tobulėjimas</div>
<div id="grow"></div>

</div>
</div>

<!-- SHOP -->
<div class="card">
<div class="dropdown" onclick="toggle('shopBox')">
<span>🛒 Shop</span>
<span>▼</span>
</div>

<div id="shopBox" class="hidden">
<button class="shop" onclick="buy(50)">🍕 Pica (50)</button>
<button class="shop" onclick="buy(70)">🛍️ Vinted (70)</button>
<button class="shop" onclick="buy(20)">📱 TikTok 1h (20)</button>
</div>
</div>

<button onclick="addXP(5)">⚡ Quick XP</button>
<button onclick="newDay()">🔄 Nauja diena</button>

</div>

<script>

// STATE
let xp=0, level=1, coins=0, streak=0;

// TASKS (8 + 8 + 8)
let tasks=[

// PRODUKTYVUMAS
{id:1,cat:"prod",text:"Skaityti 20 puslapių",xp:8,done:false},
{id:2,cat:"prod",text:"Parašyti planą",xp:10,done:false},
{id:3,cat:"prod",text:"Susitvarkyti stalą",xp:6,done:false},
{id:4,cat:"prod",text:"Mokytis 30 min",xp:12,done:false},
{id:5,cat:"prod",text:"Sutvarkyti emailus",xp:6,done:false},
{id:6,cat:"prod",text:"Padaryti svarbų darbą",xp:15,done:false},
{id:7,cat:"prod",text:"1h be telefono",xp:20,done:false},
{id:8,cat:"prod",text:"Fokusas 1h",xp:15,done:false},

// SVEIKATA
{id:9,cat:"health",text:"50 atsispaudimų",xp:8,done:false},
{id:10,cat:"health",text:"30 min pasivaikščiojimas",xp:20,done:false},
{id:11,cat:"health",text:"2L vandens",xp:10,done:false},
{id:12,cat:"health",text:"Sportas 20min",xp:18,done:false},
{id:13,cat:"health",text:"Sveikas maistas",xp:12,done:false},
{id:14,cat:"health",text:"Meditacija",xp:10,done:false},
{id:15,cat:"health",text:"8h miego",xp:15,done:false},
{id:16,cat:"health",text:"Judėjimas dienoje",xp:12,done:false},

// TOBULĖJIMAS
{id:17,cat:"grow",text:"Išmokti kažką naujo",xp:15,done:false},
{id:18,cat:"grow",text:"Podcast",xp:10,done:false},
{id:19,cat:"grow",text:"Edukacinis video",xp:8,done:false},
{id:20,cat:"grow",text:"Rašyti mintis",xp:10,done:false},
{id:21,cat:"grow",text:"Skaityti apie verslą",xp:12,done:false},
{id:22,cat:"grow",text:"Generuoti idėjas",xp:12,done:false},
{id:23,cat:"grow",text:"Spręsti problemą",xp:15,done:false},
{id:24,cat:"grow",text:"Kurti kažką",xp:20,done:false}

];

// TOGGLE
function toggle(id){
 document.getElementById(id).classList.toggle("hidden");
}

// XP
function addXP(val){
 xp+=val;
 coins+=Math.floor(val/2);

 if(xp>=100){
  xp-=100;
  level++;
 }

 save();
 render();
}

// TASK CLICK
function completeTask(id){
 tasks=tasks.map(t=>{
  if(t.id===id && !t.done){
   addXP(t.xp);
   return {...t,done:true};
  }
  return t;
 });
 render();
}

// NEW DAY
function newDay(){
 if(tasks.every(t=>t.done)){
  streak++;
  addXP(30);
 }

 tasks=tasks.map(t=>({...t,done:false}));

 save();
 render();
}

// SHOP
function buy(price){
 if(coins>=price){
  coins-=price;
  alert("Nupirkta!");
 }
 save();
 render();
}

// RENDER
function render(){
 level.innerText="Lygis: "+level;
 xpText.innerText="XP: "+xp+"/100";
 coinsEl.innerText=coins;
 streakEl.innerText=streak;
 bar.style.width=xp+"%";

 renderCat("prod");
 renderCat("health");
 renderCat("grow");
}

// RENDER CATEGORY
function renderCat(cat){
 let div=document.getElementById(cat);
 div.innerHTML="";

 tasks.filter(t=>t.cat===cat).forEach(t=>{
  let b=document.createElement("button");
  b.className="task"+(t.done?" done":"");
  b.innerText=(t.done?"✅ ":"⬜ ")+t.text+" (+"+t.xp+")";
  b.onclick=()=>completeTask(t.id);
  div.appendChild(b);
 });
}

// SAVE
function save(){
 localStorage.setItem("klik_light", JSON.stringify({xp,level,coins,streak,tasks}));
}

// LOAD
function load(){
 let data=JSON.parse(localStorage.getItem("klik_light"));
 if(data){
  xp=data.xp||0;
  level=data.level||1;
  coins=data.coins||0;
  streak=data.streak||0;
  tasks=data.tasks||tasks;
 }
}

// REFS
const level=document.getElementById("level");
const xpText=document.getElementById("xp");
const coinsEl=document.getElementById("coins");
const streakEl=document.getElementById("streak");
const bar=document.getElementById("bar");

// START
load();
render();

</script>

</body>
</html>
