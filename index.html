<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTYVACIJOS</title>

<style>

body {
margin:0;
background: linear-gradient(180deg,#0f172a,#111827,#020617);
color:#e5e7eb;
font-family: system-ui;
}

.container {
max-width:500px;
margin:auto;
padding:20px;
}

h1 {
text-align:center;
color:#4ade80;
letter-spacing:1px;
}

.card {
background:rgba(17,24,39,0.8);
backdrop-filter: blur(12px);
padding:18px;
border-radius:20px;
margin-top:15px;
border:1px solid rgba(255,255,255,0.05);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.progress {
height:12px;
background:#1f2937;
border-radius:20px;
overflow:hidden;
margin-top:8px;
}

.fill {
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:0.4s;
}

button {
width:100%;
padding:14px;
margin-top:10px;
border-radius:14px;
border:none;
cursor:pointer;
}

.toggle {
background:#1f2937;
color:#4ade80;
}

.task {
background:#020617;
border:1px solid #1f2937;
text-align:left;
}

.task.done {
background:#052e1b;
color:#4ade80;
}

.shop {
background:#1f2937;
border:1px solid #facc15;
color:#facc15;
}

.hidden {display:none;}

</style>
</head>

<body>

<div class="container">

<h1>MOTYVACIJOS</h1>

<div class="card">
<h2 id="level"></h2>
<p id="xp"></p>
<div class="progress"><div id="bar" class="fill"></div></div>
<p>💰 Monetos: <span id="coins"></span></p>
</div>

<div class="card">
<button class="toggle" onclick="toggle('sveik')">💪 Sveikata</button>
<div id="sveik" class="hidden"></div>

<button class="toggle" onclick="toggle('prod')">📋 Produktyvumas</button>
<div id="prod" class="hidden"></div>

<button class="toggle" onclick="toggle('tobul')">🧠 Tobulėjimas</button>
<div id="tobul" class="hidden"></div>
</div>

<div class="card">
<button class="toggle" onclick="toggle('shopWrap')">🎁 Apdovanojimai</button>
<div id="shopWrap" class="hidden">
<button class="shop" onclick="buy(2)">📱 Scrollinimas (30)</button>
<button class="shop" onclick="buy(6)">☕ Kava (35)</button>
<button class="shop" onclick="buy(5)">🎬 Filmas (40)</button>
<button class="shop" onclick="buy(3)">🎮 Žaidimai (50)</button>
<button class="shop" onclick="buy(0)">🍕 Pica (60)</button>
<button class="shop" onclick="buy(4)">🍔 Cheat (80)</button>
<button class="shop" onclick="buy(1)">🛍️ Drabužis (100)</button>
</div>
</div>

<div class="card">
<button class="toggle" onclick="toggle('menuWrap')">☰ MENIU</button>

<div id="menuWrap" class="hidden">

<button onclick="showStats()">📊 Statistika</button>
<button onclick="showLevels()">🏆 Lygiai</button>
<button onclick="showHistory()">📜 Istorija</button>

<button onclick="toggle('achWrap')">🏆 Pasiekimai</button>

<div id="achWrap" class="hidden">

<button onclick="toggle('achSveik')">💪 Sveikata</button>
<div id="achSveik" class="hidden"></div>

<button onclick="toggle('achProd')">📋 Produktyvumas</button>
<div id="achProd" class="hidden"></div>

<button onclick="toggle('achTobul')">🧠 Tobulėjimas</button>
<div id="achTobul" class="hidden"></div>

</div>

<button onclick="toggle('weekWrap')">📅 Savaitės tikslai</button>

<div id="weekWrap" class="hidden">
<button onclick="weekReward(50,20,10)">10 užduočių</button>
<button onclick="weekReward(120,50,25)">25 užduotys</button>
<button onclick="weekReward(250,120,50)">50 užduočių</button>
</div>

<button onclick="resetGame()">❌ Reset</button>

</div>
</div>

</div>

<script>

let xp=0, level=1, coins=0;
let totalTasks=0, totalXP=0, weeklyTasks=0;
let historyLog=[];

let stats={
pushups:0,pullups:0,nosocial:0,
contracts:0,sold:0,delayed:0,
books:0,ce:0,notv:0
};

const rewards=[
{price:60,text:"pica"},
{price:100,text:"drabužis"},
{price:30,text:"scroll"},
{price:50,text:"žaidimai"},
{price:80,text:"cheat"},
{price:40,text:"filmas"},
{price:35,text:"kava"}
];

function toggle(id){
document.getElementById(id).classList.toggle("hidden");
}

function log(t){
historyLog.push(new Date().toLocaleTimeString()+" - "+t);
}

function addXP(v){
xp+=v;
totalXP+=v;
coins+=Math.floor(v/2);

let old=level;

while(xp>=100){
xp-=100;
level++;
}

if(level>old){
alert("🔥 LEVEL UP!");
}
}

function buy(i){
let r=rewards[i];
if(coins<r.price){alert("Neužtenka");return;}
coins-=r.price;
log("Pirko "+r.text);
save(); render();
}

function track(t){
if(t.text==="50 atsispaudimų") stats.pushups+=50;
if(t.text==="20 prisitraukimų") stats.pullups+=20;
if(t.text==="60min be soc tinklų ir darbo") stats.nosocial+=60;

if(t.text==="5 pardavimo sutartys") stats.contracts+=5;
if(t.text==="1 parduotas automobilis") stats.sold+=1;
if(t.text.includes("Atidėliotas")) stats.delayed+=1;

if(t.text==="20 puslapių skaitymas") stats.books+=1;
if(t.text==="60min CE teorija") stats.ce+=60;
if(t.text==="Diena be TV") stats.notv+=1;
}

function completeTask(id){
let t=tasks.find(x=>x.id===id);
if(!t||t.done)return;

t.done=true;
addXP(t.xp);
track(t);

totalTasks++;
weeklyTasks++;

log("Atlikta "+t.text);

checkAchievements();

save();
render();
}

function weekReward(x,c,n){
if(weeklyTasks<n){alert("Per mažai");return;}
addXP(x);
coins+=c;
weeklyTasks-=n;
}

function showHistory(){
alert(historyLog.slice(-20).join("\n"));
}

function showStats(){
alert(JSON.stringify(stats,null,2));
}

function showLevels(){
alert("Level sistema aktyvi");
}

function resetGame(){
if(confirm("Reset?")){
localStorage.clear();
location.reload();
}
}

/* TASKS */

let tasks=[

{id:4,cat:"sveik",text:"50 atsispaudimų",xp:15,done:false},
{id:5,cat:"sveik",text:"20 prisitraukimų",xp:15,done:false},
{id:2,cat:"sveik",text:"60min be soc tinklų ir darbo",xp:10,done:false},

{id:10,cat:"prod",text:"5 pardavimo sutartys",xp:20,done:false},
{id:14,cat:"prod",text:"1 parduotas automobilis",xp:35,done:false},
{id:15,cat:"prod",text:"Atidėliotas dalykas (1)",xp:20,done:false},

{id:18,cat:"tobul",text:"20 puslapių skaitymas",xp:15,done:false},
{id:19,cat:"tobul",text:"60min CE teorija",xp:20,done:false},
{id:24,cat:"tobul",text:"Diena be TV",xp:20,done:false}

];

/* ACHIEVEMENTS */

let achievements=[

{cat:"achSveik",stat:"pushups",req:100,reward:25,text:"100 atsispaudimų"},
{cat:"achSveik",stat:"pushups",req:300,reward:60,text:"300 atsispaudimų"},
{cat:"achSveik",stat:"pushups",req:500,reward:100,text:"500 atsispaudimų"},

{cat:"achSveik",stat:"pullups",req:50,reward:35,text:"50 prisitraukimų"},
{cat:"achSveik",stat:"pullups",req:100,reward:60,text:"100 prisitraukimų"},
{cat:"achSveik",stat:"pullups",req:300,reward:100,text:"300 prisitraukimų"},

{cat:"achSveik",stat:"nosocial",req:200,reward:20,text:"200 min be soc"},
{cat:"achSveik",stat:"nosocial",req:500,reward:50,text:"500 min be soc"},
{cat:"achSveik",stat:"nosocial",req:1000,reward:90,text:"1000 min be soc"},

{cat:"achProd",stat:"contracts",req:10,reward:20,text:"10 sutarčių"},
{cat:"achProd",stat:"contracts",req:20,reward:30,text:"20 sutarčių"},
{cat:"achProd",stat:"contracts",req:50,reward:80,text:"50 sutarčių"},

{cat:"achProd",stat:"sold",req:3,reward:100,text:"3 parduoti auto"},
{cat:"achProd",stat:"sold",req:5,reward:200,text:"5 parduoti auto"},
{cat:"achProd",stat:"sold",req:10,reward:500,text:"10 parduotų auto"},

{cat:"achProd",stat:"delayed",req:3,reward:30,text:"3 atidėliojimai"},
{cat:"achProd",stat:"delayed",req:7,reward:60,text:"7 atidėliojimai"},
{cat:"achProd",stat:"delayed",req:10,reward:90,text:"10 atidėliojimų"},

{cat:"achTobul",stat:"books",req:2,reward:20,text:"40 puslapių"},
{cat:"achTobul",stat:"books",req:5,reward:50,text:"100 puslapių"},
{cat:"achTobul",stat:"books",req:10,reward:100,text:"200 puslapių"},

{cat:"achTobul",stat:"ce",req:180,reward:60,text:"180 min CE"},
{cat:"achTobul",stat:"ce",req:300,reward:90,text:"300 min CE"},
{cat:"achTobul",stat:"ce",req:500,reward:120,text:"500 min CE"},

{cat:"achTobul",stat:"notv",req:1,reward:20,text:"1 diena be TV"},
{cat:"achTobul",stat:"notv",req:3,reward:50,text:"3 dienos"},
{cat:"achTobul",stat:"notv",req:7,reward:70,text:"7 dienos"}

];

function checkAchievements(){
achievements.forEach(a=>{
if(!a.done && stats[a.stat]>=a.req){
a.done=true;
coins+=a.reward;
alert("🏆 "+a.text);
}
});
}

function renderAchievements(cat){
let div=document.getElementById(cat);
div.innerHTML="";
achievements.filter(a=>a.cat===cat).forEach(a=>{
let b=document.createElement("button");
b.className="task"+(a.done?" done":"");
b.textContent=(a.done?"🏆 ":"🔒 ")+a.text;
div.appendChild(b);
});
}

function render(){
document.getElementById("level").innerText="Lygis "+level;
document.getElementById("xp").innerText=xp+"/100";
document.getElementById("coins").innerText=coins;
document.getElementById("bar").style.width=xp+"%";

["sveik","prod","tobul"].forEach(cat=>{
let div=document.getElementById(cat);
div.innerHTML="";
tasks.filter(t=>t.cat===cat).forEach(t=>{
let b=document.createElement("button");
b.className="task"+(t.done?" done":"");
b.textContent=t.text;
if(!t.done) b.onclick=()=>completeTask(t.id);
div.appendChild(b);
});
});

renderAchievements("achSveik");
renderAchievements("achProd");
renderAchievements("achTobul");

}

function save(){
localStorage.setItem("game",JSON.stringify({
xp,level,coins,tasks,stats,historyLog
}));
}

function load(){
let d=JSON.parse(localStorage.getItem("game"));
if(d){
xp=d.xp;
level=d.level;
coins=d.coins;
tasks=d.tasks;
stats=d.stats;
historyLog=d.historyLog;
}
}

load();
render();

</script>

</body>
</html>
