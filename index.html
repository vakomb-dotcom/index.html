<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTYVACIJA</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top,#0a0f1f,#05070f);
  color:white;
  font-family:system-ui;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111827;
  padding:16px;
  border-radius:18px;
  margin-top:15px;
  box-shadow:0 0 20px rgba(0,255,136,0.1);
}

h1{
  text-align:center;
  color:#00ff88;
}

.progress{
  height:12px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:#00ff88;
  transition:0.3s;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  font-size:15px;
}

button:active{
  transform:scale(0.97);
}

.task{
  background:#0f172a;
  border:1px solid #00ff88;
}

.task.done{
  background:#14532d;
  opacity:0.6;
}

.shop{
  border:1px solid gold;
}

.dropdown{
  font-weight:bold;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>KLIK PRO MAX</h1>

<div class="card">
<h2 id="level"></h2>
<p id="xp"></p>

<div class="progress">
<div id="bar" class="fill"></div>
</div>

<p>💰 Coins: <span id="coins"></span></p>
<p>🔥 Streak: <span id="streak"></span></p>
</div>

<!-- TASKS -->
<div class="card">
<div class="dropdown" onclick="toggle('tasksBox')">
<span>🎯 Užduotys</span>
<span>▼</span>
</div>

<div id="tasksBox" class="hidden">

<div onclick="toggle('prod')">📚 Produktyvumas</div>
<div id="prod" class="hidden"></div>

<div onclick="toggle('health')">💪 Sveikata</div>
<div id="health" class="hidden"></div>

<div onclick="toggle('grow')">🧠 Tobulėjimas</div>
<div id="grow" class="hidden"></div>

</div>
</div>

<!-- SHOP -->
<div class="card">
<div class="dropdown" onclick="toggle('shopBox')">
<span>🛒 Shop</span>
<span>▼</span>
</div>

<div id="shopBox" class="hidden">
<button class="shop" onclick="buy(50)">🍕 Pica (50)</button>
<button class="shop" onclick="buy(70)">🛍️ Vinted (70)</button>
<button class="shop" onclick="buy(20)">📱 TikTok 1h (20)</button>
</div>
</div>

<button onclick="addXP(5)">⚡ Quick XP</button>
<button onclick="newDay()">🔄 Nauja diena</button>

</div>

<script>

let xp=0, level=1, coins=0, streak=0;

let tasks = [

 // PRODUKTYVUMAS (8)
 {id:1,cat:"prod",text:"📖 Skaityti 20 puslapių",xp:8,done:false},
 {id:2,cat:"prod",text:"📒 Parašyti planą",xp:10,done:false},
 {id:3,cat:"prod",text:"🧹 Susitvarkyti stalą",xp:6,done:false},
 {id:4,cat:"prod",text:"📚 Mokytis 30 min",xp:12,done:false},
 {id:5,cat:"prod",text:"📧 Sutvarkyti emailus",xp:6,done:false},
 {id:6,cat:"prod",text:"🎯 Padaryti svarbų darbą",xp:15,done:false},
 {id:7,cat:"prod",text:"📵 1h be telefono",xp:20,done:false},
 {id:8,cat:"prod",text:"🧠 Fokusas 1h",xp:15,done:false},

 // SVEIKATA (8)
 {id:9,cat:"health",text:"💪 50 atsispaudimų",xp:8,done:false},
 {id:10,cat:"health",text:"🚶 30 min pasivaikščiojimas",xp:20,done:false},
 {id:11,cat:"health",text:"💧 2L vandens",xp:10,done:false},
 {id:12,cat:"health",text:"🏃 Sportas 20min",xp:18,done:false},
 {id:13,cat:"health",text:"🥗 Sveikas maistas",xp:12,done:false},
 {id:14,cat:"health",text:"🧘 Meditacija",xp:10,done:false},
 {id:15,cat:"health",text:"😴 8h miego",xp:15,done:false},
 {id:16,cat:"health",text:"🚴 Judėjimas dienoje",xp:12,done:false},

 // TOBULĖJIMAS (8)
 {id:17,cat:"grow",text:"🧠 Išmokti kažką naujo",xp:15,done:false},
 {id:18,cat:"grow",text:"🎧 Podcast",xp:10,done:false},
 {id:19,cat:"grow",text:"📹 Edukacinis video",xp:8,done:false},
 {id:20,cat:"grow",text:"✍️ Rašyti mintis",xp:10,done:false},
 {id:21,cat:"grow",text:"📖 Skaityti apie verslą",xp:12,done:false},
 {id:22,cat:"grow",text:"💡 Generuoti idėjas",xp:12,done:false},
 {id:23,cat:"grow",text:"🧩 Spręsti problemą",xp:15,done:false},
 {id:24,cat:"grow",text:"🚀 Kurti kažką",xp:20,done:false}

];

function toggle(id){
 document.getElementById(id).classList.toggle("hidden");
}

function addXP(val){
 xp+=val;
 coins+=Math.floor(val/2);

 if(xp>=100){
  xp-=100;
  level++;
 }

 save();
 render();
}

function completeTask(id){
 tasks=tasks.map(t=>{
  if(t.id===id && !t.done){
   addXP(t.xp);
   return {...t,done:true};
  }
  return t;
 });

 render();
}

function newDay(){
 if(tasks.every(t=>t.done)){
  streak++;
  addXP(30);
 }

 tasks=tasks.map(t=>({...t,done:false}));

 save();
 render();
}

function buy(price){
 if(coins>=price){
  coins-=price;
  alert("Nupirkta!");
 }

 save();
 render();
}

function render(){
 document.getElementById("level").innerText="Lygis: "+level;
 document.getElementById("xp").innerText="XP: "+xp+"/100";
 document.getElementById("coins").innerText=coins;
 document.getElementById("streak").innerText=streak;
 document.getElementById("bar").style.width=xp+"%";

 renderCategory("prod");
 renderCategory("health");
 renderCategory("grow");
}

function renderCategory(cat){
 let div=document.getElementById(cat);
 div.innerHTML="";

 tasks.filter(t=>t.cat===cat).forEach(t=>{
  let b=document.createElement("button");
  b.className="task"+(t.done?" done":"");
  b.innerText=(t.done?"✅ ":"⬜ ")+t.text+" (+"+t.xp+")";
  b.onclick=()=>completeTask(t.id);
  div.appendChild(b);
 });
}

// SAVE/LOAD
function save(){
 localStorage.setItem("klik_max", JSON.stringify({xp,level,coins,streak,tasks}));
}

function load(){
 let data=JSON.parse(localStorage.getItem("klik_max"));
 if(data){
  xp=data.xp;
  level=data.level;
  coins=data.coins;
  streak=data.streak;
  tasks=data.tasks;
 }
}

load();
render();

</script>

</body>
</html>
