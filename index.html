<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10K MISIJA</title>

<style>
body{margin:0;font-family:Inter;background:#f4f7fb;}
.container{max-width:700px;margin:auto;padding:20px;}
h1{text-align:center;color:#16a34a;}

.card{
background:white;
padding:20px;
border-radius:16px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.progress{height:18px;background:#e5e7eb;border-radius:20px;overflow:hidden;}
.fill{height:100%;background:#22c55e;}

.big{font-size:22px;font-weight:bold;}
.week{color:#2563eb;}

input,textarea{
width:100%;padding:12px;margin-top:10px;
border-radius:10px;border:1px solid #ddd;
}

button{
width:100%;padding:12px;margin-top:10px;
border:none;border-radius:10px;
background:#22c55e;color:white;font-weight:bold;
cursor:pointer;
}

.log{
margin-top:10px;
background:#f9fafb;
padding:10px;
border-radius:10px;
max-height:200px;
overflow:auto;
display:none;
}

.task{
display:flex;
justify-content:space-between;
background:#f9fafb;
padding:10px;
border-radius:10px;
margin-top:8px;
}

.task.done{background:#dcfce7;text-decoration:line-through;}
.delete{background:#ef4444;color:white;border:none;border-radius:6px;}
.toggleBtn{background:#111;color:white;margin-top:5px;}
.reset{background:#ef4444;}
</style>
</head>

<body>

<div class="container">

<h1>🎯 10K MISIJA</h1>

<!-- PROFIT -->
<div class="card">
<h3>💰 PELNAS <button class="toggleBtn" onclick="toggle('profitLog')">📜 Log</button></h3>

<input id="profitAmount" type="number">
<textarea id="profitDesc"></textarea>

<button onclick="addProfit()">➕ Pridėti</button>

<div class="progress"><div id="profitBar" class="fill"></div></div>

<p class="big" id="profitText"></p>
<p class="week" id="weekProfit"></p>

<div id="profitLog" class="log"></div>
</div>

<!-- TASKS -->
<div class="card">
<h3>📋 VEIKSMAI <button class="toggleBtn" onclick="toggle('taskLog')">📜 Log</button></h3>

<input id="taskInput">
<button onclick="addTask()">➕ Pridėti</button>

<div id="taskList"></div>
<div id="taskLog" class="log"></div>
</div>

<button class="reset" onclick="resetAll()">❌ RESET</button>

</div>

<script>

// STATE
let profit=0;
let profitLogs=[];
let tasks=[];
let taskLogs=[];
let lastDate="";

// TIME
function today(){
return new Date().toDateString();
}

function now(){
return new Date().toLocaleString();
}

// DAILY RESET
function checkDay(){
if(lastDate!==today()){
tasks = tasks.filter(t=>!t.done); // ištrina DONE
lastDate = today();
save();
}
}

// PROFIT
function addProfit(){
let val=parseInt(profitAmount.value);
if(!val) return;

profit+=val;

profitLogs.unshift(`${now()} — ${profitDesc.value} +${val}€`);

profitAmount.value="";
profitDesc.value="";

save(); render();
}

// TASKS
function addTask(){
let text=taskInput.value.trim();
if(!text) return;

tasks.push({text,done:false});
taskInput.value="";

save(); render();
}

function toggleTask(i){
tasks[i].done=!tasks[i].done;

if(tasks[i].done){
taskLogs.unshift(`${now()} — ✔️ ${tasks[i].text}`);
}

save(); render();
}

function deleteTask(i){
tasks.splice(i,1);
save(); render();
}

// WEEK PROFIT
function calcWeek(){
let nowDate=new Date();
let weekAgo=new Date();
weekAgo.setDate(nowDate.getDate()-7);

let sum=0;

profitLogs.forEach(l=>{
let d=new Date(l.split(" — ")[0]);
if(d>=weekAgo) sum+=parseInt(l.split("+")[1]);
});

return sum;
}

// TOGGLE LOG
function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block"?"none":"block";
}

// RENDER
function render(){

checkDay();

// progress
profitBar.style.width=Math.min(profit/10000*100,100)+"%";
profitText.innerText=`${profit}€ / 10 000€`;
weekProfit.innerText=`📅 7 dienos: ${calcWeek()}€`;

// logs
profitLog.innerHTML=profitLogs.join("<br>");
taskLog.innerHTML=taskLogs.join("<br>");

// tasks
taskList.innerHTML="";
tasks.forEach((t,i)=>{
let div=document.createElement("div");
div.className="task"+(t.done?" done":"");

div.innerHTML=`
<div>
<input type="checkbox" ${t.done?"checked":""} onclick="toggleTask(${i})">
${t.text}
</div>
<button class="delete" onclick="deleteTask(${i})">X</button>
`;

taskList.appendChild(div);
});
}

// SAVE
function save(){
localStorage.setItem("profit",profit);
localStorage.setItem("profitLogs",JSON.stringify(profitLogs));
localStorage.setItem("tasks",JSON.stringify(tasks));
localStorage.setItem("taskLogs",JSON.stringify(taskLogs));
localStorage.setItem("lastDate",lastDate);
}

// LOAD
function load(){
profit=parseInt(localStorage.getItem("profit"))||0;
profitLogs=JSON.parse(localStorage.getItem("profitLogs"))||[];
tasks=JSON.parse(localStorage.getItem("tasks"))||[];
taskLogs=JSON.parse(localStorage.getItem("taskLogs"))||[];
lastDate=localStorage.getItem("lastDate")||today();
}

// RESET
function resetAll(){
if(!confirm("Tikrai ištrinti viską?")) return;
localStorage.clear();
location.reload();
}

// INIT
load();
render();

</script>

</body>
</html>
