<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTYVACIJOS</title>

<style>
body {margin:0;background: linear-gradient(180deg,#0f172a,#111827,#020617);color:#e5e7eb;font-family: system-ui;}
.container {max-width:500px;margin:auto;padding:20px;}
h1 {text-align:center;color:#4ade80;font-weight:700;}

.card {background:rgba(17,24,39,0.8);padding:18px;border-radius:20px;margin-top:15px;border:1px solid rgba(255,255,255,0.05);}

.progress {height:12px;background:#1f2937;border-radius:20px;overflow:hidden;margin-top:8px;}
.fill {height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);}

button {width:100%;padding:14px;margin-top:10px;border-radius:14px;border:none;cursor:pointer;}
.toggle {background:#1f2937;color:#4ade80;}
.task {background:#020617;border:1px solid #1f2937;text-align:left;}
.task.done {background:#052e1b;color:#4ade80;}
.shop {background:#1f2937;border:1px solid #facc15;color:#facc15;}
.hidden {display:none;}
.ach {background:#020617;border:1px solid #374151;text-align:left;}
.ach.done {background:#14532d;color:#4ade80;}
</style>
</head>

<body>
<div class="container">

<h1>MOTYVACIJOS</h1>

<div class="card">
<h2 id="level"></h2>
<p id="xp"></p>
<div class="progress"><div id="bar" class="fill"></div></div>
<p>💰 Monetos: <span id="coins"></span></p>
</div>

<div class="card">
<button class="toggle" onclick="toggle('sveik')">💪 Sveikata</button>
<div id="sveik" class="hidden"></div>

<button class="toggle" onclick="toggle('prod')">📋 Produktyvumas</button>
<div id="prod" class="hidden"></div>

<button class="toggle" onclick="toggle('tobul')">🧠 Tobulėjimas</button>
<div id="tobul" class="hidden"></div>
</div>

<div class="card">
<button class="toggle" onclick="toggle('achWrap')">🏆 Pasiekimai</button>
<div id="achWrap" class="hidden">

<button class="toggle" onclick="toggle('achSveik')">💪 Sveikata</button>
<div id="achSveik" class="hidden"></div>

<button class="toggle" onclick="toggle('achProd')">📋 Produktyvumas</button>
<div id="achProd" class="hidden"></div>

<button class="toggle" onclick="toggle('achTobul')">🧠 Tobulėjimas</button>
<div id="achTobul" class="hidden"></div>

</div>
</div>

<div class="card">
<button class="toggle" onclick="toggle('menuWrap')">☰ MENIU</button>
<div id="menuWrap" class="hidden">

<button onclick="showStats()">📊 Statistika</button>
<button onclick="showHistory()">📜 Istorija</button>

</div>
</div>

</div>

<script>

let xp=0, level=1, coins=0;
let totalTasks=0, totalXP=0;
let weeklyTasks=0;
let historyLog=[];

let stats = {
pushups:0, pullups:0, contracts:0, sold:0, delayed:0,
books:0, ce:0, notv:0, nosocial:0
};

let achievements = [
/* SVEIKATA */
{cat:"achSveik", req:100, stat:"pushups", reward:25, text:"100 atsispaudimų"},
{cat:"achSveik", req:300, stat:"pushups", reward:60, text:"300 atsispaudimų"},
{cat:"achSveik", req:500, stat:"pushups", reward:100, text:"500 atsispaudimų"},

{cat:"achSveik", req:50, stat:"pullups", reward:35, text:"50 prisitraukimų"},
{cat:"achSveik", req:100, stat:"pullups", reward:60, text:"100 prisitraukimų"},
{cat:"achSveik", req:300, stat:"pullups", reward:100, text:"300 prisitraukimų"},

{cat:"achSveik", req:200, stat:"nosocial", reward:20, text:"200 min be soc tinklų"},
{cat:"achSveik", req:500, stat:"nosocial", reward:50, text:"500 min be soc tinklų"},
{cat:"achSveik", req:1000, stat:"nosocial", reward:90, text:"1000 min be soc tinklų"},

/* PRODUKTYVUMAS */
{cat:"achProd", req:10, stat:"contracts", reward:20, text:"10 sutarčių"},
{cat:"achProd", req:20, stat:"contracts", reward:30, text:"20 sutarčių"},
{cat:"achProd", req:50, stat:"contracts", reward:80, text:"50 sutarčių"},

{cat:"achProd", req:3, stat:"sold", reward:100, text:"3 parduoti auto"},
{cat:"achProd", req:5, stat:"sold", reward:200, text:"5 parduoti auto"},
{cat:"achProd", req:10, stat:"sold", reward:500, text:"10 parduotų auto"},

{cat:"achProd", req:3, stat:"delayed", reward:30, text:"3 atidėliojimai"},
{cat:"achProd", req:7, stat:"delayed", reward:60, text:"7 atidėliojimai"},
{cat:"achProd", req:10, stat:"delayed", reward:90, text:"10 atidėliojimų"},

/* TOBULĖJIMAS */
{cat:"achTobul", req:40, stat:"books", reward:20, text:"40 puslapių"},
{cat:"achTobul", req:100, stat:"books", reward:50, text:"100 puslapių"},
{cat:"achTobul", req:200, stat:"books", reward:100, text:"200 puslapių"},

{cat:"achTobul", req:180, stat:"ce", reward:60, text:"180 min CE"},
{cat:"achTobul", req:300, stat:"ce", reward:90, text:"300 min CE"},
{cat:"achTobul", req:500, stat:"ce", reward:120, text:"500 min CE"},

{cat:"achTobul", req:1, stat:"notv", reward:20, text:"1 diena be TV"},
{cat:"achTobul", req:3, stat:"notv", reward:50, text:"3 dienos be TV"},
{cat:"achTobul", req:7, stat:"notv", reward:70, text:"7 dienos be TV"}
];

function toggle(id){document.getElementById(id).classList.toggle("hidden");}

function addXP(val){
xp+=val;
totalXP+=val;
coins+=Math.floor(val/2);

while(xp>=100){
xp-=100;
level++;
alert("🔥 LEVEL UP! 🔥");
}
}

function checkAchievements(){
achievements.forEach(a=>{
if(!a.done && stats[a.stat] >= a.req){
a.done=true;
coins+=a.reward;
alert(`🏆 Pasiekimas: ${a.text} (+${a.reward} monetų)`);
}
});
}

function track(t){
if(t.text==="50 atsispaudimų") stats.pushups+=50;
if(t.text==="20 prisitraukimų") stats.pullups+=20;
if(t.text.includes("soc")) stats.nosocial+=60;
if(t.text==="5 pardavimo sutartys") stats.contracts+=5;
if(t.text==="1 parduotas automobilis") stats.sold+=1;
if(t.text.includes("Atidėliotas")) stats.delayed+=1;
if(t.text==="20 puslapių skaitymas") stats.books+=20;
if(t.text==="60min CE teorija") stats.ce+=60;
if(t.text==="Diena be TV") stats.notv+=1;
}

function completeTask(id){
let t=tasks.find(x=>x.id===id);
if(!t||t.done)return;

t.done=true;
addXP(t.xp);
track(t);
checkAchievements();

save(); render();
}

let tasks=[
{id:1,cat:"sveik",text:"50 atsispaudimų",xp:15,done:false},
{id:2,cat:"sveik",text:"20 prisitraukimų",xp:15,done:false},
{id:3,cat:"sveik",text:"60min be soc tinklų ir darbo",xp:10,done:false},

{id:4,cat:"prod",text:"5 pardavimo sutartys",xp:20,done:false},
{id:5,cat:"prod",text:"1 parduotas automobilis",xp:35,done:false},
{id:6,cat:"prod",text:"Atidėliotas dalykas (1)",xp:20,done:false},

{id:7,cat:"tobul",text:"20 puslapių skaitymas",xp:15,done:false},
{id:8,cat:"tobul",text:"60min CE teorija",xp:20,done:false},
{id:9,cat:"tobul",text:"Diena be TV",xp:20,done:false}
];

function render(){
document.getElementById("level").innerText="Lygis: "+level;
document.getElementById("xp").innerText="XP: "+xp+"/100";
document.getElementById("coins").innerText=coins;
document.getElementById("bar").style.width=xp+"%";

["sveik","prod","tobul"].forEach(renderCategory);
["achSveik","achProd","achTobul"].forEach(renderAch);
}

function renderCategory(cat){
let div=document.getElementById(cat);
div.innerHTML="";
tasks.filter(t=>t.cat===cat).forEach(t=>{
let b=document.createElement("button");
b.className="task"+(t.done?" done":"");
b.textContent=(t.done?"✅ ":"⬜ ")+t.text+" (+"+t.xp+")";
if(!t.done) b.onclick=()=>completeTask(t.id);
div.appendChild(b);
});
}

function renderAch(cat){
let div=document.getElementById(cat);
div.innerHTML="";
achievements.filter(a=>a.cat===cat).forEach(a=>{
let b=document.createElement("button");
b.className="ach"+(a.done?" done":"");
b.textContent=(a.done?"🏆 ":"🔒 ")+a.text+" → "+a.reward+" monetų";
div.appendChild(b);
});
}

function save(){
localStorage.setItem("motyvacija", JSON.stringify({
xp,level,coins,tasks,stats,achievements
}));
}

function load(){
let d=JSON.parse(localStorage.getItem("motyvacija"));
if(d){
xp=d.xp; level=d.level; coins=d.coins;
tasks=d.tasks; stats=d.stats; achievements=d.achievements;
}
}

function showStats(){
alert(JSON.stringify(stats,null,2));
}

function showHistory(){
alert(historyLog.join("\n") || "Tuščia");
}

load(); render();

</script>

</body>
</html>
