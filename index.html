<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Švara</title>

<style>
body {
    font-family: -apple-system, Arial;
    margin: 0;
    background: #f5f7fb;
    color: #111;
}
.header {
    height: 200px;
    background: url('https://images.unsplash.com/photo-1607863680198-23d4b2565df0') center/cover;
}
.container {
    max-width: 480px;
    margin: -70px auto 20px;
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
h1 { text-align:center; }

.card {
    background: #f1f5f9;
    padding: 14px;
    border-radius: 12px;
    margin: 8px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

input[type="checkbox"] {
    width:20px;
    height:20px;
}

.total {
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-top:15px;
}

button {
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:16px;
}

.hidden { display:none; }

.form {
    display:flex;
    flex-direction:column;
    align-items:center;
}

.form input, .form select {
    width:100%;
    max-width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
    box-sizing:border-box;
}
</style>
</head>
<body>

<div class="header"></div>

<div class="container" id="servicesPage">
<h1>Pasirink paslaugas</h1>

<div class="card"><span>Siurbimas + plastikai + stiklai (50€)</span><input type="checkbox" value="50"></div>
<div class="card"><span>Cheminis valymas (90€)</span><input type="checkbox" value="90"></div>
<div class="card"><span>Poliravimas 1 step (150€)</span><input type="checkbox" value="150"></div>
<div class="card"><span>Žibintų poliravimas (35€)</span><input type="checkbox" value="35"></div>
<div class="card"><span>Smulkių defektų maskavimas (30€)</span><input type="checkbox" value="30"></div>

<div class="total">Bendra: <span id="total">0</span> €</div>

<button onclick="goToForm()">Registruotis</button>
</div>

<div class="container hidden" id="formPage">
<h1>Registracija</h1>

<div class="form">
<input id="marke" placeholder="Markė">
<input id="modelis" placeholder="Modelis">
<input id="miestas" placeholder="Miestas">
<input id="tel" placeholder="Telefonas">

<label>Data</label>
<input id="data" type="date">

<label>Laikas</label>
<select id="laikas">
<option>09:00</option>
<option>12:00</option>
<option>15:00</option>
<option>18:00</option>
</select>
</div>

<div class="total">Suma: <span id="finalTotal">0</span> €</div>

<button onclick="submitForm()">Registruotis</button>
</div>

<script>
const checkboxes = document.querySelectorAll('#servicesPage input[type="checkbox"]');

function calculateTotal(){
    let total = 0;
    checkboxes.forEach(c=>{
        if(c.checked) total += Number(c.value);
    });
    document.getElementById('total').innerText = total;
    const f = document.getElementById('finalTotal');
    if(f) f.innerText = total;
}

checkboxes.forEach(cb=>{
    cb.addEventListener('change', calculateTotal);
    cb.addEventListener('click', calculateTotal);
});

function goToForm(){
    calculateTotal();
    document.getElementById('servicesPage').classList.add('hidden');
    document.getElementById('formPage').classList.remove('hidden');
}

function submitForm(){
    const body = `Marke: ${marke.value}
Modelis: ${modelis.value}
Miestas: ${miestas.value}
Tel: ${tel.value}
Data: ${data.value}
Laikas: ${laikas.value}
Suma: ${finalTotal.innerText}€`;

    window.location.href = "mailto:vakomb@gmail.com?subject=Auto svaros uzklausa&body=" + encodeURIComponent(body);
}
</script>

</body>
</html>
