<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTYVACIJOS PRO MAX</title>

<style>

body {
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
transition:0.3s;
}

.light {
background:#f3f4f6;
color:black;
}

.container {
max-width:500px;
margin:auto;
padding:20px;
}

.card {
background:#111827;
padding:16px;
border-radius:18px;
margin-top:15px;
}

.light .card {
background:white;
}

h1 {
text-align:center;
color:#22c55e;
}

button {
width:100%;
padding:14px;
margin-top:8px;
border-radius:14px;
border:none;
cursor:pointer;
}

input {
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:none;
}

.task {background:#1f2937;}
.task.done {background:#14532d;}

.hidden {display:none;}

.popup {
position:fixed;
top:20px;
right:20px;
background:#22c55e;
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>MOTYVACIJOS PRO</h1>

<!-- LOGIN -->
<div id="authBox" class="card">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="register()">Registruotis</button>
<button onclick="login()">Prisijungti</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="card">
<h2 id="level"></h2>
<p id="xp"></p>
<p>💰 <span id="coins"></span></p>
<p>🔥 Streak: <span id="streak"></span></p>
</div>

<div class="card">
<div id="tasks"></div>
</div>

<div class="card">
<h3>🏆 Pasiekimai</h3>
<div id="achievements"></div>
</div>

<div class="card">
<h3>📊 Statistika</h3>
<p id="stats"></p>
</div>

<div class="card">
<h3>⚙️ Nustatymai</h3>
<button onclick="toggleTheme()">Tema</button>
<button onclick="resetProgress()">Reset progresą</button>
</div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script>

// ===== AUTH =====

function register(){
let users = JSON.parse(localStorage.getItem("users")||"{}");

users[email.value] = {
pass:pass.value,
data:null
};

localStorage.setItem("users", JSON.stringify(users));
alert("Sukurta!");
}

function login(){
let users = JSON.parse(localStorage.getItem("users")||"{}");

let u = users[email.value];

if(!u || u.pass !== pass.value){
alert("Blogi duomenys");
return;
}

currentUser = email.value;

authBox.classList.add("hidden");
app.classList.remove("hidden");

load();
render();
}

function logout(){
location.reload();
}

// ===== STATE =====

let currentUser = null;

let xp=0, level=1, coins=0;
let streak=0;
let totalTasks=0;
let lastLogin="";

let tasks = [
{id:1,text:"2L vandens",xp:10,done:false},
{id:2,text:"Sportas",xp:15,done:false},
{id:3,text:"Darbas",xp:20,done:false}
];

let achievements = [
{id:1,text:"Pirma užduotis",done:false},
{id:2,text:"10 užduočių",done:false},
{id:3,text:"Level 5",done:false}
];

// ===== DAILY =====

function dailyCheck(){
let today = new Date().toDateString();

if(lastLogin !== today){
tasks.forEach(t=>t.done=false);
streak++;
lastLogin = today;
}
}

// ===== TASK =====

function completeTask(id){
let t = tasks.find(x=>x.id===id);
if(!t || t.done) return;

t.done = true;

xp += t.xp;
coins += Math.floor(t.xp/2);
totalTasks++;

if(xp>=100){
xp -= 100;
level++;
showPopup("LEVEL UP!");
}

checkAchievements();
showPopup("+"+t.xp+" XP");

save();
render();
}

// ===== ACHIEVEMENTS =====

function checkAchievements(){
if(totalTasks>=1) achievements[0].done=true;
if(totalTasks>=10) achievements[1].done=true;
if(level>=5) achievements[2].done=true;
}

// ===== UI =====

function render(){
levelEl.innerText="Level "+level;
xpEl.innerText="XP "+xp;
coinsEl.innerText=coins;
streakEl.innerText=streak;

tasksDiv.innerHTML="";

tasks.forEach(t=>{
let b=document.createElement("button");
b.className="task"+(t.done?" done":"");
b.innerText=t.text+" +"+t.xp;
b.onclick=()=>completeTask(t.id);
tasksDiv.appendChild(b);
});

achievementsDiv.innerHTML="";
achievements.forEach(a=>{
let div=document.createElement("div");
div.innerText=(a.done?"🏆 ":"🔒 ")+a.text;
achievementsDiv.appendChild(div);
});

stats.innerText = "Užduotys: "+totalTasks;
}

// ===== POPUP =====

function showPopup(text){
let p=document.createElement("div");
p.className="popup";
p.innerText=text;
document.body.appendChild(p);

setTimeout(()=>p.remove(),1000);
}

// ===== SETTINGS =====

function toggleTheme(){
document.body.classList.toggle("light");
}

function resetProgress(){
if(confirm("Reset?")){
xp=0;level=1;coins=0;streak=0;totalTasks=0;
tasks.forEach(t=>t.done=false);
save();
render();
}
}

// ===== SAVE =====

function save(){
let users = JSON.parse(localStorage.getItem("users")||"{}");

users[currentUser].data = {
xp,level,coins,streak,totalTasks,tasks,achievements,lastLogin
};

localStorage.setItem("users", JSON.stringify(users));
}

// ===== LOAD =====

function load(){
let users = JSON.parse(localStorage.getItem("users")||"{}");

let d = users[currentUser].data;

if(!d) return;

xp=d.xp||0;
level=d.level||1;
coins=d.coins||0;
streak=d.streak||0;
totalTasks=d.totalTasks||0;
tasks=d.tasks||tasks;
achievements=d.achievements||achievements;
lastLogin=d.lastLogin||"";

dailyCheck();
}

// ===== INIT =====

const levelEl = document.getElementById("level");
const xpEl = document.getElementById("xp");
const coinsEl = document.getElementById("coins");
const streakEl = document.getElementById("streak");
const tasksDiv = document.getElementById("tasks");
const achievementsDiv = document.getElementById("achievements");

render();

</script>

</body>
</html>
