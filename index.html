<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>automobilius.lt</title>
<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }
header { background:#111; color:#fff; padding:15px; text-align:center; font-size:22px;}
.container { max-width:900px; margin:20px auto; padding:10px;}
button { padding:10px; background:black; color:white; border:none; cursor:pointer;}
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:15px;}
.post { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px;}
input, textarea, select { width:100%; padding:8px; margin:5px 0;}
.viber { background:purple; color:white; padding:8px; display:inline-block; margin-top:10px; cursor:pointer;}
.hidden { display:none; }
.main-img { width:100%; margin-top:10px; border-radius:8px; }
.thumb { width:60px; height:60px; object-fit:cover; margin:5px; cursor:pointer; border-radius:5px;}
.thumb-container { display:flex; flex-wrap:wrap;}
.date { font-size:12px; color:#666; margin-top:5px;}
</style>
</head>
<body>

<header>automobilius.lt</header>

<div class="container">

<button onclick="toggleForm()">+ Talpinti pasiūlymą</button>

<div id="formBox" class="card hidden">
<h3>Naujas pasiūlymas</h3>
<input id="brand" placeholder="Markė">
<input id="model" placeholder="Modelis">
<input id="year" placeholder="Metai">
<input id="engine" placeholder="Variklis">
<textarea id="defects" placeholder="Defektai"></textarea>
<input id="price" placeholder="Kaina €">
<select id="negotiated">
<option value="Nederinta">Nederinta</option>
<option value="Derinta">Derinta</option>
</select>
<input id="city" placeholder="Miestas">
<input id="interest" placeholder="Interest €">
<input id="phone" placeholder="Viber numeris">
<input type="file" id="photos" multiple>
<button onclick="addPost()">Įkelti</button>
</div>

<div id="posts"></div>

</div>

<script>

function toggleForm(){
    document.getElementById('formBox').classList.toggle('hidden');
}

function getPosts(){
    return JSON.parse(localStorage.getItem('posts') || '[]');
}

function savePosts(posts){
    localStorage.setItem('posts', JSON.stringify(posts));
}

function formatDate(ts){
    let d = new Date(ts);
    return d.toLocaleDateString() + " " + d.toLocaleTimeString();
}

function addPost(){
    let files = document.getElementById('photos').files;
    if(files.length > 5){
        alert("Max 5 nuotraukos");
        return;
    }

    let post = {
        brand: brand.value,
        model: model.value,
        year: year.value,
        engine: engine.value,
        defects: defects.value,
        price: price.value,
        negotiated: negotiated.value,
        city: city.value,
        interest: interest.value,
        phone: phone.value,
        date: new Date().getTime(),
        images: []
    };

    if(files.length){
        let readers = [];
        for(let i=0;i<files.length;i++){
            readers.push(new Promise(resolve=>{
                let r = new FileReader();
                r.onload = e => resolve(e.target.result);
                r.readAsDataURL(files[i]);
            }));
        }

        Promise.all(readers).then(imgs=>{
            post.images = imgs;
            saveAndRender(post);
        });
    } else {
        saveAndRender(post);
    }
}

function saveAndRender(post){
    let posts = getPosts();
    posts.unshift(post);
    savePosts(posts);
    renderPosts();
    document.getElementById('formBox').classList.add('hidden');
}

function renderPosts(){
    let posts = getPosts();
    let html = "";

    posts.forEach((p, index) => {
        let mainImg = p.images && p.images.length ? `<img src="${p.images[0]}" class="main-img" id="main-${index}">` : "";

        let thumbs = "";
        if(p.images && p.images.length > 1){
            thumbs = '<div class="thumb-container">';
            p.images.forEach((img, i)=>{
                thumbs += `<img src="${img}" class="thumb" onclick="changeImg(${index}, '${img}')">`;
            });
            thumbs += '</div>';
        }

        html += `
        <div class="post">
        <b>${p.brand} ${p.model}</b><br>
        ${p.year} | ${p.engine} | ${p.city}<br>
        <div class="date">${formatDate(p.date)}</div><br>
        Defektai: ${p.defects}<br><br>
        Kaina: ${p.price}€ (${p.negotiated})<br>
        Interest: ${p.interest}€<br>
        <div class="viber" onclick="alert('Norint susisiekti – 10€')">Rašyti per Viber</div>
        ${mainImg}
        ${thumbs}
        </div>
        `;
    });

    document.getElementById('posts').innerHTML = html;
}

function changeImg(index, src){
    document.getElementById('main-'+index).src = src;
}

renderPosts();

</script>

</body>
</html>
