<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>automobilius.lt</title>

<style>
body {margin:0;font-family:Arial;background:#f2f2f2;}
header {background:#111;color:#fff;padding:15px;text-align:center;font-size:22px;position:relative;}
.auth-btn {position:absolute;right:15px;top:12px;background:#333;}
.container {max-width:700px;margin:15px auto;padding:10px;}
button {background:#111;color:#fff;border:none;padding:10px;cursor:pointer;margin:2px;}
.card {background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;}
.post {background:#fff;padding:15px;border-radius:12px;margin-bottom:12px;}
input, select {width:100%;padding:10px;margin:5px 0;}
.viber {background:purple;color:white;padding:8px;display:inline-block;margin-top:10px;text-decoration:none;}
.main-img {width:100%;margin-top:10px;}
.thumb-container {display:flex;gap:5px;margin-top:5px;}
.thumb {width:60px;height:60px;object-fit:cover;cursor:pointer;}
.hidden {display:none;}
</style>

</head>
<body>

<header>
automobilius.lt
<button class="auth-btn" onclick="toggleAuth()">Prisijungti</button>
</header>

<div id="authBox" class="card hidden">
<input id="nick" placeholder="Slapyvardis">
<input id="pass" type="password" placeholder="Slaptažodis">
<input id="pass2" type="password" placeholder="Pakartoti (registracijai)">
<button onclick="login()">Prisijungti</button>
<button onclick="register()">Registruotis</button>
</div>

<div class="container">

<div id="userMenu" class="hidden">
<button onclick="toggleForm()">+ Talpinti</button>
<button onclick="logout()">Logout</button>
</div>

<button id="guestBtn" onclick="toggleForm()">+ Talpinti pasiūlymą</button>

<div id="formBox" class="card hidden">

<input id="brand" placeholder="Markė">
<input id="model" placeholder="Modelis">
<input id="year" placeholder="Metai">
<input id="engine" placeholder="Variklis">
<input id="defects" placeholder="Defektai">
<input id="price" placeholder="Kaina €">

<select id="negotiated">
<option>Nederinta</option>
<option>Derinta</option>
</select>

<input id="city" placeholder="Miestas">
<input id="interest" placeholder="Interest €">
<input id="phone" placeholder="Viber nr">

<input type="file" id="photos" multiple>

<button onclick="addPost()">Įkelti</button>

</div>

<div id="posts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYc3MMhNlr2nGGH-PdhrFYkhk3_Zn_2XU",
  authDomain: "automobilius-e2770.firebaseapp.com",
  projectId: "automobilius-e2770"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;

/* USERS */
function getUsers(){ return JSON.parse(localStorage.getItem('users')||'{}'); }
function saveUsers(u){ localStorage.setItem('users', JSON.stringify(u)); }

/* ADMIN */
let users = getUsers();
if(!users['admin']){
 users['admin'] = {pass:'admin123'};
 saveUsers(users);
}

/* AUTH */
window.toggleAuth = ()=> authBox.classList.toggle("hidden");

window.login = ()=>{
 let u = getUsers();
 if(u[nick.value] && u[nick.value].pass===pass.value){
   currentUser = nick.value;
   userMenu.classList.remove("hidden");
   guestBtn.style.display="none";
   authBox.classList.add("hidden");
 } else alert("Blogi duomenys");
}

window.register = ()=>{
 if(pass.value !== pass2.value) return alert("Slaptažodžiai nesutampa");
 let u = getUsers();
 if(u[nick.value]) return alert("Yra toks vartotojas");
 u[nick.value] = {pass:pass.value};
 saveUsers(u);
 alert("Sėkmingai prisiregistravote, dabar galite prisijungti");
}

/* LOGOUT */
window.logout = ()=> location.reload();

/* FORM */
window.toggleForm = ()=> formBox.classList.toggle("hidden");

/* ADD POST */
window.addPost = async ()=>{

 if(!brand.value || !price.value){
   alert("Įvesk markę ir kainą");
   return;
 }

 let files = photos.files;
 let imgs=[];

 if(files.length > 10){
  alert("Max 10 foto");
  return;
 }

 if(files.length){
  let readers=[];
  for(let f of files){
   readers.push(new Promise(res=>{
    let r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.readAsDataURL(f);
   }));
  }
  imgs = await Promise.all(readers);
 }

 await addDoc(collection(db,"posts"),{
  brand:brand.value,
  model:model.value,
  year:year.value,
  engine:engine.value,
  defects:defects.value,
  price:price.value,
  negotiated:negotiated.value,
  city:city.value,
  interest:interest.value,
  phone:phone.value,
  images:imgs,
  user:currentUser || "guest",
  date:Date.now()
 });

 alert("Įkelta!");
 document.getElementById("formBox").reset();
}

/* RENDER */
const q = query(collection(db,"posts"), orderBy("date","desc"));

onSnapshot(q,(snap)=>{
 let html="";

 snap.forEach(d=>{
  let p = d.data();

  let main = p.images?.length
   ? `<img src="${p.images[0]}" class="main-img" id="img-${d.id}">`
   : "";

  let thumbs="";
  if(p.images?.length>1){
    thumbs="<div class='thumb-container'>";
    p.images.forEach(img=>{
      thumbs+=`<img src="${img}" class="thumb" onclick="changeImg('${d.id}','${img}')">`;
    });
    thumbs+="</div>";
  }

  html+=`
  <div class="post">

  <b>${p.brand} ${p.model}</b><br>
  ${p.year} | ${p.engine} | ${p.city}<br><br>

  Defektai: ${p.defects}<br><br>

  Kaina: ${p.price}€ (${p.negotiated})<br>
  Interest: ${p.interest}€<br>

  <a class="viber" href="viber://chat?number=${p.phone}">
  Rašyti per Viber
  </a>

  ${main}
  ${thumbs}

  ${currentUser==="admin" ? `
    <br><button onclick="del('${d.id}')">Delete</button>
    <button onclick="edit('${d.id}','${p.price}')">Edit kaina</button>
  ` : ""}

  </div>`;
 });

 posts.innerHTML = html;
});

/* IMG */
window.changeImg = (id,src)=>{
 document.getElementById("img-"+id).src = src;
}

/* DELETE */
window.del = async(id)=>{
 await deleteDoc(doc(db,"posts",id));
}

/* EDIT */
window.edit = async(id, old)=>{
 let newPrice = prompt("Nauja kaina:", old);
 if(newPrice){
   await updateDoc(doc(db,"posts",id),{price:newPrice});
 }
}

</script>

</body>
</html>
