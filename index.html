<script>

let profit=0, profitLogs=[];
let bought=0, sold=0;
let tasks=[], taskLogs=[];
let lastReset=null;
let chart;

/* NEW */
let xp=0, coins=0, stats={};

function now(){
return new Date().toLocaleString('lt-LT');
}

/* TOGGLE */
function toggle(id){
let el=document.getElementById(id);
if(!el) return;
el.style.display = (el.style.display==="block") ? "none" : "block";
}

/* PROFIT */
function addProfit(){
let val=parseInt(profitAmount.value);
if(!val) return;

let desc=profitDesc.value || "—";

profit+=val;

profitLogs.unshift({
time:now(),
text:`+${val}€`,
desc:desc
});

profitAmount.value="";
profitDesc.value="";

save();
render();
updateChart();
}

/* TASK */
function addTask(){
let t=taskInput.value.trim();
if(!t) return;

tasks.push({text:t,done:false});
taskInput.value="";
save();
renderTasks();
}

function toggleTask(i){
tasks[i].done=!tasks[i].done;

if(tasks[i].done){
taskLogs.unshift({
time:now(),
text:tasks[i].text
});
}

save();
renderTasks();
}

function renderTasks(){
taskList.innerHTML=tasks.map((t,i)=>`
<div class="task ${t.done?'done':''}">
<span>${t.text}</span>
<input type="checkbox" ${t.done?'checked':''} onclick="toggleTask(${i})">
</div>
`).join("");

taskLog.innerHTML=taskLogs.map(l=>`
<div class="log-item">${l.time}<br>✅ ${l.text}</div>
`).join("");
}

/* XP */
function addXP(val,name){
xp+=val;
coins+=Math.floor(val/2);

stats[name]=(stats[name]||0)+1;

profitLogs.unshift({
time:now(),
text:`⭐ +${val}xp`,
desc:name
});

save();
render();
}

/* SHOP */
function buy(price,name){
if(coins<price){
alert("Nepakanka monetų");
return;
}

coins-=price;

profitLogs.unshift({
time:now(),
text:`🛒`,
desc:name
});

save();
render();
}

/* RESET DAY */
function checkReset(){
let today=new Date().toDateString();
if(lastReset!==today){
tasks=tasks.filter(t=>!t.done);
lastReset=today;
save();
}
}

/* CHART */
function updateChart(){
let map={};

profitLogs.forEach(l=>{
let d=l.time.split(" ")[0];
let v=parseInt(l.text.replace("+",""));
if(!isNaN(v)){
map[d]=(map[d]||0)+v;
}
});

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:'line',
data:{
labels:Object.keys(map),
datasets:[{
label:"Pelnas",
data:Object.values(map),
borderColor:'#22c55e',
tension:0.4
}]
}
});
}

/* RENDER */
function render(){

/* PROFIT */
profitBar.style.width=Math.min((profit/10000)*100,100)+"%";
profitText.innerText=`${profit}€ / 10 000€`;

profitLog.innerHTML=profitLogs.map(l=>`
<div class="log-item">${l.time}<br>${l.text} (${l.desc})</div>
`).join("");

/* STATS */
boughtText.innerText=bought;
soldText.innerText=sold;

/* XP */
xpText.innerText=xp;
coinText.innerText=coins;

/* GLOBAL LOG */
if(globalLog){
globalLog.innerHTML=profitLogs.map(l=>`
<div class="log-item">${l.time}<br>${l.text} (${l.desc})</div>
`).join("");
}

/* DAILY STATS */
if(statsContent){
statsContent.innerHTML=Object.keys(stats).map(k=>`
<div class="task"><span>${k}</span><b>${stats[k]}</b></div>
`).join("");
}

renderTasks();
}

/* SAVE */
function save(){
localStorage.setItem("profit",profit);
localStorage.setItem("profitLogs",JSON.stringify(profitLogs));
localStorage.setItem("bought",bought);
localStorage.setItem("sold",sold);
localStorage.setItem("tasks",JSON.stringify(tasks));
localStorage.setItem("taskLogs",JSON.stringify(taskLogs));
localStorage.setItem("lastReset",lastReset);

/* NEW */
localStorage.setItem("xp",xp);
localStorage.setItem("coins",coins);
localStorage.setItem("stats",JSON.stringify(stats));
}

/* LOAD */
function load(){
profit=parseInt(localStorage.getItem("profit"))||0;
profitLogs=JSON.parse(localStorage.getItem("profitLogs"))||[];
bought=parseInt(localStorage.getItem("bought"))||0;
sold=parseInt(localStorage.getItem("sold"))||0;
tasks=JSON.parse(localStorage.getItem("tasks"))||[];
taskLogs=JSON.parse(localStorage.getItem("taskLogs"))||[];
lastReset=localStorage.getItem("lastReset");

/* NEW */
xp=parseInt(localStorage.getItem("xp"))||0;
coins=parseInt(localStorage.getItem("coins"))||0;
stats=JSON.parse(localStorage.getItem("stats"))||{};
}

/* RESET */
function resetAll(){
if(!confirm("Tikrai reset?")) return;
localStorage.clear();
location.reload();
}

/* INIT */
load();
checkReset();
render();
updateChart();

</script>
