<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10K MISIJA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
color:#111;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#16a34a;
font-size:36px;
font-weight:800;
margin-bottom:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.9);
backdrop-filter: blur(12px);
padding:22px;
border-radius:20px;
margin-top:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
transition:0.25s;
}

.card:hover{
transform:translateY(-2px);
}

/* HEADERS */
.card-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.card-header h3{
margin:0;
font-size:22px;
}

/* PROGRESS */
.progress{
height:18px;
background:#e5e7eb;
border-radius:30px;
overflow:hidden;
margin-top:12px;
}

.fill{
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
box-shadow:0 0 12px rgba(34,197,94,0.5);
transition:0.4s;
}

.big{
font-size:26px;
font-weight:800;
margin-top:10px;
}

.week{
color:#2563eb;
font-weight:600;
margin-top:5px;
}

/* INPUT */
input, textarea{
width:100%;
padding:14px;
margin-top:10px;
border-radius:14px;
border:1px solid #e5e7eb;
font-size:15px;
background:#f9fafb;
}

input:focus, textarea:focus{
outline:none;
border-color:#22c55e;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#22c55e,#16a34a);
color:white;
font-weight:700;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 6px 18px rgba(34,197,94,0.3);
}

button:active{
transform:scale(0.97);
}

/* SMALL BTN */
.toggleBtn{
background:#111;
font-size:12px;
padding:6px 10px;
border-radius:10px;
width:auto;
}

/* LOG */
.log{
margin-top:12px;
background:#f1f5f9;
padding:12px;
border-radius:14px;
max-height:220px;
overflow:auto;
font-size:14px;
line-height:1.6;
display:none;
}

/* TASK */
.task{
display:flex;
justify-content:space-between;
align-items:center;
background:#f8fafc;
padding:12px;
border-radius:14px;
margin-top:10px;
border:1px solid #e5e7eb;
transition:0.2s;
}

.task:hover{
background:#f1f5f9;
}

.task-left{
display:flex;
align-items:center;
gap:10px;
}

.task.done{
background:#dcfce7;
text-decoration:line-through;
}

.task input{
transform:scale(1.2);
cursor:pointer;
}

/* DELETE */
.delete{
background:#ef4444;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

/* RESET */
.reset{
background:#ef4444;
}

</style>
</head>

<body>

<div class="container">

<h1>🎯 10K MISIJA</h1>

<!-- PROFIT -->
<div class="card">
<div class="card-header">
<h3>💰 PELNAS</h3>
<button class="toggleBtn" onclick="toggle('profitLog')">📜 Log</button>
</div>

<input id="profitAmount" type="number" placeholder="Pvz 800">
<textarea id="profitDesc" placeholder="Pvz Xtrail pelnas"></textarea>

<button onclick="addProfit()">➕ Pridėti pelną</button>

<div class="progress">
<div id="profitBar" class="fill"></div>
</div>

<p class="big" id="profitText"></p>
<p class="week" id="weekProfit"></p>

<div id="profitLog" class="log"></div>
</div>

<!-- TASKS -->
<div class="card">
<div class="card-header">
<h3>📋 VEIKSMAI</h3>
<button class="toggleBtn" onclick="toggle('taskLog')">📜 Log</button>
</div>

<input id="taskInput" placeholder="Pvz: išplauti mašiną">
<button onclick="addTask()">➕ Pridėti veiksmą</button>

<div id="taskList"></div>

<div id="taskLog" class="log"></div>
</div>

<button class="reset" onclick="resetAll()">❌ RESET</button>

</div>

<script>

// STATE
let profit=0;
let profitLogs=[];
let tasks=[];
let taskLogs=[];
let lastDate="";

// TIME
function today(){
return new Date().toDateString();
}

function now(){
return new Date().toLocaleString();
}

// DAILY RESET
function checkDay(){
if(lastDate!==today()){
tasks = tasks.filter(t=>!t.done);
lastDate = today();
save();
}
}

// PROFIT
function addProfit(){
let val=parseInt(profitAmount.value);
if(!val) return;

profit+=val;
profitLogs.unshift(`${now()} — ${profitDesc.value} +${val}€`);

profitAmount.value="";
profitDesc.value="";

save(); render();
}

// TASKS
function addTask(){
let text=taskInput.value.trim();
if(!text) return;

tasks.push({text,done:false});
taskInput.value="";

save(); render();
}

function toggleTask(i){
tasks[i].done=!tasks[i].done;

if(tasks[i].done){
taskLogs.unshift(`${now()} — ✔️ ${tasks[i].text}`);
}

save(); render();
}

function deleteTask(i){
tasks.splice(i,1);
save(); render();
}

// WEEK
function calcWeek(){
let nowDate=new Date();
let weekAgo=new Date();
weekAgo.setDate(nowDate.getDate()-7);

let sum=0;

profitLogs.forEach(l=>{
let d=new Date(l.split(" — ")[0]);
if(d>=weekAgo){
let val=parseInt(l.split("+")[1]);
if(!isNaN(val)) sum+=val;
}
});

return sum;
}

// TOGGLE
function toggle(id){
let el=document.getElementById(id);
el.style.display = el.style.display==="block"?"none":"block";
}

// RENDER
function render(){

checkDay();

profitBar.style.width=Math.min(profit/10000*100,100)+"%";
profitText.innerText=`${profit}€ / 10 000€`;
weekProfit.innerText=`📅 7 dienos: ${calcWeek()}€`;

profitLog.innerHTML=profitLogs.join("<br>");
taskLog.innerHTML=taskLogs.join("<br>");

taskList.innerHTML="";
tasks.forEach((t,i)=>{
let div=document.createElement("div");
div.className="task"+(t.done?" done":"");

div.innerHTML=`
<div class="task-left">
<input type="checkbox" ${t.done?"checked":""} onclick="toggleTask(${i})">
<span>${t.text}</span>
</div>
<button class="delete" onclick="deleteTask(${i})">X</button>
`;

taskList.appendChild(div);
});
}

// SAVE
function save(){
localStorage.setItem("profit",profit);
localStorage.setItem("profitLogs",JSON.stringify(profitLogs));
localStorage.setItem("tasks",JSON.stringify(tasks));
localStorage.setItem("taskLogs",JSON.stringify(taskLogs));
localStorage.setItem("lastDate",lastDate);
}

// LOAD
function load(){
profit=parseInt(localStorage.getItem("profit"))||0;
profitLogs=JSON.parse(localStorage.getItem("profitLogs"))||[];
tasks=JSON.parse(localStorage.getItem("tasks"))||[];
taskLogs=JSON.parse(localStorage.getItem("taskLogs"))||[];
lastDate=localStorage.getItem("lastDate")||today();
}

// RESET
function resetAll(){
if(!confirm("Tikrai ištrinti viską?")) return;
localStorage.clear();
location.reload();
}

// INIT
load();
render();

</script>

</body>
</html>
