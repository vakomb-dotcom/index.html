<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLIK ULTRA</title>

<style>
body {margin:0;background: radial-gradient(circle at top,#0a0f1f,#05070f);color:white;font-family: system-ui;}
.container {max-width:500px;margin:auto;padding:20px;}
.card {background:#111827;padding:16px;border-radius:18px;margin-top:15px;box-shadow:0 0 20px rgba(0,255,136,0.1);}
h1 {text-align:center;color:#00ff88;}
.progress {height:12px;background:#222;border-radius:10px;overflow:hidden;}
.fill {height:100%;background:#00ff88;transition:0.3s;}
button {width:100%;padding:14px;margin-top:8px;border-radius:14px;border:none;font-size:15px;cursor:pointer;}
.task {background:#0f172a;border:1px solid #00ff88;}
.task.done {background:#14532d;opacity:0.6;}
.shop {border:1px solid gold;}
.toggle {background:#1f2937;color:#00ff88;}
.hidden {display:none;}
</style>
</head>

<body>
<div class="container">
<h1>KLIK ULTRA</h1>

<div class="card">
<h2 id="level"></h2>
<p id="xp"></p>
<div class="progress"><div id="bar" class="fill"></div></div>
<p>💰 Coins: <span id="coins"></span></p>
<p>🔥 Streak: <span id="streak"></span></p>
</div>

<div class="card">
<button class="toggle" onclick="toggle('sveik')">💪 Sveikatingumas</button>
<div id="sveik" class="hidden"></div>

<button class="toggle" onclick="toggle('prod')">📋 Produktyvumas</button>
<div id="prod" class="hidden"></div>

<button class="toggle" onclick="toggle('tobul')">🧠 Tobulėjimas</button>
<div id="tobul" class="hidden"></div>
</div>

<div class="card">
<button class="toggle" onclick="toggle('shopWrap')">🛒 Parduotuvė</button>
<div id="shopWrap" class="hidden">
<button class="shop" onclick="buy(0)">🍕 Premium picos vakaras (60)</button>
<button class="shop" onclick="buy(1)">🛍️ Naujas drabužis (100)</button>
<button class="shop" onclick="buy(2)">📱 2 val. scroll be kaltės (30)</button>
<button class="shop" onclick="buy(3)">🎮 2 val. žaidimų laikas (50)</button>
<button class="shop" onclick="buy(4)">🍔 Cheat meal + desertas (80)</button>
<button class="shop" onclick="buy(5)">🎬 Filmas + užkandžiai (40)</button>
<button class="shop" onclick="buy(6)">☕ Kava mieste + desertas (35)</button>
<button class="shop" onclick="buy(7)">🛏️ Pilnas poilsio vakaras (45)</button>
</div>
</div>

<button onclick="newDay()">🔄 Nauja diena</button>

<div class="card">
<button class="toggle" onclick="toggle('menuWrap')">☰ MENIU</button>

<div id="menuWrap" class="hidden">
<button onclick="resetGame()">❌ Iš naujo pradėti</button>
</div>
</div>

</div>

<script>

let xp=0, level=1, coins=0, streak=0;

let tasks = [
{id:1,cat:"sveik",text:"💪 50 atsispaudimų",xp:12,done:false},
{id:2,cat:"sveik",text:"🏋️ 20 prisitraukimų",xp:18,done:false},
{id:3,cat:"sveik",text:"💧 2L vandens",xp:10,done:false},
{id:4,cat:"sveik",text:"🚶 30 min vaikščiojimas",xp:14,done:false},
{id:5,cat:"sveik",text:"🏃 20 min sportas",xp:16,done:false},
{id:6,cat:"sveik",text:"🧘 tempimai 10min",xp:8,done:false},
{id:7,cat:"sveik",text:"😴 8h miego",xp:12,done:false},
{id:8,cat:"sveik",text:"🥗 sveikas maistas",xp:15,done:false},

{id:9,cat:"prod",text:"📋 susiplanuoti dieną",xp:10,done:false},
{id:10,cat:"prod",text:"📧 atsakyti į laiškus",xp:10,done:false},
{id:11,cat:"prod",text:"🧹 susitvarkyti stalą",xp:8,done:false},
{id:12,cat:"prod",text:"⏳ 1h deep work",xp:18,done:false},
{id:13,cat:"prod",text:"📵 2h be soc. tinklų",xp:14,done:false},
{id:14,cat:"prod",text:"📒 užbaigti užduotį",xp:16,done:false},
{id:15,cat:"prod",text:"💻 30 min fokusas",xp:12,done:false},
{id:16,cat:"prod",text:"📊 peržiūrėti tikslus",xp:10,done:false},

{id:17,cat:"tobul",text:"📖 20 puslapių",xp:12,done:false},
{id:18,cat:"tobul",text:"🎧 podcast 20min",xp:10,done:false},
{id:19,cat:"tobul",text:"🧠 naujas skill",xp:15,done:false},
{id:20,cat:"tobul",text:"✍️ refleksija",xp:10,done:false},
{id:21,cat:"tobul",text:"📈 analizuoti progresą",xp:12,done:false},
{id:22,cat:"tobul",text:"🎯 rytojaus tikslai",xp:10,done:false},
{id:23,cat:"tobul",text:"💡 5 idėjos",xp:14,done:false},
{id:24,cat:"tobul",text:"📚 mokytis 30min",xp:16,done:false}
];

function toggle(id){
document.getElementById(id).classList.toggle("hidden");
}

function resetGame(){
localStorage.removeItem("klik_ultra");
location.reload();
}

function save(){
localStorage.setItem("klik_ultra", JSON.stringify({xp,level,coins,streak,tasks}));
}

function load(){
let data = JSON.parse(localStorage.getItem("klik_ultra"));
if(data){ xp=data.xp; level=data.level; coins=data.coins; streak=data.streak; tasks=data.tasks; }
}

function addXP(val){
xp+=val;
coins+=Math.floor(val/2);
if(xp>=100){xp-=100;level++;}
save(); render();
}

function completeTask(id){
tasks=tasks.map(t=>{
if(t.id===id && !t.done){ addXP(t.xp); return {...t,done:true}; }
return t;
});
render();
}

function newDay(){
if(tasks.every(t=>t.done)){ streak++; addXP(30); }
tasks=tasks.map(t=>({...t,done:false}));
save(); render();
}

function buy(i){
if(i==0 && coins>=60){coins-=60;alert("🍕 Mėgaukis pica!");}
if(i==1 && coins>=100){coins-=100;alert("🛍️ Pasilepink!");}
if(i==2 && coins>=30){coins-=30;alert("📱 Scrollink be kaltės");}
if(i==3 && coins>=50){coins-=50;alert("🎮 Žaidimų laikas");}
if(i==4 && coins>=80){coins-=80;alert("🍔 Cheat meal!");}
if(i==5 && coins>=40){coins-=40;alert("🎬 Filmų vakaras");}
if(i==6 && coins>=35){coins-=35;alert("☕ Kavos pertrauka");}
if(i==7 && coins>=45){coins-=45;alert("🛏️ Poilsio vakaras");}
save(); render();
}

function render(){
document.getElementById("level").innerText="Lygis: "+level;
document.getElementById("xp").innerText="XP: "+xp+"/100";
document.getElementById("coins").innerText=coins;
document.getElementById("streak").innerText=streak;
document.getElementById("bar").style.width=xp+"%";

renderCategory("sveik");
renderCategory("prod");
renderCategory("tobul");
}

function renderCategory(cat){
let div=document.getElementById(cat);
div.innerHTML="";

tasks.filter(t=>t.cat===cat).forEach(t=>{
let b=document.createElement("button");
b.className="task"+(t.done?" done":"");
b.innerText=(t.done?"✅ ":"⬜ ")+t.text+" (+"+t.xp+")";
b.onclick=()=>completeTask(t.id);
div.appendChild(b);
});
}

load();
render();

</script>
</body>
</html>
