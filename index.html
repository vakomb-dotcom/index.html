<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLIK PRO</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at top,#0a0f1f,#05070f);
  color:white;
  font-family: system-ui;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1{
  color:#00ff88;
  text-align:center;
}

.card{
  background:#111827;
  padding:16px;
  border-radius:18px;
  margin-top:15px;
  box-shadow:0 0 20px rgba(0,255,136,0.1);
}

.progress{
  height:12px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#00ff88,#00ffa2);
  transition:0.3s;
}

button{
  width:100%;
  padding:16px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  font-size:16px;
  transition:0.2s;
}

button:active{
  transform:scale(0.95);
}

.task{
  background:#0f172a;
  color:white;
  border:1px solid #00ff88;
}

.task.done{
  background:#14532d;
  opacity:0.6;
}

.green{
  background:#00ff88;
  color:black;
  font-weight:bold;
}

.red{
  background:#ff4444;
  color:white;
}

.shop-item{
  background:#0f172a;
  border:1px solid gold;
}
</style>
</head>

<body>

<div class="container">

<h1>KLIK PRO</h1>

<div class="card">
<h2 id="level"></h2>
<p id="xp"></p>
<div class="progress"><div class="fill" id="bar"></div></div>
<p>💰 Coins: <span id="coins"></span></p>
</div>

<div class="card">
🔥 Streak: <span id="streak"></span>
</div>

<div class="card">
<h3>Užduotys</h3>
<div id="tasks"></div>
</div>

<div class="card">
<h3>Shop 🛒</h3>

<button class="shop-item" onclick="buy(0)">⚡ XP Boost (50 coins)</button>
<button class="shop-item" onclick="buy(1)">🔥 Double XP (100 coins)</button>

</div>

<button class="green" onclick="addXP(5)">+5 XP</button>
<button class="red" onclick="newDay()">Nauja diena</button>

</div>

<script>
let xp=0,level=1,streak=0,coins=0;
let boost=1;
let doubleXP=false;

let tasks=[
 {id:1,text:"Skaityti",xp:10,done:false},
 {id:2,text:"Sportas",xp:15,done:false},
 {id:3,text:"Tvarka",xp:20,done:false}
];

// LOAD
const saved=localStorage.getItem("klik_pro");
if(saved){
 let d=JSON.parse(saved);
 xp=d.xp||0;
 level=d.level||1;
 streak=d.streak||0;
 coins=d.coins||0;
 tasks=d.tasks||tasks;
}

// SAVE
function save(){
 localStorage.setItem("klik_pro",JSON.stringify({xp,level,streak,coins,tasks}));
}

// XP
function addXP(val){
 let gain = val * boost;
 if(doubleXP) gain*=2;

 xp+=gain;
 coins+=Math.floor(gain/2);

 while(xp>=100){
  xp-=100;
  level++;
 }

 animateGain(gain);
 save();
 render();
}

// TASK
function completeTask(id){
 tasks=tasks.map(t=>{
  if(t.id===id && !t.done){
   addXP(t.xp);
   return {...t,done:true};
  }
  return t;
 });
 save();
 render();
}

// NEW DAY
function newDay(){
 if(tasks.every(t=>t.done)){
  streak++;
  addXP(20);
 }
 tasks=tasks.map(t=>({...t,done:false}));
 save();
 render();
}

// SHOP
function buy(i){
 if(i==0 && coins>=50){
  coins-=50;
  boost=2;
 }
 if(i==1 && coins>=100){
  coins-=100;
  doubleXP=true;
 }
 save();
 render();
}

// UI
function render(){
 levelEl.innerText="Lygis: "+level;
 xpEl.innerText="XP: "+xp+" / 100";
 coinsEl.innerText=coins;
 streakEl.innerText=streak;
 bar.style.width=xp+"%";

 tasksDiv.innerHTML="";
 tasks.forEach(t=>{
  let btn=document.createElement("button");
  btn.className="task"+(t.done?" done":"");
  btn.innerText=(t.done?"✅ ":"⬜ ")+t.text+" (+"+t.xp+")";
  btn.onclick=()=>completeTask(t.id);
  tasksDiv.appendChild(btn);
 });
}

// ANIMATION
function animateGain(val){
 let div=document.createElement("div");
 div.innerText="+"+val+" XP";
 div.style.position="fixed";
 div.style.top="50%";
 div.style.left="50%";
 div.style.transform="translate(-50%,-50%)";
 div.style.color="#00ff88";
 div.style.fontSize="24px";
 document.body.appendChild(div);

 setTimeout(()=>div.remove(),800);
}

// refs
const levelEl=document.getElementById("level");
const xpEl=document.getElementById("xp");
const streakEl=document.getElementById("streak");
const coinsEl=document.getElementById("coins");
const bar=document.getElementById("bar");
const tasksDiv=document.getElementById("tasks");

render();
</script>

</body>
</html>
