<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Švara</title>

<style>
body {
    font-family: -apple-system, Arial;
    margin: 0;
    background: #f5f7fb;
    color: #111;
}

.header {
    height: 200px;
    background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url('https://images.unsplash.com/photo-1625047509248-ec889cbff17f?q=80&w=1200') center/cover;
}

.container {
    max-width: 480px;
    margin: -70px auto 20px;
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 { text-align:center; }

.card {
    background: #f1f5f9;
    padding: 14px;
    border-radius: 12px;
    margin: 8px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

input[type="checkbox"] {
    width:20px;
    height:20px;
}

.total {
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-top:15px;
}

button {
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:16px;
}

.hidden { display:none; }

.form input, .form select {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
    box-sizing:border-box;
}
</style>
</head>
<body>

<div class="header"></div>

<div class="container" id="servicesPage">
<h1>Pasirink paslaugas</h1>

<div class="card"><span>Siurbimas + plastikai + stiklai (50€)</span><input type="checkbox" value="50"></div>
<div class="card"><span>Cheminis valymas (90€)</span><input type="checkbox" value="90"></div>
<div class="card"><span>Poliravimas 1 step (150€)</span><input type="checkbox" value="150"></div>
<div class="card"><span>Žibintų poliravimas (35€)</span><input type="checkbox" value="35"></div>
<div class="card"><span>Smulkių defektų maskavimas (30€)</span><input type="checkbox" value="30"></div>

<div class="total">Bendra: <span id="total">0</span> €</div>

<button onclick="goToForm()">Registruotis</button>
</div>

<div class="container hidden" id="formPage">
<h1>Registracija</h1>

<form action="https://formspree.io/f/YOUR_ID" method="POST">

<input name="Marke" placeholder="Markė" required>
<input name="Modelis" placeholder="Modelis" required>
<input name="Miestas" placeholder="Miestas" required>
<input name="Telefonas" placeholder="Telefonas" required>

<label>Data</label>
<input name="Data" type="date" required>

<label>Laikas</label>
<select name="Laikas">
<option>09:00</option>
<option>12:00</option>
<option>15:00</option>
<option>18:00</option>
</select>

<input type="hidden" name="Suma" id="hiddenTotal">

<div class="total">Suma: <span id="finalTotal">0</span> €</div>

<button type="submit">Registruotis</button>

</form>
</div>

<script>
const checkboxes = document.querySelectorAll('#servicesPage input[type="checkbox"]');

function calculateTotal(){
    let total = 0;
    checkboxes.forEach(c=>{
        if(c.checked) total += Number(c.value);
    });

    document.getElementById('total').innerText = total;

    const f = document.getElementById('finalTotal');
    if(f) f.innerText = total;

    document.getElementById('hiddenTotal').value = total + "€";
}

checkboxes.forEach(cb=>{
    cb.addEventListener('change', calculateTotal);
});

function goToForm(){
    calculateTotal();
    document.getElementById('servicesPage').classList.add('hidden');
    document.getElementById('formPage').classList.remove('hidden');
}
</script>

</body>
</html>
