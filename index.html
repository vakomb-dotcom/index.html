<script>

/* ORIGINAL */
let xp=0, level=1, coins=0;
let totalTasks=0, totalXP=0;
let weeklyTasks=0;
let historyLog=[];
let lastDay="";

/* 🔥 NAUJA STATISTIKA */
let stats = {
walkMinutes:0,
waterLiters:0,
pushups:0,
pullups:0,

contracts:0,
ads:0,
bought:0,
sold:0,
delayed:0,

learning:0,
ceLearning:0,
books:0,
noTv:0
};

const rewards = [
{price:60,text:"picos vakarą"},
{price:100,text:"drabužį"},
{price:30,text:"scrollinimą"},
{price:50,text:"žaidimus"},
{price:80,text:"cheat maistą"},
{price:40,text:"filmą"},
{price:35,text:"kavą"}
];

function buy(i){
let r = rewards[i];
if(!r) return;

if(coins < r.price){
alert("❌ Neužtenka monetų");
return;
}

coins -= r.price;
log("atsiėmei "+r.text);
alert("🎁 Gavai: "+r.text);

save(); render();
}

function toggle(id){document.getElementById(id).classList.toggle("hidden");}

function resetGame(){
if(confirm("Ar tikrai nori ištrinti visą progresą?")){
localStorage.clear();
location.reload();
}
}

function addXP(val){
xp+=val;
totalXP+=val;
coins+=Math.floor(val/2);

while(xp>=100){
xp-=100;
level++;
}

save();
}

/* 🔥 STAT LOGIKA */
function updateStats(task){
switch(task.text){

// SVEIKATA
case "30min pasivaikščiojimas":
stats.walkMinutes += 30;
break;

case "2L vandens":
stats.waterLiters += 2;
break;

case "50 atsispaudimų":
stats.pushups += 50;
break;

case "20 prisitraukimų":
stats.pullups += 20;
break;

// PRODUKTYVUMAS
case "5 pardavimo sutartys":
stats.contracts += 5;
break;

case "1 į skelbimus automobilis":
stats.ads += 1;
break;

case "1 nupirktas automobilis":
stats.bought += 1;
break;

case "1 parduotas automobilis":
stats.sold += 1;
break;

case "Atidėliotas dalykas (1)":
stats.delayed += 1;
break;

case "Atidėliotas dalykas (2)":
stats.delayed += 2;
break;

// TOBULĖJIMAS
case "60min mokymasis":
stats.learning += 60;
break;

case "60min CE teorija":
stats.ceLearning += 60;
break;

case "20 puslapių skaitymas":
stats.books += 1;
break;

case "Diena be TV":
stats.noTv += 1;
break;

}
}

function completeTask(id){
let task = tasks.find(t=>t.id===id);
if(!task || task.done) return;

task.done = true;

addXP(task.xp);
updateStats(task); /* 🔥 */

totalTasks++;
weeklyTasks++;

log("atlikai "+task.text);

save();
render();
}

/* 🔥 SUPER STATISTIKA */
function showStats(){

alert(`📊 PRO STATISTIKA

💪 SVEIKATA
👣 Nueita: ${stats.walkMinutes} min
💧 Vanduo: ${stats.waterLiters} L
💪 Atsispaudimai: ${stats.pushups}
🧗 Prisitraukimai: ${stats.pullups}

📋 PRODUKTYVUMAS
📄 Sutartys: ${stats.contracts}
🚗 Į skelbimus: ${stats.ads}
💰 Nupirkta auto: ${stats.bought}
🏁 Parduota auto: ${stats.sold}
⏳ Atidėlioti: ${stats.delayed}

🧠 TOBULĖJIMAS
📚 Mokymasis: ${stats.learning} min
🚛 CE teorija: ${stats.ceLearning} min
📖 Knygos: ${stats.books * 20} puslapių
📺 Be TV: ${stats.noTv} dienos

📈 BENDRA
✔️ Užduotys: ${totalTasks}
⭐ XP: ${totalXP}
`);
}

function showHistory(){
if(!historyLog.length) return alert("Tuščia");
alert(historyLog.slice(-20).join("\n"));
}

function showLevels(){
alert(`🏆 Lygiai
5 → unlock
10 → special
20 → PRO`);
}

function log(txt){
historyLog.push(new Date().toLocaleTimeString()+" - "+txt);
}

/* SAVE */
function save(){
localStorage.setItem("klik_ultra", JSON.stringify({
xp,level,coins,tasks,totalTasks,totalXP,weeklyTasks,historyLog,lastDay,stats
}));
}

function load(){
try{
let data = JSON.parse(localStorage.getItem("klik_ultra"));
if(data){
xp=data.xp||0;
level=data.level||1;
coins=data.coins||0;
tasks=data.tasks||tasks;
totalTasks=data.totalTasks||0;
totalXP=data.totalXP||0;
weeklyTasks=data.weeklyTasks||0;
historyLog=data.historyLog||[];
stats=data.stats || stats;
}
}catch(e){}
}

load();
render();

</script>
