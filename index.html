<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTYVACIJOS</title>

<style>
body {margin:0;background: linear-gradient(180deg,#0f172a,#111827,#020617);color:#e5e7eb;font-family: system-ui;}
.container {max-width:500px;margin:auto;padding:20px;}
h1 {text-align:center;color:#4ade80;font-weight:700;letter-spacing:1px;}

.card {background:rgba(17,24,39,0.8);backdrop-filter: blur(12px);padding:18px;border-radius:20px;margin-top:15px;border:1px solid rgba(255,255,255,0.05);box-shadow:0 10px 30px rgba(0,0,0,0.5);}

.progress {height:12px;background:#1f2937;border-radius:20px;overflow:hidden;margin-top:8px;}
.fill {height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);box-shadow:0 0 10px #22c55e;transition:0.4s;}

button {width:100%;padding:14px;margin-top:10px;border-radius:14px;border:none;font-size:15px;cursor:pointer;transition:0.2s;}
button:hover {transform:translateY(-2px);}
button:active {transform:scale(0.97);}
button:disabled {opacity:0.5;cursor:not-allowed;}

.toggle {background:#1f2937;color:#4ade80;font-weight:600;}

.task {background:#020617;border:1px solid #1f2937;text-align:left;}
.task.done {background:#052e1b;color:#4ade80;}

.shop {background:#1f2937;border:1px solid #facc15;color:#facc15;}
.hidden {display:none;}
</style>
</head>

<body>

<div class="container">

<h1>MOTYVACIJOS</h1>

<div class="card">
<h2 id="level"></h2>
<p id="xp"></p>
<div class="progress"><div id="bar" class="fill"></div></div>
<p style="margin-top:10px;">💰 Monetos: <span id="coins"></span></p>
</div>

<div class="card">
<button class="toggle" onclick="toggle('sveik')">💪 Sveikata</button>
<div id="sveik" class="hidden"></div>

<button class="toggle" onclick="toggle('prod')">📋 Produktyvumas</button>
<div id="prod" class="hidden"></div>

<button class="toggle" onclick="toggle('tobul')">🧠 Tobulėjimas</button>
<div id="tobul" class="hidden"></div>
</div>

<div class="card">
<button class="toggle" onclick="toggle('shopWrap')">🎁 Apdovanojimai</button>
<div id="shopWrap" class="hidden">
<button class="shop" onclick="buy(2)">📱 Scrollinimas (30)</button>
<button class="shop" onclick="buy(6)">☕ Kava (35)</button>
<button class="shop" onclick="buy(5)">🎬 Filmas (40)</button>
<button class="shop" onclick="buy(3)">🎮 Žaidimai (50)</button>
<button class="shop" onclick="buy(0)">🍕 Picos vakaras (60)</button>
<button class="shop" onclick="buy(4)">🍔 Cheat maistas (80)</button>
<button class="shop" onclick="buy(1)">🛍️ Naujas drabužis (100)</button>
</div>
</div>

<div class="card">
<button class="toggle" onclick="toggle('menuWrap')">☰ MENIU</button>
<div id="menuWrap" class="hidden">

<button onclick="showStats()">📊 Statistika</button>

<button class="toggle" onclick="toggle('achWrap')">🏅 Pasiekimai</button>
<div id="achWrap" class="hidden">

<button class="toggle" onclick="toggle('achSveik')">💪 Sveikata</button>
<div id="achSveik" class="hidden"></div>

<button class="toggle" onclick="toggle('achProd')">📋 Produktyvumas</button>
<div id="achProd" class="hidden"></div>

<button class="toggle" onclick="toggle('achTobul')">🧠 Tobulėjimas</button>
<div id="achTobul" class="hidden"></div>

</div>

<button onclick="showLevels()">🏆 Lygiai</button>
<button onclick="showHistory()">📜 Istorija</button>

<button onclick="toggle('weekWrap')">📅 Savaitės tikslai</button>

<div id="weekWrap" class="hidden">
<button onclick="weekReward(50,20,10)">✔️ 10 → +50XP +20 monetų</button>
<button onclick="weekReward(120,50,25)">✔️ 25 → +120XP +50 monetų</button>
<button onclick="weekReward(250,120,50)">✔️ 50 → +250XP +120 monetų</button>
</div>

<button onclick="resetGame()">❌ Atstatyti žaidimą</button>

</div>
</div>

</div>

<script>

let xp=0, level=1, coins=0;
let totalTasks=0, totalXP=0;
let weeklyTasks=0;
let historyLog=[];
let achieved={};

let stats = {
walk:0, water:0, pushups:0, pullups:0,
contracts:0, ads:0, bought:0, sold:0, delayed:0,
learning:0, ce:0, books:0, notv:0
};

/* 🔥 LEVEL UP */
function addXP(val){
xp+=val;
totalXP+=val;
coins+=Math.floor(val/2);
while(xp>=100){
xp-=100;
level++;
alert("🔥 LEVEL UP!");
}
}

/* 🔥 ACHIEVEMENTS CHECK */
function checkAchievements(){

function give(key,cond,coinsReward,text){
if(cond && !achieved[key]){
achieved[key]=true;
coins+=coinsReward;
alert("🏅 "+text+" +" + coinsReward);
}
}

/* SVEIKATA */
give("p100",stats.pushups>=100,25,"100 atsispaudimų");
give("p300",stats.pushups>=300,60,"300 atsispaudimų");
give("p500",stats.pushups>=500,100,"500 atsispaudimų");

give("pull50",stats.pullups>=50,35,"50 prisitraukimų");
give("pull100",stats.pullups>=100,60,"100 prisitraukimų");
give("pull300",stats.pullups>=300,100,"300 prisitraukimų");

/* PRODUKTYVUMAS */
give("c10",stats.contracts>=10,20,"10 sutarčių");
give("c20",stats.contracts>=20,30,"20 sutarčių");
give("c50",stats.contracts>=50,80,"50 sutarčių");

give("s3",stats.sold>=3,100,"3 parduoti auto");
give("s5",stats.sold>=5,200,"5 parduoti auto");
give("s10",stats.sold>=10,500,"10 parduotų auto");

give("d3",stats.delayed>=3,30,"3 atidėlioti");
give("d7",stats.delayed>=7,60,"7 atidėlioti");
give("d10",stats.delayed>=10,90,"10 atidėlioti");

/* TOBULĖJIMAS */
give("b40",stats.books*20>=40,20,"40 puslapių");
give("b100",stats.books*20>=100,50,"100 puslapių");
give("b200",stats.books*20>=200,100,"200 puslapių");

give("ce180",stats.ce>=180,60,"180min CE");
give("ce300",stats.ce>=300,90,"300min CE");
give("ce500",stats.ce>=500,120,"500min CE");

give("tv1",stats.notv>=1,20,"1 diena be TV");
give("tv3",stats.notv>=3,50,"3 dienos be TV");
give("tv7",stats.notv>=7,70,"7 dienos be TV");
}

/* 🔥 RENDER ACH */
function renderAchievements(){

function make(id,list){
let div=document.getElementById(id);
div.innerHTML="";

list.forEach(a=>{
let b=document.createElement("button");
let done = a.done;

b.textContent=(done?"✅ ":"🔒 ")+a.text;

if(done && !achieved[a.key]){
b.onclick=()=>{
coins+=a.reward;
achieved[a.key]=true;
alert("🏅 +" + a.reward);
save(); render(); renderAchievements();
};
}else{
b.disabled=true;
}

div.appendChild(b);
});
}

make("achSveik",[
{key:"p100",text:"100 atsispaudimų (+25)",done:stats.pushups>=100,reward:25},
{key:"p300",text:"300 atsispaudimų (+60)",done:stats.pushups>=300,reward:60},
{key:"p500",text:"500 atsispaudimų (+100)",done:stats.pushups>=500,reward:100}
]);

make("achProd",[
{key:"c10",text:"10 sutarčių (+20)",done:stats.contracts>=10,reward:20},
{key:"c20",text:"20 sutarčių (+30)",done:stats.contracts>=20,reward:30}
]);

make("achTobul",[
{key:"b40",text:"40 puslapių (+20)",done:stats.books*20>=40,reward:20}
]);

}

/* PATCH */
let oldComplete=completeTask;
completeTask=function(id){
oldComplete(id);
checkAchievements();
renderAchievements();
}

function render(){
document.getElementById("level").innerText="Lygis: "+level;
document.getElementById("xp").innerText="XP: "+xp+"/100";
document.getElementById("coins").innerText=coins;
document.getElementById("bar").style.width=xp+"%";
renderCategory("sveik");
renderCategory("prod");
renderCategory("tobul");
renderAchievements();
}

function save(){
localStorage.setItem("klik_ultra", JSON.stringify({
xp,level,coins,tasks,totalTasks,totalXP,weeklyTasks,stats,historyLog,achieved
}));
}

function load(){
let d=JSON.parse(localStorage.getItem("klik_ultra"));
if(d){
xp=d.xp||0; level=d.level||1; coins=d.coins||0;
tasks=d.tasks||tasks;
totalTasks=d.totalTasks||0;
totalXP=d.totalXP||0;
weeklyTasks=d.weeklyTasks||0;
stats=d.stats||stats;
historyLog=d.historyLog||[];
achieved=d.achieved||{};
}
}

load(); render();

</script>

</body>
</html>
