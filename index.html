<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>automobilius.lt</title>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }

header {
  background:#111; color:#fff; padding:15px;
  display:flex; justify-content:space-between; align-items:center;
}

.auth {
  position:relative;
}

.auth-box {
  position:absolute;
  right:0;
  top:40px;
  background:#fff;
  color:#000;
  padding:15px;
  border-radius:10px;
  width:250px;
  display:none;
}

.container { max-width:900px; margin:20px auto; padding:10px;}
button { padding:8px; background:black; color:white; border:none; cursor:pointer; margin:2px;}
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:15px;}
.post { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px;}
input { width:100%; padding:8px; margin:5px 0;}
.viber { background:purple; color:white; padding:8px; display:inline-block; margin-top:10px;}
.menu { display:flex; gap:5px; margin-bottom:10px;}
.hidden { display:none; }
</style>

</head>
<body>

<header>
<div><b>automobilius.lt</b></div>

<div class="auth">
<button onclick="toggleAuth()">Prisijungti</button>

<div id="authBox" class="auth-box">
<input id="nick" placeholder="Nick">
<input id="pass" type="password" placeholder="Slaptažodis">
<input id="pass2" type="password" placeholder="Pakartoti">

<button onclick="login()">Prisijungti</button>
<button onclick="register()">Registruotis</button>
</div>
</div>

</header>

<div class="container">

<div class="menu">
<button onclick="toggleForm()">Talpinti</button>
<button onclick="myPosts()">Mano</button>
<button onclick="savedPosts()">Išsaugoti</button>
<button onclick="logout()">Logout</button>
</div>

<div id="formBox" class="card hidden">
<input id="brand" placeholder="Markė">
<input id="model" placeholder="Modelis">
<input id="price" placeholder="Kaina">
<input id="phone" placeholder="Viber nr">
<button onclick="addPost()">Įkelti</button>
</div>

<div id="posts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYc3MMhNlr2nGGH-PdhrFYkhk3_Zn_2XU",
  authDomain: "automobilius-e2770.firebaseapp.com",
  projectId: "automobilius-e2770"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = "guest";

// dropdown toggle
window.toggleAuth = function(){
  let box = document.getElementById('authBox');
  box.style.display = box.style.display === "block" ? "none" : "block";
}

// USERS LOCAL
function getUsers(){
 return JSON.parse(localStorage.getItem('users')||'{}');
}
function saveUsers(u){
 localStorage.setItem('users', JSON.stringify(u));
}

// ADMIN
let users = getUsers();
if(!users['admin']){
 users['admin'] = {pass:'admin321'};
 saveUsers(users);
}

// LOGIN
window.login = function(){
 let u = getUsers();
 if(u[nick.value] && u[nick.value].pass === pass.value){
   currentUser = nick.value;
   alert("Prisijungei kaip " + currentUser);
 } else alert("Blogi duomenys");
}

// REGISTER
window.register = function(){
 if(pass.value !== pass2.value) return alert("Nesutampa");
 let u = getUsers();
 if(u[nick.value]) return alert("Yra toks");
 u[nick.value] = {pass:pass.value};
 saveUsers(u);
 alert("Registracija OK");
}

// LOGOUT
window.logout = function(){
 currentUser = "guest";
}

// FORM
window.toggleForm = function(){
 formBox.classList.toggle('hidden');
}

// ADD POST
window.addPost = async function(){
 await addDoc(collection(db,"posts"),{
   brand:brand.value,
   model:model.value,
   price:price.value,
   phone:phone.value,
   user:currentUser,
   date:new Date().getTime()
 });
}

// REALTIME
const q = query(collection(db,"posts"), orderBy("date","desc"));

onSnapshot(q,(snap)=>{
 let html="";
 snap.forEach(d=>{
  let p = d.data();
  html+=`
  <div class="post">
  <b>${p.brand} ${p.model}</b><br>
  ${p.price}€<br>
  <a class="viber" href="viber://chat?number=${p.phone}">Viber</a><br>
  <small>${p.user}</small><br>
  ${currentUser==="admin" ? `<button onclick="del('${d.id}')">Delete</button>`:""}
  </div>`;
 });
 posts.innerHTML = html;
});

// DELETE
window.del = async function(id){
 await deleteDoc(doc(db,"posts",id));
}

// MY POSTS
window.myPosts = function(){
 onSnapshot(q,(snap)=>{
  let html="";
  snap.forEach(d=>{
    let p=d.data();
    if(p.user===currentUser){
      html+=`<div class="post">${p.brand} ${p.model}</div>`;
    }
  });
  posts.innerHTML=html;
 });
}

// SAVED
window.savedPosts = function(){
 alert("Saved funkcija palikta kaip buvo (localStorage)");
}

</script>

</body>
</html>
