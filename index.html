<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>automobilius.lt</title>

<style>
body {margin:0;font-family:Arial;background:#f2f2f2;}
header {background:#111;color:#fff;padding:15px;text-align:center;font-size:22px;position:relative;}
.auth-btn {position:absolute;right:15px;top:12px;background:#333;}
.container {max-width:700px;margin:15px auto;padding:10px;}
button {background:#111;color:#fff;border:none;padding:10px;cursor:pointer;margin:2px;}
.card {background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;}
.post {background:#fff;padding:15px;border-radius:12px;margin-bottom:12px;}
input, select {width:100%;padding:10px;margin:5px 0;}

.main-img {width:100%;margin-top:10px;border-radius:10px;}
.thumb-container {display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.thumb {width:65px;height:65px;object-fit:cover;border-radius:6px;cursor:pointer;}

.preview img {width:70px;height:70px;margin:5px;border-radius:6px;}
.preview div {display:inline-block;position:relative;}
.preview button {position:absolute;top:0;right:0;background:red;color:#fff;}

.admin {background:#111;color:#fff;padding:10px;border-radius:10px;margin-bottom:10px;}
.hidden {display:none;}
</style>
</head>

<body>

<header>
automobilius.lt
<button class="auth-btn" onclick="toggleAuth()">Prisijungti</button>
</header>

<div id="authBox" class="card hidden">
<input id="nick" placeholder="Slapyvardis">
<input id="pass" type="password" placeholder="Slaptažodis">
<button onclick="login()">Prisijungti</button>
</div>

<div class="container">

<div id="adminPanel" class="admin hidden"></div>

<button onclick="toggleForm()">+ Talpinti pasiūlymą</button>

<div id="formBox" class="card hidden">

<input id="brand" placeholder="Markė">
<input id="model" placeholder="Modelis">
<input id="year" placeholder="Metai">
<input id="engine" placeholder="Variklis">
<input id="defects" placeholder="Defektai">
<input id="price" placeholder="Kaina €">

<select id="negotiated">
<option>Nederinta</option>
<option>Derinta</option>
</select>

<input id="city" placeholder="Miestas">
<input id="interest" placeholder="Interest €">
<input id="phone" placeholder="Viber nr">

<input type="file" id="photos" multiple>
<div id="preview" class="preview"></div>

<button onclick="addPost()">Įkelti</button>

</div>

<div id="posts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYc3MMhNlr2nGGH-PdhrFYkhk3_Zn_2XU",
  authDomain: "automobilius-e2770.firebaseapp.com",
  projectId: "automobilius-e2770"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;
let selectedFiles = [];

/* 🔐 LOGIN FIX */
window.login = ()=>{
 if(nick.value === "admin" && pass.value === "admin123"){
   currentUser = "admin";
   adminPanel.classList.remove("hidden");
   authBox.classList.add("hidden");
 } else {
   alert("Blogi duomenys");
 }
}

/* UI */
window.toggleAuth = ()=> authBox.classList.toggle("hidden");
window.toggleForm = ()=> formBox.classList.toggle("hidden");

/* PREVIEW */
photos.onchange = ()=>{
 selectedFiles = Array.from(photos.files);
 renderPreview();
}

function renderPreview(){
 preview.innerHTML="";
 selectedFiles.forEach((file,i)=>{
   let url = URL.createObjectURL(file);
   preview.innerHTML += `
   <div>
     <img src="${url}">
     <button onclick="removePhoto(${i})">x</button>
   </div>`;
 });
}

window.removePhoto = (i)=>{
 selectedFiles.splice(i,1);
 renderPreview();
}

/* COMPRESS */
function compress(file){
 return new Promise(res=>{
   let r=new FileReader();
   r.onload=e=>{
     let img=new Image();
     img.onload=()=>{
       let c=document.createElement("canvas");
       let ctx=c.getContext("2d");

       let scale = 800 / img.width;
       c.width = 800;
       c.height = img.height * scale;

       ctx.drawImage(img,0,0,c.width,c.height);
       res(c.toDataURL("image/jpeg",0.6));
     };
     img.src=e.target.result;
   };
   r.readAsDataURL(file);
 });
}

/* ADD POST FIX */
window.addPost = async ()=>{

 try {

   if(selectedFiles.length > 5){
     alert("Max 5 foto (saugumo limitas)");
     return;
   }

   let imgs = await Promise.all(selectedFiles.map(f=>compress(f)));

   await addDoc(collection(db,"posts"),{
     brand:brand.value,
     model:model.value,
     year:year.value,
     engine:engine.value,
     defects:defects.value,
     price:price.value,
     negotiated:negotiated.value,
     city:city.value,
     interest:interest.value,
     phone:phone.value,
     images:imgs,
     date:Date.now()
   });

   alert("Įkelta!");

   formBox.reset();
   selectedFiles = [];
   preview.innerHTML = "";

 } catch(e){
   console.error(e);
   alert("Klaida įkeliant (per didelės foto)");
 }

}

/* RENDER */
const q = query(collection(db,"posts"), orderBy("date","desc"));

onSnapshot(q,(snap)=>{
 let html="";
 let count=0;

 snap.forEach(d=>{
  count++;
  let p=d.data();

  let main = p.images?.[0] ? `<img src="${p.images[0]}" class="main-img" id="img-${d.id}">` : "";

  let thumbs="";
  if(p.images?.length>1){
    thumbs="<div class='thumb-container'>";
    p.images.forEach(img=>{
      thumbs+=`<img src="${img}" class="thumb" onclick="changeImg('${d.id}','${img}')">`;
    });
    thumbs+="</div>";
  }

  html+=`
  <div class="post">
  <b>${p.brand} ${p.model}</b><br>
  ${p.year} | ${p.engine} | ${p.city}<br><br>
  Kaina: ${p.price}€<br>
  ${main}${thumbs}

  ${currentUser==="admin" ? `
    <button onclick="del('${d.id}')">Delete</button>
    <button onclick="edit('${d.id}','${p.price}')">Edit</button>
  `:""}

  </div>`;
 });

 posts.innerHTML = html;

 if(currentUser==="admin"){
   adminPanel.innerHTML="📊 Skelbimų: "+count;
 }
});

/* IMG */
window.changeImg = (id,src)=>{
 document.getElementById("img-"+id).src = src;
}

/* ADMIN */
window.del = async(id)=> await deleteDoc(doc(db,"posts",id));

window.edit = async(id,old)=>{
 let p = prompt("Nauja kaina:",old);
 if(p) await updateDoc(doc(db,"posts",id),{price:p});
}

</script>

</body>
</html>
