<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10K MISIJA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

h1{text-align:center;color:#16a34a;}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* PROGRESS */
.progress{
height:14px;
background:#e5e7eb;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:0.6s;
box-shadow:0 0 10px rgba(34,197,94,0.6);
}

/* ANIMATION */
.bounce{
animation:bounce 0.3s;
}
@keyframes bounce{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

/* TASK */
.task{
display:flex;
justify-content:space-between;
align-items:center;
background:#f8fafc;
padding:12px;
border-radius:12px;
margin-top:10px;
}

.task-left{
display:flex;
align-items:center;
gap:10px;
flex:1;
}

.task-text{
flex:1;
white-space:normal;
word-break:break-word;
}

.task.done{
background:#dcfce7;
text-decoration:line-through;
}

/* BUTTON */
button{
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
width:100%;
}

.delete{
background:#ef4444;
width:auto;
}

.small{
width:auto;
padding:6px 10px;
font-size:12px;
}

.log{
display:none;
background:#f1f5f9;
padding:10px;
margin-top:10px;
border-radius:10px;
max-height:200px;
overflow:auto;
}

</style>
</head>

<body>

<div class="container">

<h1>🎯 10K MISIJA</h1>

<!-- PROFIT -->
<div class="card">
<h3>💰 PELNAS <button class="small" onclick="toggle('profitLog')">📜</button></h3>

<input id="profitAmount" type="number">
<input id="profitDesc">

<button onclick="addProfit()">➕ Pridėti</button>

<div class="progress">
<div id="profitBar" class="fill"></div>
</div>

<h2 id="profitText"></h2>
<p id="weekProfit"></p>

<div id="profitLog" class="log"></div>
</div>

<!-- STATS -->
<div class="card">
<h3>🚗 STATISTIKA</h3>

<p>Nupirkta: <span id="boughtCount">0</span></p>
<button onclick="addBought()">➕ Nupirkta</button>

<p>Parduota: <span id="soldCount">0</span></p>
<button onclick="addSold()">➕ Parduota</button>
</div>

<!-- GRAPH -->
<div class="card">
<h3>📊 Pelnas per dienas</h3>
<canvas id="chart"></canvas>
</div>

<!-- TASKS -->
<div class="card">
<h3>📋 VEIKSMAI <button class="small" onclick="toggle('taskLog')">📜</button></h3>

<input id="taskInput">
<button onclick="addTask()">➕</button>

<div id="taskList"></div>
<div id="taskLog" class="log"></div>
</div>

<button onclick="resetAll()" style="background:red;">RESET</button>

</div>

<script>

// STATE
let profit=0;
let logs=[];
let tasks=[];
let taskLogs=[];
let bought=0;
let sold=0;

// TIME
function now(){return new Date().toLocaleString();}

// PROFIT
function addProfit(){
let val=parseInt(profitAmount.value);
if(!val) return;

profit+=val;
logs.unshift(`${now()} +${val}`);

profitBar.style.width=Math.min(profit/10000*100,100)+"%";
profitBar.classList.add("bounce");

setTimeout(()=>profitBar.classList.remove("bounce"),300);

save(); render();
updateChart();
}

// TASK
function addTask(){
let text=taskInput.value.trim();
if(!text) return;

tasks.push({text,done:false});
taskInput.value="";

save(); render();
}

function toggleTask(i){
tasks[i].done=!tasks[i].done;

if(tasks[i].done){
taskLogs.unshift(`${now()} ✔️ ${tasks[i].text}`);
}

save(); render();
}

function deleteTask(i){
tasks.splice(i,1);
save(); render();
}

// STATS
function addBought(){bought++; save(); render();}
function addSold(){sold++; save(); render();}

// RENDER
function render(){

profitText.innerText=profit+"€ / 10 000€";

boughtCount.innerText=bought;
soldCount.innerText=sold;

profitLog.innerHTML=logs.join("<br>");
taskLog.innerHTML=taskLogs.join("<br>");

taskList.innerHTML="";
tasks.forEach((t,i)=>{
let div=document.createElement("div");
div.className="task"+(t.done?" done":"");

div.innerHTML=`
<div class="task-left">
<input type="checkbox" ${t.done?"checked":""} onclick="toggleTask(${i})">
<div class="task-text">${t.text}</div>
</div>
<button class="delete" onclick="deleteTask(${i})">X</button>
`;

taskList.appendChild(div);
});
}

// GRAPH
let chart;

function updateChart(){
let data={};

logs.forEach(l=>{
let d=l.split(",")[0];
let val=parseInt(l.split("+")[1]);
data[d]=(data[d]||0)+val;
});

let labels=Object.keys(data);
let values=Object.values(data);

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:'line',
data:{labels,datasets:[{data:values,borderColor:'#22c55e'}]}
});
}

// TOGGLE
function toggle(id){
let el=document.getElementById(id);
el.style.display=el.style.display==="block"?"none":"block";
}

// SAVE
function save(){
localStorage.setItem("profit",profit);
localStorage.setItem("logs",JSON.stringify(logs));
localStorage.setItem("tasks",JSON.stringify(tasks));
localStorage.setItem("taskLogs",JSON.stringify(taskLogs));
localStorage.setItem("bought",bought);
localStorage.setItem("sold",sold);
}

// LOAD
function load(){
profit=parseInt(localStorage.getItem("profit"))||0;
logs=JSON.parse(localStorage.getItem("logs"))||[];
tasks=JSON.parse(localStorage.getItem("tasks"))||[];
taskLogs=JSON.parse(localStorage.getItem("taskLogs"))||[];
bought=parseInt(localStorage.getItem("bought"))||0;
sold=parseInt(localStorage.getItem("sold"))||0;
}

// RESET
function resetAll(){
if(!confirm("Reset?")) return;
localStorage.clear();
location.reload();
}

// INIT
load();
render();
updateChart();

</script>

</body>
</html>
