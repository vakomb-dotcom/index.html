<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>automobilius.lt</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin:0;
  background:#f5f6f8;
}

/* HEADER */
header {
  background:#0f0f10;
  color:#fff;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { font-size:20px; font-weight:600; }

button {
  background:#111;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* LAYOUT */
.container {
  max-width:900px;
  margin:20px auto;
  padding:10px;
}

.card {
  background:#fff;
  padding:16px;
  border-radius:12px;
  margin-bottom:15px;
}

.post {
  background:#fff;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
  line-height:1.4;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

.menu { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }

.viber {
  background:#7360f2;
  padding:8px 10px;
  color:#fff;
  border-radius:6px;
  display:inline-block;
  margin-top:8px;
  text-decoration:none;
}

.auth-box {
  position:absolute;
  right:20px;
  top:60px;
  background:#fff;
  padding:15px;
  border-radius:10px;
  width:250px;
  display:none;
}

.hidden { display:none; }

/* IMAGE */
.main-img {
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

.thumb-container {
  display:flex;
  gap:6px;
  margin-top:6px;
  flex-wrap:wrap;
}

.thumb {
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
}

/* STAT */
.stat {
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>

</head>
<body>

<header>
<div class="logo">automobilius.lt</div>
<div>
<button onclick="toggleForm()">+ Talpinti</button>
<button onclick="toggleAuth()">Prisijungti</button>
</div>
</header>

<div id="authBox" class="auth-box">

<div id="loginBox">
<input id="nick" placeholder="Slapyvardis">
<input id="pass" type="password" placeholder="Slaptažodis">
<button onclick="login()">Prisijungti</button>
<button onclick="showRegister()">Registruotis</button>
</div>

<div id="registerBox" class="hidden">
<input id="reg_nick" placeholder="Slapyvardis">
<input id="reg_pass" type="password">
<input id="reg_pass2" type="password">
<button onclick="register()">Registruotis</button>
<button onclick="showLogin()">Grįžti</button>
</div>

</div>

<div class="container">

<div id="stats" class="stat hidden"></div>

<div id="userMenu" class="menu hidden">
<button onclick="toggleForm()">Talpinti</button>
<button onclick="logout()">Logout</button>
</div>

<div id="formBox" class="card hidden">

<h3>Naujas pasiūlymas</h3>

<input id="brand" placeholder="Markė">
<input id="model" placeholder="Modelis">
<input id="year" placeholder="Metai">
<input id="engine" placeholder="Variklis">
<input id="defects" placeholder="Defektai">
<input id="price" placeholder="Kaina €">

<select id="negotiated">
<option value="Nederinta">Nederinta</option>
<option value="Derinta">Derinta</option>
</select>

<input id="city" placeholder="Miestas">
<input id="interest" placeholder="Interest €">
<input id="phone" placeholder="Viber numeris">

<input type="file" id="photos" multiple>

<button onclick="addPost()">Įkelti</button>

</div>

<div id="posts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "automobilius-e2770.firebaseapp.com",
  projectId: "automobilius-e2770"
});

const db = getFirestore(app);

let currentUser = null;

/* USERS */
function getUsers(){
 return JSON.parse(localStorage.getItem('users')||'{}');
}
function saveUsers(u){
 localStorage.setItem('users', JSON.stringify(u));
}

/* ADMIN */
let users = getUsers();
if(!users['admin']){
 users['admin'] = {pass:'admin123'};
 saveUsers(users);
}

/* UI */
window.toggleAuth = () =>
 authBox.style.display = authBox.style.display==="block"?"none":"block";

window.showRegister = ()=>{
 loginBox.classList.add("hidden");
 registerBox.classList.remove("hidden");
}

window.showLogin = ()=>{
 registerBox.classList.add("hidden");
 loginBox.classList.remove("hidden");
}

/* LOGIN */
window.login = ()=>{
 let u=getUsers();
 if(u[nick.value] && u[nick.value].pass===pass.value){
  currentUser=nick.value;
  userMenu.classList.remove("hidden");

  if(currentUser==="admin") stats.classList.remove("hidden");

  authBox.style.display="none";
 } else alert("Blogi duomenys");
}

/* REGISTER */
window.register = ()=>{
 if(reg_pass.value!==reg_pass2.value){
  alert("Slaptažodžiai nesutampa"); return;
 }

 let u=getUsers();
 if(u[reg_nick.value]) return alert("Yra");

 u[reg_nick.value]={pass:reg_pass.value};
 saveUsers(u);

 alert("Sėkmingai prisiregistravote");
 showLogin();
}

/* LOGOUT */
window.logout=()=>{
 currentUser=null;
 userMenu.classList.add("hidden");
 stats.classList.add("hidden");
}

/* FORM */
window.toggleForm=()=>formBox.classList.toggle("hidden");

/* ADD POST */
window.addPost = async ()=>{
 try{

 if(!brand.value || !price.value){
   alert("Užpildyk bent markę ir kainą");
   return;
 }

 let files = photos.files;
 let imgs=[];

 if(files.length>10){
  alert("Max 10 foto"); return;
 }

 if(files.length){
  let readers=[];
  for(let i=0;i<files.length;i++){
   readers.push(new Promise(res=>{
    let r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.readAsDataURL(files[i]);
   }));
  }
  imgs=await Promise.all(readers);
 }

 await addDoc(collection(db,"posts"),{
  brand:brand.value,
  model:model.value,
  year:year.value,
  engine:engine.value,
  defects:defects.value,
  price:price.value,
  negotiated:negotiated.value,
  city:city.value,
  interest:interest.value,
  phone:phone.value,
  images:imgs,
  user:currentUser||"guest",
  date:Date.now()
 });

 formBox.reset?.(); // FIX
 alert("Įkelta!");

 }catch(e){
  alert("Klaida");
  console.log(e);
 }
}

/* RENDER */
const q=query(collection(db,"posts"),orderBy("date","desc"));

onSnapshot(q,(snap)=>{
 let html="";
 let count=0;

 snap.forEach(d=>{
  count++;

  let p=d.data();

  let main=p.images?.[0]
   ? `<img src="${p.images[0]}" class="main-img" id="main-${d.id}">`
   :"";

  let thumbs="";
  if(p.images?.length>1){
   thumbs='<div class="thumb-container">';
   p.images.forEach(img=>{
    thumbs+=`<img src="${img}" class="thumb" onclick="changeImg('${d.id}','${img}')">`;
   });
   thumbs+='</div>';
  }

  html+=`
  <div class="post">
  <b>${p.brand} ${p.model}</b><br>
  ${p.year||""} | ${p.engine||""} | ${p.city||""}<br>
  <small>${p.defects||""}</small><br><br>

  <b>${p.price}€ (${p.negotiated||""})</b><br>
  Interest: ${p.interest||""}€<br>

  <a class="viber" href="viber://chat?number=${p.phone}">Viber</a>

  ${main}
  ${thumbs}

  ${currentUser==="admin" ? `
   <br><button onclick="del('${d.id}')">Delete</button>
   <button onclick="edit('${d.id}','${p.price}')">Edit</button>
  `:""}

  </div>`;
 });

 posts.innerHTML=html;

 if(currentUser==="admin"){
  stats.innerHTML=`📊 Skelbimų: ${count}`;
 }

});

/* IMG SWITCH */
window.changeImg=(id,src)=>{
 document.getElementById("main-"+id).src=src;
}

/* DELETE */
window.del=async id=>await deleteDoc(doc(db,"posts",id));

/* EDIT */
window.edit=async(id,old)=>{
 let p=prompt("Kaina:",old);
 if(p) await updateDoc(doc(db,"posts",id),{price:p});
}

</script>

</body>
</html>
