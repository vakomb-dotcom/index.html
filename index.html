<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoDeal AI PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f4f7ff;color:#111;}
.container{max-width:1000px;margin:auto;padding:30px;}
.card{background:white;padding:30px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
h1{text-align:center;margin-bottom:20px;}

.benefits{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:30px;
}

.benefit{
background:linear-gradient(135deg,#4f46e5,#3b82f6);
color:white;
padding:20px;
border-radius:14px;
text-align:center;
}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:30px;}
.plan{border:2px solid #2563eb;padding:20px;border-radius:14px;text-align:center;cursor:pointer;}
.plan:hover{transform:scale(1.03);}
.price{font-size:26px;font-weight:800;margin:10px 0;color:#2563eb;}

.info{
background:#eef2ff;
padding:15px;
border-radius:12px;
margin-bottom:15px;
display:none;
}

input,textarea{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ddd;}
button{padding:14px;background:#2563eb;color:white;border:none;border-radius:10px;width:100%;cursor:pointer;}
</style>
</head>

<body>

<div class="container">

<h1>Parduok automobilį GREIČIAU ir BRANGIAU</h1>

<div class="benefits">
<div class="benefit"><b>⚡ Greitas pardavimas</b><br>2–5 dienos</div>
<div class="benefit"><b>💰 Didesnė kaina</b><br>Maksimali vertė</div>
<div class="benefit"><b>🤝 Be streso</b><br>Mes viską padarome</div>
</div>

<div class="cards">

<div class="plan" onclick="start('mini')">
<h3>MINI PLANAS</h3>
<div class="price">59€ + 1€/km</div>
<p>Greitam pardavimui</p>
</div>

<div class="plan" onclick="start('standard')">
<h3>STANDARD</h3>
<div class="price">Nuo 149 €</div>
<p>Maksimaliai kainai</p>
</div>

</div>

<div class="card" id="app" style="display:none;">

<div class="info" id="info"></div>

<h2>Užpildyk informaciją</h2>

<input placeholder="Markė">
<input placeholder="Modelis">
<input placeholder="Metai">
<input placeholder="Rida">
<input placeholder="TA galioja iki">
<textarea placeholder="Defektai"></textarea>
<input placeholder="Telefono numeris">
<input type="file" multiple>

<button>Siųsti paraišką</button>

</div>

</div>

<script>
function start(plan){
let info=document.getElementById('info');
let text="";

if(plan==="mini"){
text="<b>Kaip atliekame paslaugą (Mini planas):</b><br><br>1. Atvykstame pas jus į vietą<br>2. Atliekame profesionalias nuotraukas<br>3. Paruošiame ir įdedame skelbimus į autoplius / autogidas<br>4. Pradedame pardavimo procesą";
}

if(plan==="standard"){
text="<b>Kaip atliekame paslaugą (Standard planas):</b><br><br>1. Atgabenate automobilį į Ukmergę<br>2. Išsiurbiame ir išplauname automobilį<br>3. Jei reikia – atliekame cheminį valymą<br>4. Jei reikia – poliruojame kėbulą ir žibintus<br>5. Atliekame profesionalias nuotraukas<br>6. Įdedame skelbimus ir pradedame pardavimą";
}

info.innerHTML=text;
info.style.display="block";

document.getElementById('app').style.display='block';

window.scrollTo({top:document.getElementById('app').offsetTop,behavior:'smooth'});
}
</script>

</body>
</html>
